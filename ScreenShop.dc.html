<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    @keyframes mh-page-enter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  </style>
</helmet>
<div style="position:absolute;inset:0;overflow-y:auto;box-sizing:border-box;background:#F4F0E7;font-family:'Noto Sans TC',sans-serif;padding:clamp(20px,5vw,36px) clamp(12px,4vw,24px);animation:mh-page-enter .5s cubic-bezier(.22,1,.36,1) both" data-screen-label="靈力商城">
  <div style="max-width:820px;margin:0 auto">
    <div onClick="{{ goHome }}" style="display:flex;align-items:center;gap:6px;color:#7C756B;font:600 13px 'Noto Sans TC';cursor:pointer;margin-bottom:16px;width:fit-content;white-space:nowrap">‹ 返回首頁</div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:22px;flex-wrap:wrap;gap:12px">
      <div style="font:700 26px 'Quicksand';color:#423D37;white-space:nowrap;flex:none">靈力商城</div>
      <div style="font:700 15px 'Quicksand';color:#557A60;white-space:nowrap;flex:none">目前靈力：{{ spiritPower }}</div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:18px;margin-bottom:30px">
      <sc-for list="{{ items }}" as="it" hint-placeholder-count="6">
        <div style="background:#FBF9F4;border:1px solid #E6DECF;border-radius:20px;padding:20px;text-align:center">
          <div style="width:48px;height:48px;border-radius:14px;margin:0 auto 12px;background:{{ it.photoLayer }}{{ it.color }}"></div>
          <div style="font:700 14px 'Quicksand';color:#423D37">{{ it.name }}</div>
          <div style="font:600 13px 'Noto Sans TC';color:#557A60;margin:6px 0 12px">{{ it.cost }} 靈力</div>
          <button onClick="{{ it.onRedeem }}" style="{{ it.btnStyle }}">{{ it.btnLabel }}</button>
        </div>
      </sc-for>
    </div>

    <div style="font:700 15px 'Quicksand';color:#423D37;margin-bottom:10px">兌換紀錄</div>
    <sc-if value="{{ history.length }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;flex-direction:column;gap:8px">
        <sc-for list="{{ history }}" as="h" hint-placeholder-count="2">
          <div style="background:#FBF9F4;border:1px solid #E6DECF;border-radius:12px;padding:10px 14px;display:flex;justify-content:space-between;font:400 13px 'Noto Sans TC'">
            <div style="color:#423D37">{{ h.name }}</div>
            <div style="color:#7C756B">-{{ h.cost }} 靈力 · {{ h.time }}</div>
          </div>
        </sc-for>
      </div>
    </sc-if>
    <sc-if value="{{ !history.length }}" hint-placeholder-val="{{ true }}">
      <div style="border:1px dashed #E6DECF;border-radius:12px;padding:20px;text-align:center;font:400 13px 'Noto Sans TC';color:#9A9385">尚未兌換過商品</div>
    </sc-if>
  </div>
</div>

<!-- Redeem success toast: a sibling of the animated screen root (not a
     descendant) so its position:fixed is truly viewport-relative — an
     ancestor with an active `transform` (like the root's page-enter
     animation, held via fill-mode:both) would otherwise turn position:fixed
     into a de-facto position:absolute relative to that ancestor. -->
<sc-if value="{{ toastVisible }}" hint-placeholder-val="{{ false }}">
  <div style="{{ toastStyle }}">
    <div style="width:26px;height:26px;border-radius:50%;flex:none;background:url('./img/icon-celebration.png') center/cover no-repeat,radial-gradient(circle at 35% 30%,#F0CA7A,#C99A3E)"></div>
    <div style="font:600 13px 'Noto Sans TC'">兌換成功！{{ toastName }} <span style="opacity:.85">-{{ toastCost }} 靈力</span></div>
  </div>
</sc-if>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:800}}">
// See data/shop-items.json — build-index.js inlines it as window.__MOCK_DATA
// so this keeps working when index.html is opened via file:// with no server.
function mockData(name, fallback) {
  if (typeof window !== 'undefined' && window.__MOCK_DATA && window.__MOCK_DATA[name]) return window.__MOCK_DATA[name];
  return fallback;
}
const ITEMS = mockData('shop-items', [
  { name:'拿鐵咖啡', cost:40, color:'#D19A76', slug:'latte' },
  { name:'手作餅乾', cost:25, color:'#E8C766', slug:'cookie' },
]);

class Component extends DCLogic {
  state = { toast: null, toastShow: false };

  componentWillUnmount() {
    clearTimeout(this._toastHideTimer);
    clearTimeout(this._toastUnmountTimer);
  }

  // Mount the toast, wait a frame so the enter transition actually animates
  // (instead of snapping straight to the "shown" state), hold briefly, then
  // fade out and unmount so it doesn't linger as an invisible click-blocker.
  showRedeemToast(item) {
    clearTimeout(this._toastHideTimer);
    clearTimeout(this._toastUnmountTimer);
    this.setState({ toast: item, toastShow: false });
    requestAnimationFrame(() => requestAnimationFrame(() => this.setState({ toastShow: true })));
    this._toastHideTimer = setTimeout(() => this.setState({ toastShow: false }), 1800);
    this._toastUnmountTimer = setTimeout(() => this.setState({ toast: null }), 1800 + 300);
  }

  renderVals() {
    const p = this.props;
    const s = this.state;
    const items = ITEMS.map(it => {
      const enough = p.spiritPower >= it.cost;
      return {
        ...it,
        photoLayer: `url('./img/shop-${it.slug}.png') center/cover no-repeat,`,
        onRedeem: () => { if (enough) { p.onRedeem(it); this.showRedeemToast(it); } },
        btnLabel: enough ? '兌換' : '靈力不足',
        btnStyle: `width:100%;border:none;padding:9px;border-radius:999px;font:600 12px 'Noto Sans TC';color:#FBF9F4;background:${enough ? '#557A60' : '#C9C2B4'};cursor:${enough ? 'pointer' : 'default'}`,
      };
    });
    return {
      items, spiritPower: p.spiritPower, history: p.history || [], goHome: p.goHome,
      toastVisible: !!s.toast,
      toastName: s.toast ? s.toast.name : '',
      toastCost: s.toast ? s.toast.cost : 0,
      toastStyle: `position:fixed;left:50%;top:24px;z-index:9999;display:flex;align-items:center;gap:10px;background:#2E4A34;color:#FBF9F4;padding:12px 20px;border-radius:999px;box-shadow:0 14px 32px rgba(0,0,0,.2);white-space:nowrap;pointer-events:none;opacity:${s.toastShow ? 1 : 0};transform:translate(-50%,${s.toastShow ? '0' : '-16px'}) scale(${s.toastShow ? 1 : 0.94});transition:opacity .3s ease,transform .3s cubic-bezier(.22,1,.36,1)`,
    };
  }
}

</script>
</body>
</html>
