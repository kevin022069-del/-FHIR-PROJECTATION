// Demo/mock data lives in data/*.json (not hardcoded here) so it's easy to
// grow independently of the component logic. build-index.js inlines those
// files as window.__MOCK_DATA when it bundles index.html, so this still
// works when the app is opened via file:// with no server — mockData()
// only falls back to the literal below if that inlining didn't happen.
function mockData(name, fallback) {
  if (typeof window !== 'undefined' && window.__MOCK_DATA && window.__MOCK_DATA[name]) return window.__MOCK_DATA[name];
  return fallback;
}

function buildCareTeamResource(patientId, group) {
  return {
    resourceType: 'CareTeam',
    status: 'active',
    name: group.name,
    subject: { reference: `Patient/${patientId}` },
    participant: group.members.map(m => ({ member: { display: m.nick } })),
  };
}

function buildCommunicationResource(patientId, group, text) {
  return {
    resourceType: 'Communication',
    status: 'completed',
    subject: { reference: `Patient/${patientId}` },
    sent: new Date().toISOString(),
    payload: [{ contentString: text }],
    partOf: group.fhirCareTeamId ? [{ reference: `CareTeam/${group.fhirCareTeamId}` }] : undefined,
    note: [{ text: `群組：${group.name}` }],
  };
}

// Public HAPI FHIR R4 sandbox — no backend of our own; the browser talks to it directly (CORS is open).
const FHIR_BASE = 'https://hapi.fhir.org/baseR4';

async function fhirRequest(method, path, body) {
  const res = await fetch(`${FHIR_BASE}/${path}`, {
    method,
    headers: { 'Content-Type': 'application/fhir+json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const text = await res.text().catch(() => '');
    throw new Error(`HTTP ${res.status} ${text.slice(0, 200)}`);
  }
  return res.json();
}

function buildPssQuestionnaireResponse(patientId, answers, questions) {
  return {
    resourceType: 'QuestionnaireResponse',
    questionnaire: 'http://mindharbor.tw/fhir/Questionnaire/pss-10',
    status: 'completed',
    subject: { reference: `Patient/${patientId}` },
    authored: new Date().toISOString(),
    item: answers.map((a, i) => ({
      linkId: `q${i + 1}`,
      text: questions[i],
      answer: [{ valueInteger: a }],
    })),
  };
}

function buildTaskResource(patientId, task) {
  return {
    resourceType: 'Task',
    status: 'completed',
    intent: 'order',
    for: { reference: `Patient/${patientId}` },
    authoredOn: new Date().toISOString(),
    lastModified: new Date().toISOString(),
    code: { text: task.name },
    description: task.desc,
  };
}

function buildSummaryQuestionnaireResponse(patientId, stars, freeText) {
  return {
    resourceType: 'QuestionnaireResponse',
    questionnaire: 'http://mindharbor.tw/fhir/Questionnaire/daily-summary',
    status: 'completed',
    subject: { reference: `Patient/${patientId}` },
    authored: new Date().toISOString(),
    item: [
      { linkId: 'relax', text: '今天有比較放鬆嗎？', answer: [{ valueInteger: stars.relax }] },
      { linkId: 'calmer', text: '做完任務後，心情是否比較平靜？', answer: [{ valueInteger: stars.calmer }] },
      { linkId: 'freeText', text: '今天最讓你有收穫的事情是？', answer: freeText ? [{ valueString: freeText }] : [] },
    ],
  };
}

function buildFlagResource(patientId, reason) {
  return {
    resourceType: 'Flag',
    status: 'active',
    category: [{
      coding: [{ system: 'http://terminology.hl7.org/CodeSystem/flag-category', code: 'behavioral', display: 'Behavioral' }],
    }],
    code: { text: reason },
    subject: { reference: `Patient/${patientId}` },
    period: { start: new Date().toISOString() },
  };
}

function buildPssObservation(patientId, qrId, score, category) {
  const interpretation = {
    low: { code: 'L', display: '低壓力' },
    medium: { code: 'N', display: '中壓力' },
    high: { code: 'H', display: '高壓力' },
  }[category] || { code: 'N', display: '中壓力' };
  return {
    resourceType: 'Observation',
    status: 'final',
    category: [{
      coding: [{ system: 'http://terminology.hl7.org/CodeSystem/observation-category', code: 'survey', display: 'Survey' }],
    }],
    code: {
      coding: [{ system: 'http://mindharbor.tw/fhir/CodeSystem/pss', code: 'pss-10-score', display: 'Perceived Stress Scale (PSS-10) Score' }],
      text: 'PSS-10 壓力量表總分',
    },
    subject: { reference: `Patient/${patientId}` },
    effectiveDateTime: new Date().toISOString(),
    valueInteger: score,
    interpretation: [{
      coding: [{ system: 'http://terminology.hl7.org/CodeSystem/v3-ObservationInterpretation', code: interpretation.code, display: interpretation.display }],
    }],
    derivedFrom: qrId ? [{ reference: `QuestionnaireResponse/${qrId}` }] : undefined,
  };
}

    screen: 'marketing',
    gender: 'male',
    name: '蕭游',
    mindDemon: 32,
    spiritPower: 582,
    pssAnswers: Array(10).fill(null),
    pssIndex: 0,
    pssScore: null,
    pssCategory: null,
    tasks: MALE_TASKS.map(t => ({...t, completed:false, timerSeconds:0, running:false, fhirStatus:'idle', fhirTaskId:null})),
    summaryStars: {relax:0, calmer:0},
    summaryFreeText: '',
    summaryDone: false,
    chatOpen: false,
    chatMessages: [{from:'ai', text: MOCK_CHAT[0]}],
    chatDraft: '',
    highRisk: false,
    dayCompleted: false,
    companionOpen: false,
    companionMessages: [{from:'ai', text:'嗨，我是靈光 🌙 想跟我聊聊你現在的感受嗎？我會幫忙留意你的狀態。'}],
    companionDraft: '',
    companionStatus: 'good',
    companionAlert: false,
    notifiedFlags: [],
    notifiedThisSession: false,
    chatGroups: SEED_GROUPS,
    myGroupNick: null,
    friends: mockData('friends', [
      { nick:'小海豚', since:'3 天前', online:true, lastActive:'剛剛在線' },
      { nick:'向日葵', since:'1 週前', online:false, lastActive:'3 小時前活躍' },
    ]),
    pairingGroups: [],
    lastCheckinDate: (typeof localStorage !== 'undefined' && localStorage.getItem('mh_last_checkin')) || null,
    authMode: 'login',
    shopHistory: [],
    fhirPatientId: null,
    fhirStatus: 'idle', // idle | syncing | synced | error
    fhirError: null,
    fhirQrId: null,
    fhirObsId: null,
    fhirSyncedAt: null,
    summaryFhirStatus: 'idle', // idle | syncing | synced | error
    summaryFhirError: null,
    summaryFhirQrId: null,
    dashboardOpenFriendsSignal: 0,
  };
  openDashboardFriends = () => this.setState(s => ({ dashboardOpenFriendsSignal: s.dashboardOpenFriendsSignal + 1 }));
  onRedeem = (item) => {
    this.setState(s => s.spiritPower < item.cost ? null : ({
      spiritPower: s.spiritPower - item.cost,
      shopHistory: [{ name: item.name, cost: item.cost, time: '剛剛' }, ...s.shopHistory],
    }));
  };

  todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  }
  doCheckin = () => {
    const today = this.todayStr();
    if (this.state.lastCheckinDate === today) return;
    if (typeof localStorage !== 'undefined') localStorage.setItem('mh_last_checkin', today);
    this.setState(s => ({ lastCheckinDate: today, spiritPower: s.spiritPower + 5 }));
  };

  componentDidMount() {
    this._tick = setInterval(() => {
      this.setState(s => {
        if (!s.tasks.some(t => t.running)) return null;
        return { tasks: s.tasks.map(t => t.running ? {...t, timerSeconds: t.timerSeconds + 1} : t) };
      });
    }, 1000);
  }
  componentWillUnmount() { clearInterval(this._tick); }

  goTo = (screen) => this.setState({ screen });
  setGender = (g) => this.setState({ gender: g });
  doRegister = (data) => {
    const isFemale = data.gender === 'female';
    this.setState({
      screen: 'dashboard',
      name: data.nickname,
      gender: data.gender,
      mindDemon: 50,
      spiritPower: 0,
      tasks: (isFemale ? FEMALE_TASKS : MALE_TASKS).map(t => ({...t, completed:false, timerSeconds:0, running:false, fhirStatus:'idle', fhirTaskId:null})),
    });
  };
  doLogin = () => {
    const isFemale = this.state.gender === 'female';
    this.setState({
      screen: 'dashboard',
      name: isFemale ? '小美' : '蕭游',
      mindDemon: isFemale ? 38 : 32,
      spiritPower: isFemale ? 85 : 582,
      tasks: (isFemale ? FEMALE_TASKS : MALE_TASKS).map(t => ({...t, completed:false, timerSeconds:0, running:false, fhirStatus:'idle', fhirTaskId:null})),
    });
  };

  selectPss = (val) => {
    this.setState(s => {
      const arr = s.pssAnswers.slice();
      arr[s.pssIndex] = val;
      return { pssAnswers: arr };
    });
  };
  nextPss = () => this.setState(s => ({ pssIndex: Math.min(9, s.pssIndex + 1) }));
  prevPss = () => this.setState(s => ({ pssIndex: Math.max(0, s.pssIndex - 1) }));

  // Shared by every flow that writes to FHIR (PSS-10, task completion, daily
  // summary, pairing risk flag) so there is only ever one Patient created per
  // session — later calls just reuse state.fhirPatientId.
  ensurePatientId = async () => {
    if (this.state.fhirPatientId) return this.state.fhirPatientId;
    const demoId = 'mh-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
    const patient = await fhirRequest('POST', 'Patient', {
      resourceType: 'Patient',
      identifier: [{ system: 'http://mindharbor.tw/fhir/patient-id', value: demoId }],
      name: [{ text: this.state.name || 'MindHarbor Demo User' }],
      gender: this.state.gender === 'female' ? 'female' : 'male',
    });
    this.setState({ fhirPatientId: patient.id });
    return patient.id;
  };

  syncPssToFhir = async (answers, total, category) => {
    this.setState({ fhirStatus: 'syncing', fhirError: null });
    try {
      const patientId = await this.ensurePatientId();
      const qr = await fhirRequest('POST', 'QuestionnaireResponse', buildPssQuestionnaireResponse(patientId, answers, PSS10));
      const obs = await fhirRequest('POST', 'Observation', buildPssObservation(patientId, qr.id, total, category));
      this.setState({
        fhirStatus: 'synced', fhirQrId: qr.id, fhirObsId: obs.id,
        fhirSyncedAt: new Date().toLocaleTimeString('zh-TW'),
      });
    } catch (e) {
      this.setState({ fhirStatus: 'error', fhirError: (e && e.message) || String(e) });
    }
  };

  submitPss = () => {
    const { pssAnswers } = this.state;
    if (pssAnswers.some(a => a === null)) return;
    let total = 0;
    pssAnswers.forEach((a, i) => { total += REVERSE_IDX.includes(i) ? (4 - a) : a; });
    const category = total <= 13 ? 'low' : total <= 26 ? 'medium' : 'high';
    const isHigh = total >= 27;
    // Stay on the PSS result view so the user actually sees their score and the FHIR
    // sync status; they advance via the "下一步" button (goNext -> goTo_tasks).
    // High risk still routes to Crisis immediately — that safety path is unchanged.
    this.setState({ pssScore: total, pssCategory: category, highRisk: isHigh, screen: isHigh ? 'crisis' : 'chat' });
    this.syncPssToFhir(pssAnswers, total, category);
  };

  // Called from ScreenPairing.reportProgress(), which may fire more than
  // once per session (as soon as the quiz's risk score is known, and again
  // if the user finishes the optional add-friend step) so a high-risk
  // signal is never lost just because the user stops before reaching the
  // end of the flow. We upsert by sessionId instead of always pushing a new
  // group, and only ever add the "已通報" flag once per session.
  onPairingComplete = (summary) => {
    const isHigh = summary.riskLevel === 'high';
    const alreadyFlagged = this.state.notifiedFlags.some(f => f.sessionId === summary.sessionId);
    const willNotify = isHigh && !alreadyFlagged;
    this.setState(s => {
      const existingIdx = s.pairingGroups.findIndex(g => g.sessionId === summary.sessionId);
      const groupId = existingIdx >= 0 ? s.pairingGroups[existingIdx].id : `G-${s.pairingGroups.length + 1}`;
      const newGroup = {
        id: groupId,
        sessionId: summary.sessionId,
        // Kept genuinely anonymous — the patient is told "全程匿名，不會顯示
        // 任何真實帳號資訊" and the practitioner panel labels this a "匿名對話
        // 紀錄", so no real display name should ever end up here.
        userNick: '匿名旅伴',
        partnerNick: summary.partnerNick,
        score: summary.score,
        riskLevel: summary.riskLevel,
        log: summary.log,
        friended: summary.friended,
        time: '剛剛',
      };
      const pairingGroups = existingIdx >= 0
        ? s.pairingGroups.map((g, i) => i === existingIdx ? newGroup : g)
        : [...s.pairingGroups, newGroup];
      const newFriends = summary.final && summary.friended
        ? [...s.friends, { nick: summary.partnerNick, since: '剛剛', online: true, lastActive: '剛剛在線' }]
        : s.friends;
      const newFlags = willNotify
        ? [...s.notifiedFlags, { sessionId: summary.sessionId, patient: `匿名配對 ${groupId}（紓壓配對偵測）`, time: '剛剛', fhirStatus: 'syncing', fhirFlagId: null }]
        : s.notifiedFlags;
      return {
        pairingGroups,
        friends: newFriends,
        notifiedFlags: newFlags,
      };
    });
    if (willNotify) this.syncFlagToFhir(summary.sessionId, '紓壓配對高風險通報');
  };

  syncFlagToFhir = async (sessionId, reason) => {
    try {
      const patientId = await this.ensurePatientId();
      const flag = await fhirRequest('POST', 'Flag', buildFlagResource(patientId, reason));
      this.setState(s => ({
        notifiedFlags: s.notifiedFlags.map(f => f.sessionId === sessionId ? {...f, fhirStatus: 'synced', fhirFlagId: flag.id} : f)
      }));
    } catch (e) {
      const msg = (e && e.message) || String(e);
      this.setState(s => ({
        notifiedFlags: s.notifiedFlags.map(f => f.sessionId === sessionId ? {...f, fhirStatus: 'error', fhirError: msg} : f)
      }));
    }
  };

  // Kept genuinely anonymous, same as the pairing flow — one nickname is
  // picked per session and reused across every group so members recognize
  // "you" from message to message without exposing the real login name.
  ensureMyGroupNick = () => {
    if (this.state.myGroupNick) return this.state.myGroupNick;
    const nick = GROUP_NICK_POOL[Math.floor(Math.random() * GROUP_NICK_POOL.length)];
    this.setState({ myGroupNick: nick });
    return nick;
  };

  createGroup = (name, visibility, inviteNicks) => {
    const trimmed = (name || '').trim().slice(0, 30);
    if (!trimmed) return;
    const myNick = this.ensureMyGroupNick();
    const members = [
      { nick: myNick, joinedAt: '剛剛' },
      ...(inviteNicks || []).map(n => ({ nick: n, joinedAt: '剛剛' })),
    ];
    const group = {
      id: 'GRP-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 6),
      name: trimmed, visibility: visibility === 'private' ? 'private' : 'public',
      creatorNick: myNick, members, messages: [],
      riskFlag: false, createdAt: '剛剛',
      fhirCareTeamId: null, fhirCareTeamStatus: 'idle',
    };
    this.setState(s => ({ chatGroups: [group, ...s.chatGroups] }));
    this.syncCareTeamToFhir(group.id);
  };

  joinGroup = (id) => {
    const myNick = this.ensureMyGroupNick();
    const existingGroup = this.state.chatGroups.find(g => g.id === id);
    const alreadyMember = !!existingGroup && existingGroup.members.some(m => m.nick === myNick);
    this.setState(s => ({
      chatGroups: s.chatGroups.map(g => (g.id === id && !g.members.some(m => m.nick === myNick))
        ? { ...g, members: [...g.members, { nick: myNick, joinedAt: '剛剛' }] }
        : g)
    }));
    if (!alreadyMember) this.syncCareTeamToFhir(id);
  };

  syncCareTeamToFhir = async (groupId) => {
    this.setState(s => ({ chatGroups: s.chatGroups.map(g => g.id === groupId ? {...g, fhirCareTeamStatus: 'syncing'} : g) }));
    try {
      const patientId = await this.ensurePatientId();
      const group = this.state.chatGroups.find(g => g.id === groupId);
      const careTeam = await fhirRequest('POST', 'CareTeam', buildCareTeamResource(patientId, group));
      this.setState(s => ({ chatGroups: s.chatGroups.map(g => g.id === groupId ? {...g, fhirCareTeamStatus: 'synced', fhirCareTeamId: careTeam.id} : g) }));
    } catch (e) {
      this.setState(s => ({ chatGroups: s.chatGroups.map(g => g.id === groupId ? {...g, fhirCareTeamStatus: 'error'} : g) }));
    }
  };

  syncCommunicationToFhir = async (groupId, text) => {
    try {
      const patientId = await this.ensurePatientId();
      const group = this.state.chatGroups.find(g => g.id === groupId);
      if (group) await fhirRequest('POST', 'Communication', buildCommunicationResource(patientId, group, text));
    } catch (e) {
      // Best-effort: the message already shows locally regardless of FHIR
      // write success, same "local state is truth, FHIR mirrors it" pattern
      // used everywhere else in the app.
    }
  };

  notifyGroupRisk = (groupId) => {
    const flagKey = `group-${groupId}`;
    if (this.state.notifiedFlags.some(f => f.sessionId === flagKey)) return;
    const group = this.state.chatGroups.find(g => g.id === groupId);
    this.setState(s => ({
      notifiedFlags: [...s.notifiedFlags, { sessionId: flagKey, patient: `群組「${group ? group.name : groupId}」（群組聊天偵測）`, time: '剛剛', fhirStatus: 'syncing', fhirFlagId: null }],
    }));
    this.syncFlagToFhir(flagKey, '群組聊天高風險通報');
  };

  sendGroupMessage = (groupId, text) => {
    const trimmed = (text || '').trim();
    if (!trimmed) return;
    const myNick = this.ensureMyGroupNick();
    const time = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    const risk = this.classifyRisk(trimmed);
    const isHigh = risk === 'high';
    this.setState(s => ({
      chatGroups: s.chatGroups.map(g => g.id === groupId
        ? { ...g, messages: [...g.messages, { id: 'm-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,6), senderNick: myNick, text: trimmed, time, isMe: true }], riskFlag: g.riskFlag || isHigh }
        : g),
    }));
    this.syncCommunicationToFhir(groupId, trimmed);
    if (isHigh) this.notifyGroupRisk(groupId);

    const group = this.state.chatGroups.find(g => g.id === groupId);
    const others = group ? group.members.filter(m => m.nick !== myNick) : [];
    if (others.length) {
      const replyFrom = others[Math.floor(Math.random() * others.length)];
      const replyText = SIMULATED_MEMBER_REPLIES[Math.floor(Math.random() * SIMULATED_MEMBER_REPLIES.length)];
      setTimeout(() => {
        this.setState(s => ({
          chatGroups: s.chatGroups.map(g => g.id === groupId
            ? { ...g, messages: [...g.messages, { id: 'm-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,6), senderNick: replyFrom.nick, text: replyText, time: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }), isMe: false }] }
            : g),
        }));
      }, 900);
    }
  };

  toggleCompanion = () => this.setState(s => ({ companionOpen: !s.companionOpen, companionAlert: false }));
  setCompanionDraft = (v) => this.setState({ companionDraft: v });
  classifyRisk = (text) => {
    const highWords = ['想死','不想活','活不下去','撐不下去','傷害自己','結束一切','沒有意義','消失就好'];
    const normalWords = ['壓力','累','難過','焦慮','睡不著','煩','emo','崩潰'];
    const goodWords = ['開心','很好','不錯','放鬆','平靜','順利','充實'];
    if (highWords.some(w => text.includes(w))) return 'high';
    if (normalWords.some(w => text.includes(w))) return 'normal';
    if (goodWords.some(w => text.includes(w))) return 'good';
    return null;
  };
  sendCompanion = () => {
    const draft = this.state.companionDraft.trim();
    if (!draft) return;
    const detected = this.classifyRisk(draft);
    this.setState(s => {
      const status = detected || s.companionStatus;
      let reply;
      if (status === 'high') {
        reply = '聽起來你現在真的很不好受，辛苦你了。如果情況緊急，請撥打 1925 安心專線，會有人陪著你，你不孤單。';
      } else if (status === 'normal') {
        reply = '辛苦了，這種感覺不好受吧。要不要先做個深呼吸？我會一直在這裡陪你聊。';
      } else {
        reply = '很高興聽到這個！保持這個節奏，記得也要留意休息喔。';
      }
      const notifyNow = status === 'high' && !s.notifiedThisSession;
      const newFlags = notifyNow
        ? [...s.notifiedFlags, { patient: `個案 #${s.name}（AI 陪伴偵測）`, time: '剛剛' }]
        : s.notifiedFlags;
      return {
        companionMessages: [...s.companionMessages, {from:'user', text: draft}, {from:'ai', text: reply}],
        companionDraft: '',
        companionStatus: status,
        notifiedFlags: newFlags,
        notifiedThisSession: s.notifiedThisSession || notifyNow,
        companionAlert: notifyNow ? true : s.companionAlert,
      };
    });
  };

  toggleChat = () => this.setState(s => ({ chatOpen: !s.chatOpen }));
  setDraft = (v) => this.setState({ chatDraft: v });
  sendChat = () => {
    const draft = this.state.chatDraft.trim();
    if (!draft) return;
    this.setState(s => {
      const turn = s.chatMessages.filter(m => m.from === 'user').length;
      const reply = MOCK_CHAT[Math.min(turn + 1, MOCK_CHAT.length - 1)];
      return {
        chatMessages: [...s.chatMessages, {from:'user', text: draft}, {from:'ai', text: reply}],
        chatDraft: '',
      };
    });
  };

  toggleTask = (id) => {
    const task = this.state.tasks.find(t => t.id === id);
    const nowCompleted = !!task && !task.completed;
    this.setState(s => ({
      tasks: s.tasks.map(t => t.id === id ? {...t, completed: !t.completed, running: false} : t)
    }));
    if (nowCompleted) this.syncTaskToFhir(id);
  };
  toggleTimer = (id) => this.setState(s => ({
    tasks: s.tasks.map(t => t.id === id ? {...t, running: !t.running} : t)
  }));

  syncTaskToFhir = async (id) => {
    this.setState(s => ({ tasks: s.tasks.map(t => t.id === id ? {...t, fhirStatus: 'syncing'} : t) }));
    try {
      const patientId = await this.ensurePatientId();
      const task = this.state.tasks.find(t => t.id === id);
      const created = await fhirRequest('POST', 'Task', buildTaskResource(patientId, task));
      this.setState(s => ({ tasks: s.tasks.map(t => t.id === id ? {...t, fhirStatus: 'synced', fhirTaskId: created.id} : t) }));
    } catch (e) {
      const msg = (e && e.message) || String(e);
      this.setState(s => ({ tasks: s.tasks.map(t => t.id === id ? {...t, fhirStatus: 'error', fhirError: msg} : t) }));
    }
  };

  setStar = (key, val) => this.setState(s => ({ summaryStars: {...s.summaryStars, [key]: val} }));
  setFreeText = (v) => this.setState({ summaryFreeText: v });
  submitSummary = () => {
    if (this.state.summaryStars.relax === 0 || this.state.summaryStars.calmer === 0) return;
    this.setState({ summaryDone: true, screen: 'results', dayCompleted: true });
    this.syncSummaryToFhir();
  };
  syncSummaryToFhir = async () => {
    this.setState({ summaryFhirStatus: 'syncing', summaryFhirError: null });
    try {
      const patientId = await this.ensurePatientId();
      const { summaryStars, summaryFreeText } = this.state;
      const qr = await fhirRequest('POST', 'QuestionnaireResponse', buildSummaryQuestionnaireResponse(patientId, summaryStars, summaryFreeText));
      this.setState({ summaryFhirStatus: 'synced', summaryFhirQrId: qr.id });
    } catch (e) {
      this.setState({ summaryFhirStatus: 'error', summaryFhirError: (e && e.message) || String(e) });
    }
  };

  renderVals() {
    const s = this.state;
    const screens = ['marketing','login','dashboard','chat','tasks','summary','results','crisis','practitioner','admin'];
    const navBg = {}, navFg = {};
    screens.forEach(sc => {
      navBg[sc] = s.screen === sc ? '#7C9473' : 'transparent';
      navFg[sc] = s.screen === sc ? '#FBF9F4' : '#C9C2B4';
    });

    const tasksDoneCount = s.tasks.filter(t => t.completed).length;
    const allTasksDone = tasksDoneCount === s.tasks.length;

    // results calc (recompute live so screen always reflects current state)
    const taskReduction = tasksDoneCount * 5;
    const starsBonus = ((s.summaryStars.relax > 2 ? 3 : 0) + (s.summaryStars.calmer > 2 ? 3 : 0));
    const lowStressBonus = s.pssCategory === 'low' ? 5 : 0;
    const reduction = taskReduction + starsBonus + lowStressBonus;
    const spiritEarned = reduction * 2 + (allTasksDone ? 20 : 0) + (s.pssScore !== null ? 10 : 0) + (s.summaryDone ? 10 : 0);
    const tasksFhirSynced = s.tasks.filter(t => t.completed && t.fhirStatus === 'synced').length;
    const summaryFhirLabel = s.summaryFhirStatus === 'synced' ? `✓ QuestionnaireResponse/${s.summaryFhirQrId}`
      : s.summaryFhirStatus === 'syncing' ? '同步中…'
      : s.summaryFhirStatus === 'error' ? `同步失敗（${s.summaryFhirError || '網路異常'}）`
      : '—';
    const details = [
      {label: `完成 ${tasksDoneCount} 個任務`, val: `-${taskReduction} 心魔`},
      {label: '總結反思加成', val: `-${starsBonus} 心魔`},
      {label: s.pssCategory === 'low' ? '低壓力加成' : 'PSS-10 完成', val: s.pssCategory === 'low' ? '-5 心魔' : '+10 靈力'},
      {label: allTasksDone ? '全任務完成加成' : '任務未全數完成', val: allTasksDone ? '+20 靈力' : '—'},
      {label: '任務已寫入 FHIR Task', val: `${tasksFhirSynced}/${tasksDoneCount}`},
      {label: '總結已寫入 FHIR QuestionnaireResponse', val: summaryFhirLabel},
    ];

    const showCompanion = ['dashboard','tasks','summary','results','crisis'].includes(s.screen);
    const statusMap = { good: {label:'優良', color:'#557A60'}, normal: {label:'普通', color:'#C99A3E'}, high: {label:'高危', color:'#B5543C'} };
    const statusInfo = statusMap[s.companionStatus];
    const companionMessages = s.companionMessages.map(m => ({
      text: m.text,
      style: m.from === 'ai'
        ? 'background:#EDE8DE;color:#423D37;padding:9px 13px;border-radius:14px 14px 14px 4px;font:400 13px/1.5 \'Noto Sans TC\';align-self:flex-start;max-width:85%;'
        : 'background:#557A60;color:#FBF9F4;padding:9px 13px;border-radius:14px 14px 4px 14px;font:400 13px/1.5 \'Noto Sans TC\';align-self:flex-end;max-width:85%;'
    }));

    return {
      showCompanion,
      companionOpen: s.companionOpen, toggleCompanion: this.toggleCompanion,
      companionAlert: s.companionAlert,
      companionStatusLabel: statusInfo.label,
      showStatusBadge: s.companionStatus !== 'high',
      statusBadgeStyle: `font:700 10px 'Noto Sans TC';color:#FBF9F4;background:${statusInfo.color};padding:3px 8px;border-radius:999px`,
      companionMessages,
      companionDraft: s.companionDraft, onCompanionDraftChange: (e) => this.setCompanionDraft(e.target.value),
      onCompanionKeyDown: (e) => { if (e.key === 'Enter') this.sendCompanion(); },
      sendCompanion: this.sendCompanion,
      notifiedFlags: s.notifiedFlags,
      isMarketing: s.screen === 'marketing', isLogin: s.screen === 'login', isDashboard: s.screen === 'dashboard',
      isChat: s.screen === 'chat', isTasks: s.screen === 'tasks', isSummary: s.screen === 'summary',
