so the intro\n       animation fully covers the navbar too, but still above normal page\n       content once the splash unmounts. -->\n  <div style=\"position:sticky;top:0;z-index:40\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px clamp(16px,4vw,48px);background:#FBF9F4;border-bottom:1px solid #E6DECF\">\n      <div style=\"display:flex;align-items:center;gap:10px;flex:none\">\n        <div style=\"width:34px;height:34px;border-radius:10px;background:url('./img/logo.png') center/cover no-repeat,linear-gradient(135deg,#88AE8E,#557A60);flex:none\"><\/div>\n        <div style=\"font:700 20px 'Quicksand',sans-serif;color:#423D37;white-space:nowrap\">MindHarbor<\/div>\n      <\/div>\n      <div class=\"mh-nav-links\" style=\"display:flex;gap:32px;font:500 15px 'Noto Sans TC';white-space:nowrap\">\n        <span onClick=\"{{ scrollToHero }}\" style=\"white-space:nowrap;cursor:pointer\">首頁<\/span>\n        <span onClick=\"{{ scrollToAbout }}\" style=\"white-space:nowrap;color:#7C756B;cursor:pointer\">關於我們<\/span>\n        <span onClick=\"{{ scrollToServices }}\" style=\"white-space:nowrap;color:#7C756B;cursor:pointer\">如何使用<\/span>\n        <span onClick=\"{{ scrollToComingSoon }}\" style=\"white-space:nowrap;color:#7C756B;cursor:pointer\">功能介紹<\/span>\n        <span onClick=\"{{ scrollToFooter }}\" style=\"white-space:nowrap;color:#7C756B;cursor:pointer\">聯絡我們<\/span>\n      <\/div>\n      <div style=\"display:flex;align-items:center;gap:10px;flex:none\">\n        <button onClick=\"{{ goToRegister }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:11px 22px;border-radius:999px;font:600 14px 'Noto Sans TC';white-space:nowrap;flex:none\">註冊<\/button>\n        <button class=\"mh-nav-toggle\" onClick=\"{{ toggleMobileMenu }}\" aria-label=\"開啟選單\" style=\"display:none;width:38px;height:38px;border:1px solid #E6DECF;background:#FBF9F4;border-radius:10px;align-items:center;justify-content:center;cursor:pointer;flex:none;padding:0\">\n          <i class=\"{{ mobileMenuIconClass }}\" style=\"color:#423D37;font-size:16px\"><\/i>\n        <\/button>\n      <\/div>\n    <\/div>\n    <!-- Always mounted (not sc-if) so opacity/transform can transition instead of\n         snapping in/out; position:absolute keeps it out of normal flow so opening\n         it never pushes the page content down or changes page width/height. -->\n    <div class=\"mh-nav-dropdown\" style=\"{{ mobileMenuStyle }}\">\n      <span onClick=\"{{ scrollToHero }}\" style=\"padding:13px 2px;font:600 15px 'Noto Sans TC';color:#423D37;cursor:pointer;border-bottom:1px solid #F0EBE0\">首頁<\/span>\n      <span onClick=\"{{ scrollToAbout }}\" style=\"padding:13px 2px;font:500 15px 'Noto Sans TC';color:#7C756B;cursor:pointer;border-bottom:1px solid #F0EBE0\">關於我們<\/span>\n      <span onClick=\"{{ scrollToServices }}\" style=\"padding:13px 2px;font:500 15px 'Noto Sans TC';color:#7C756B;cursor:pointer;border-bottom:1px solid #F0EBE0\">如何使用<\/span>\n      <span onClick=\"{{ scrollToComingSoon }}\" style=\"padding:13px 2px;font:500 15px 'Noto Sans TC';color:#7C756B;cursor:pointer;border-bottom:1px solid #F0EBE0\">功能介紹<\/span>\n      <span onClick=\"{{ scrollToFooter }}\" style=\"padding:13px 2px;font:500 15px 'Noto Sans TC';color:#7C756B;cursor:pointer\">聯絡我們<\/span>\n    <\/div>\n  <\/div>\n\n  <!-- first screen: hero + trust bar -->\n  <div ref=\"{{ heroSectionRef }}\" style=\"display:flex;flex-direction:column;min-height:calc(100vh - 96px);box-sizing:border-box\">\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:32px;align-items:center;flex:1;padding:clamp(24px,5vw,48px) clamp(16px,5vw,48px);max-width:1280px;margin:0 auto;box-sizing:border-box;width:100%\">\n    <div>\n      <div style=\"font:700 clamp(28px,5vw,46px)/1.3 'Quicksand',sans-serif;color:#423D37;margin-bottom:22px\">今天，<br>也請好好照顧<br>自己的心。<\/div>\n      <div style=\"font:400 clamp(15px,2.2vw,17px)/1.8 'Noto Sans TC';color:#7C756B;max-width:440px;margin-bottom:30px\">透過 AI 陪伴、每日修練與 FHIR 健康資料，讓每一天都比昨天更靠近理想的自己。<\/div>\n      <div class=\"mh-hero-actions\" style=\"display:flex;gap:14px;flex-wrap:wrap\">\n        <button onClick=\"{{ goToLogin }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:15px 28px;border-radius:999px;font:600 16px 'Noto Sans TC';white-space:nowrap\">開始今日修練<\/button>\n        <button onClick=\"{{ openIntro }}\" style=\"border:1px solid #C9C2B4;background:transparent;color:#423D37;padding:15px 28px;border-radius:999px;font:600 16px 'Noto Sans TC';white-space:nowrap\">觀看介紹 ▸<\/button>\n      <\/div>\n      <div style=\"display:flex;gap:18px;margin-top:34px;font:600 12px 'Noto Sans TC';color:#7C756B;flex-wrap:wrap\">\n        <span>FHIR R4<\/span><span>AI 陪伴<\/span><span>隱私守護<\/span>\n      <\/div>\n    <\/div>\n    <div style=\"height:min(480px,54vh);border-radius:28px;background:transparent;display:flex;align-items:center;justify-content:center;position:relative\">\n      <div ref=\"{{ heroRef }}\" style=\"display:flex;gap:clamp(14px,4vw,50px);align-items:flex-end;max-width:100%\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;animation:mh-float-a 3.4s ease-in-out infinite\">\n          <div style=\"font:700 13px 'Quicksand';color:#B5453A\">心魔<\/div>\n          <div style=\"position:relative;width:clamp(110px,30vw,336px);height:clamp(110px,30vw,336px)\">\n            <div data-head=\"devil\" style=\"{{ headStyleDevil }}\">\n            <div style=\"position:absolute;inset:0;background:url('./img/mascot-devil.png') center/cover no-repeat\"><\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px;animation:mh-float-b 3.9s ease-in-out infinite .3s\">\n          <div style=\"font:700 13px 'Quicksand';color:#557A60\">靈力<\/div>\n          <div style=\"position:relative;width:clamp(110px,30vw,336px);height:clamp(110px,30vw,336px)\">\n            <div data-head=\"angel\" style=\"{{ headStyleAngel }}\">\n            <div style=\"position:absolute;inset:0;background:url('./img/mascot-angel.png') center/cover no-repeat\"><\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <!-- trust bar -->\n  <div ref=\"{{ trustBarRef }}\" style=\"{{ trustBarStyle }}\">\n    <span style=\"display:flex;align-items:center;gap:8px;white-space:nowrap;flex:none\"><span style=\"{{ iconBadge }}\"><\/span>競賽認證作品<\/span>\n    <span style=\"display:flex;align-items:center;gap:8px;white-space:nowrap;flex:none\"><span style=\"{{ iconLock }}\"><\/span>資料本機儲存<\/span>\n    <span style=\"display:flex;align-items:center;gap:8px;white-space:nowrap;flex:none\"><span style=\"{{ iconPeople }}\"><\/span>服務 1,200+ 人次<\/span>\n    <span style=\"display:flex;align-items:center;gap:8px;white-space:nowrap;flex:none\"><span style=\"{{ iconRating }}\"><\/span>4.8 使用者評價<\/span>\n    <span style=\"display:flex;align-items:center;gap:8px;white-space:nowrap;flex:none\"><span style=\"{{ iconChat }}\"><\/span>線上諮詢<\/span>\n  <\/div>\n  <\/div>\n\n  <!-- services -->\n  <div ref=\"{{ servicesRef }}\" style=\"{{ servicesStyle }}\">\n    <div style=\"text-align:center;margin-bottom:48px\">\n      <div style=\"font:700 clamp(24px,4vw,32px) 'Quicksand';color:#423D37\">我們提供的服務<\/div>\n      <div style=\"color:#7C756B;margin-top:10px\">從個人到家庭，量身打造的心理支持方案<\/div>\n    <\/div>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:24px\">\n      <sc-for list=\"{{ services }}\" as=\"svc\" hint-placeholder-count=\"6\">\n        <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:22px;padding:28px\">\n          <div style=\"width:46px;height:46px;border-radius:14px;background:#DCE6DB;margin-bottom:16px;display:flex;align-items:center;justify-content:center\">\n            <i class=\"{{ svc.icon }}\" style=\"font-size:19px;color:#557A60\"><\/i>\n          <\/div>\n          <div style=\"font:700 17px 'Quicksand';margin-bottom:8px\">{{ svc.title }}<\/div>\n          <div style=\"font:400 14px/1.7 'Noto Sans TC';color:#7C756B\">{{ svc.desc }}<\/div>\n        <\/div>\n      <\/sc-for>\n    <\/div>\n  <\/div>\n\n  <!-- about -->\n  <div ref=\"{{ aboutRef }}\" style=\"{{ aboutStyle }}\">\n    <div style=\"max-width:1280px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:50px;align-items:center\">\n      <div style=\"height:min(280px,40vh);min-height:200px;border-radius:24px;background:url('./img/about-illustration.png') center/cover no-repeat,linear-gradient(160deg,#EAF1E7,#D6E3D4);position:relative;overflow:hidden\">\n      <\/div>\n      <div>\n        <div style=\"font:700 30px 'Quicksand';margin-bottom:16px\">關於 MindHarbor<\/div>\n        <div style=\"font:400 15px/1.9 'Noto Sans TC';color:#42403A\">我們結合 AI 陪伴與 FHIR 醫療互通標準，打造每日可持續的心理健康練習，並由專業心理師團隊提供後盾，讓紓壓成為一件可以被陪伴、被記錄、被看見的事。<\/div>\n        <div style=\"display:flex;gap:14px;margin-top:20px\">\n          <div style=\"background:#FBF9F4;padding:8px 16px;border-radius:999px;font:600 12px 'Noto Sans TC'\">合法立案機構<\/div>\n          <div style=\"background:#FBF9F4;padding:8px 16px;border-radius:999px;font:600 12px 'Noto Sans TC'\">FHIR R4 相容<\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <!-- team -->\n  <div ref=\"{{ teamRef }}\" style=\"{{ teamStyle }}\">\n    <div style=\"text-align:center;margin-bottom:48px\">\n      <div style=\"font:700 clamp(24px,4vw,32px) 'Quicksand'\">專業團隊<\/div>\n      <div style=\"color:#7C756B;margin-top:10px\">陪伴你走過每一段旅程<\/div>\n    <\/div>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:22px\">\n      <sc-for list=\"{{ team }}\" as=\"member\" hint-placeholder-count=\"4\">\n        <div style=\"text-align:center\">\n          <div style=\"width:100%;aspect-ratio:1;border-radius:20px;background:{{ member.photoLayer }}{{ member.bg }};margin-bottom:12px;position:relative;overflow:hidden\"><\/div>\n          <div style=\"font:700 15px 'Quicksand'\">{{ member.name }}<\/div>\n          <div style=\"font:400 13px 'Noto Sans TC';color:#7C756B\">{{ member.role }}<\/div>\n        <\/div>\n      <\/sc-for>\n    <\/div>\n  <\/div>\n\n  <!-- coming soon -->\n  <div ref=\"{{ comingSoonRef }}\" style=\"{{ comingSoonStyle }}\">\n    <div style=\"max-width:1280px;margin:0 auto\">\n      <div style=\"text-align:center;font:700 clamp(22px,4vw,30px) 'Quicksand';margin-bottom:40px\">未來功能搶先看<\/div>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px\">\n        <sc-for list=\"{{ upcoming }}\" as=\"u\" hint-placeholder-count=\"6\">\n          <div style=\"border:1px dashed #C9C2B4;border-radius:18px;padding:20px;display:flex;gap:14px;align-items:center\">\n            <div style=\"{{ u.iconStyle }}\"><\/div>\n            <div style=\"font:600 14px 'Noto Sans TC'\">{{ u.label }}<\/div>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <!-- cta -->\n  <div ref=\"{{ ctaRef }}\" style=\"{{ ctaStyle }}\">\n    <div style=\"font:700 clamp(22px,4vw,30px) 'Quicksand';margin-bottom:14px\">準備好照顧自己的心了嗎？<\/div>\n    <div style=\"font:400 15px 'Noto Sans TC';opacity:.9;margin-bottom:26px\">立即開始你的第一次每日修練<\/div>\n    <button onClick=\"{{ goToLogin }}\" style=\"border:none;background:#FBF9F4;color:#557A60;padding:15px 32px;border-radius:999px;font:700 16px 'Noto Sans TC';white-space:nowrap\">開始今日修練<\/button>\n  <\/div>\n\n  <!-- footer -->\n  <div ref=\"{{ footerRef }}\" style=\"{{ footerStyle }}\">\n    <div>\n      <div style=\"font:700 18px 'Quicksand';color:#FBF9F4;margin-bottom:10px\">MindHarbor<\/div>\n      <div style=\"line-height:1.8\">用 AI 陪伴與每日修練，陪你把心照顧好。<\/div>\n    <\/div>\n    <div>\n      <div style=\"font:700 13px 'Noto Sans TC';color:#FBF9F4;margin-bottom:10px\">聯絡資訊<\/div>\n      <div style=\"line-height:2\">電話：02-1234-5678<br>信箱：hello@mindharbor.tw<br>營業時間：週一至週五 09:00–18:00<\/div>\n    <\/div>\n    <div>\n      <div style=\"font:700 13px 'Noto Sans TC';color:#FBF9F4;margin-bottom:10px\">社群<\/div>\n      <div style=\"line-height:2\">Facebook · Instagram · Line<\/div>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- onboarding intro modal: sibling of the animated root div (not a child of\n     it) so position:fixed is relative to the real viewport, not to an\n     ancestor with an active transform (see ScreenShop.dc.html toast for the\n     same fix applied to the same class of bug). -->\n<sc-if value=\"{{ introOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"{{ introBackdropStyle }}\" onClick=\"{{ closeIntro }}\">\n    <div style=\"{{ introCardStyle }}\" onClick=\"{{ stopPropagation }}\">\n      <!-- introCardStyle has overflow:hidden (to clip the image to the rounded\n           corners), so this can't sit partway outside the card like a badge —\n           it would get clipped off. Keep it fully inside the card bounds. -->\n      <div onClick=\"{{ closeIntro }}\" style=\"position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:#FBF9F4;display:flex;align-items:center;justify-content:center;cursor:pointer;font:700 14px 'Noto Sans TC';color:#423D37;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:1\">✕<\/div>\n\n      <!-- full slide image, exported 16:9 from the Gamma deck -->\n      <div style=\"{{ introImgStyle }}\"><\/div>\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;background:#FBF9F4\">\n        <div style=\"display:flex;gap:8px\">\n          <sc-for list=\"{{ introDots }}\" as=\"dot\" hint-placeholder-count=\"7\">\n            <div onClick=\"{{ dot.onClick }}\" style=\"{{ dot.style }}\"><\/div>\n          <\/sc-for>\n        <\/div>\n        <div style=\"display:flex;gap:10px;flex:none\">\n          <button onClick=\"{{ introPrev }}\" style=\"{{ introPrevStyle }}\">‹ 上一步<\/button>\n          <button onClick=\"{{ introNext }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:10px 22px;border-radius:999px;font:600 13px 'Noto Sans TC';white-space:nowrap;cursor:pointer\">{{ introNextLabel }}<\/button>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/sc-if>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1400,&quot;height&quot;:900}}\">\n// Exported straight from the Gamma deck (see slides.md) as full 16:9 slide\n// images — each slide already has its own title/body text baked in, so the\n// modal just needs to show the picture, no separate title/desc fields.\nconst INTRO_SLIDES = [\n  './img/intro-slide-1.png',\n  './img/intro-slide-2.png',\n  './img/intro-slide-3.png',\n  './img/intro-slide-4.png',\n  './img/intro-slide-5.png',\n  './img/intro-slide-6.png',\n  './img/intro-slide-7.png',\n];\n\nclass Component extends DCLogic {\n  heroRef = React.createRef();\n  rootRef = React.createRef();\n  heroSectionRef = React.createRef();\n  trustBarRef = React.createRef();\n  servicesRef = React.createRef();\n  aboutRef = React.createRef();\n  teamRef = React.createRef();\n  comingSoonRef = React.createRef();\n  ctaRef = React.createRef();\n  footerRef = React.createRef();\n\n  scrollToSection(ref) {\n    const root = this.rootRef.current;\n    const target = ref.current;\n    if (!root || !target) return;\n    const top = target.offsetTop - 78;\n    root.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });\n  }\n  state = {\n    headRotation: { devil: 0, angel: 0 },\n    splashSlideIn: false,\n    splashFadeOut: false,\n    splashDone: false,\n    mobileMenuOpen: false,\n    introOpen: false,\n    introStep: 0,\n    // Below-the-fold sections slide up + fade in the first time they scroll\n    // into view (see the IntersectionObserver set up in componentDidMount).\n    revealed: { trustBar: false, services: false, about: false, team: false, comingSoon: false, cta: false, footer: false },\n  };\n\n  componentDidMount() {\n    // Splash intro: start below/hidden, then flip to the \"in\" state on the\n    // next frame so the CSS transition actually animates instead of\n    // snapping straight to the end state.\n    this._splashRAF = requestAnimationFrame(() => this.setState({ splashSlideIn: true }));\n    // Icon slides in over .8s; text starts .3s later (its own transition-delay)\n    // and takes .8s too, so it finishes at .3s + .8s = 1.1s. Hold everything\n    // on screen for 1s after that, then fade + zoom the whole overlay out together.\n    this._splashFadeTimer = setTimeout(() => this.setState({ splashFadeOut: true }), 1100 + 1000);\n    // Fade/zoom-out itself takes .5s; fully remove the overlay after that so it\n    // stops intercepting clicks/scroll on the real homepage underneath.\n    this._splashDoneTimer = setTimeout(() => this.setState({ splashDone: true }), 1100 + 1000 + 500);\n\n    this._onMove = (e) => {\n      const host = this.heroRef.current;\n      if (!host) return;\n      const heads = host.querySelectorAll('[data-head]');\n      const nextRot = {};\n      heads.forEach(el => {\n        const key = el.getAttribute('data-head');\n        const rect = el.getBoundingClientRect();\n        const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;\n        const dx = e.clientX - cx, dy = e.clientY - cy;\n        const maxDeg = 12;\n        const deg = Math.max(-maxDeg, Math.min(maxDeg, (dx / 300) * maxDeg));\n        nextRot[key] = deg;\n      });\n\n      this.setState({\n        headRotation: { ...this.state.headRotation, ...nextRot },\n      });\n    };\n    window.addEventListener('mousemove', this._onMove);\n\n    this._onKeyDown = (e) => {\n      if (!this.state.introOpen) return;\n      if (e.key === 'Escape') this.closeIntro();\n      else if (e.key === 'ArrowRight') this.introNext();\n      else if (e.key === 'ArrowLeft') this.introPrev();\n    };\n    window.addEventListener('keydown', this._onKeyDown);\n\n    // Scroll-reveal: the page itself scrolls inside rootRef (not window), so\n    // the observer's root has to be that div or intersections never fire.\n    // Each section reveals once then unobserves itself (no re-hide on scroll-up).\n    const sectionsByKey = [\n      ['trustBar', this.trustBarRef],\n      ['services', this.servicesRef],\n      ['about', this.aboutRef],\n      ['team', this.teamRef],\n      ['comingSoon', this.comingSoonRef],\n      ['cta', this.ctaRef],\n      ['footer', this.footerRef],\n    ];\n    const keyByElement = new Map(sectionsByKey.filter(([, ref]) => ref.current).map(([key, ref]) => [ref.current, key]));\n    this._revealObserver = new IntersectionObserver((entries) => {\n      entries.forEach((entry) => {\n        if (!entry.isIntersecting) return;\n        const key = keyByElement.get(entry.target);\n        if (!key) return;\n        this.setState((prev) => ({ revealed: { ...prev.revealed, [key]: true } }));\n        this._revealObserver.unobserve(entry.target);\n      });\n    }, { root: this.rootRef.current, threshold: 0.15, rootMargin: '0px 0px -8% 0px' });\n    keyByElement.forEach((key, el) => this._revealObserver.observe(el));\n  }\n  componentWillUnmount() {\n    window.removeEventListener('mousemove', this._onMove);\n    window.removeEventListener('keydown', this._onKeyDown);\n    cancelAnimationFrame(this._splashRAF);\n    clearTimeout(this._splashFadeTimer);\n    clearTimeout(this._splashDoneTimer);\n    if (this._revealObserver) this._revealObserver.disconnect();\n  }\n\n  openIntro = () => this.setState({ introOpen: true, introStep: 0 });\n  closeIntro = () => this.setState({ introOpen: false });\n  stopPropagation = (e) => e.stopPropagation();\n  introPrev = () => this.setState(s => ({ introStep: Math.max(0, s.introStep - 1) }));\n  introNext = () => {\n    if (this.state.introStep === INTRO_SLIDES.length - 1) { this.props.goToLogin(); return; }\n    this.setState(s => ({ introStep: Math.min(INTRO_SLIDES.length - 1, s.introStep + 1) }));\n  };\n\n  renderVals() {\n    const s = this.state;\n    // Bottom-to-top slide-in + fade for whichever section this key belongs to.\n    const revealStyle = (key) => `opacity:${s.revealed[key] ? 1 : 0};transform:translateY(${s.revealed[key] ? 0 : 36}px);transition:opacity .7s ease,transform .7s cubic-bezier(.22,1,.36,1)`;\n    return {\n      splashDone: s.splashDone,\n      trustBarStyle: `display:flex;justify-content:center;gap:clamp(16px,3vw,32px);padding:20px clamp(16px,4vw,48px);background:#FBF9F4;border-top:1px solid #E6DECF;font:600 12.5px 'Noto Sans TC';color:#7C756B;flex-wrap:wrap;box-sizing:border-box;${revealStyle('trustBar')}`,\n      servicesStyle: `padding:clamp(48px,8vw,80px) clamp(16px,4vw,48px);max-width:1280px;margin:0 auto;${revealStyle('services')}`,\n      aboutStyle: `background:#DCE6DB;padding:clamp(40px,7vw,70px) clamp(16px,4vw,48px);${revealStyle('about')}`,\n      teamStyle: `padding:clamp(48px,8vw,80px) clamp(16px,4vw,48px);max-width:1280px;margin:0 auto;${revealStyle('team')}`,\n      comingSoonStyle: `background:#FBF9F4;border-top:1px solid #E6DECF;padding:clamp(40px,7vw,70px) clamp(16px,4vw,48px);${revealStyle('comingSoon')}`,\n      ctaStyle: `background:linear-gradient(135deg,#557A60,#7C9473);padding:clamp(40px,7vw,70px) clamp(16px,4vw,48px);text-align:center;color:#FBF9F4;${revealStyle('cta')}`,\n      footerStyle: `background:#2E2A24;color:#C9C2B4;padding:clamp(32px,6vw,50px) clamp(16px,4vw,48px);display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:30px;font:400 13px 'Noto Sans TC';${revealStyle('footer')}`,\n      splashOverlayStyle: `position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:#DCE6DB;opacity:${s.splashFadeOut ? 0 : 1};transform:scale(${s.splashFadeOut ? 2 : 1});transition:opacity .5s ease,transform .5s ease;pointer-events:${s.splashFadeOut ? 'none' : 'auto'}`,\n      splashLogoIconStyle: `width:64px;height:64px;border-radius:18px;background:url('./img/logo.png') center/cover no-repeat,linear-gradient(135deg,#88AE8E,#557A60);transform:translateY(${s.splashSlideIn ? 0 : 60}px);opacity:${s.splashSlideIn ? 1 : 0};transition:transform .8s cubic-bezier(.22,1,.36,1),opacity .8s ease`,\n      splashLogoTextStyle: `display:flex;flex-direction:column;align-items:center;margin-top:14px;transform:translateY(${s.splashSlideIn ? 0 : 60}px);opacity:${s.splashSlideIn ? 1 : 0};transition:transform .8s cubic-bezier(.22,1,.36,1) .3s,opacity .8s ease .3s`,\n      goToLogin: this.props.goToLogin,\n      goToRegister: this.props.goToRegister,\n      heroRef: this.heroRef,\n      rootRef: this.rootRef,\n      heroSectionRef: this.heroSectionRef,\n      trustBarRef: this.trustBarRef,\n      servicesRef: this.servicesRef,\n      aboutRef: this.aboutRef,\n      teamRef: this.teamRef,\n      comingSoonRef: this.comingSoonRef,\n      ctaRef: this.ctaRef,\n      footerRef: this.footerRef,\n      scrollToHero: () => this.scrollToSection(this.heroSectionRef),\n      scrollToAbout: () => this.scrollToSection(this.aboutRef),\n      scrollToServices: () => this.scrollToSection(this.servicesRef),\n      scrollToComingSoon: () => this.scrollToSection(this.comingSoonRef),\n      scrollToFooter: () => this.scrollToSection(this.footerRef),\n      headStyleDevil: `position:absolute;inset:0;transform:rotate(${this.state.headRotation.devil}deg);transform-origin:50% 100%;transition:transform .15s ease-out`,\n      headStyleAngel: `position:absolute;inset:0;transform:rotate(${this.state.headRotation.angel}deg);transform-origin:50% 100%;transition:transform .15s ease-out`,\n      iconBadge: 'width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#F0CA7A,#C99A3E);display:inline-block',\n      iconLock: 'width:13px;height:13px;border-radius:4px;background:#7C9473;display:inline-block',\n      iconPeople: 'width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#D19A76,#9A6B54);display:inline-block',\n      iconRating: 'width:14px;height:14px;transform:rotate(45deg);background:radial-gradient(circle at 35% 30%,#F0CA7A,#C99A3E);display:inline-block',\n      iconChat: 'width:15px;height:12px;border-radius:6px 6px 6px 2px;background:#557A60;display:inline-block',\n      services: [\n        {title:'個人諮商', desc:'一對一深度晤談，處理焦慮、憂鬱與生活壓力議題。', icon:'fa-solid fa-user'},\n        {title:'伴侶諮商', desc:'改善溝通模式，重建關係中的信任與親密感。', icon:'fa-solid fa-people-arrows'},\n        {title:'家庭諮商', desc:'陪伴家庭成員一起面對衝突，找回和諧互動。', icon:'fa-solid fa-people-roof'},\n        {title:'生涯諮詢', desc:'釐清職涯方向，做出更符合自己的選擇。', icon:'fa-solid fa-compass'},\n        {title:'正念紓壓', desc:'透過正念練習，提升覺察力並降低壓力反應。', icon:'fa-solid fa-spa'},\n        {title:'焦慮處理', desc:'學習具體技巧，緩解焦慮對日常生活的影響。', icon:'fa-solid fa-wind'},\n      ],\n      team: [\n        {name:'陳心理師', role:'臨床心理師 · 15年經驗', bg:'#DCE6DB', face:'#88AE8E'},\n        {name:'林心理師', role:'諮商心理師 · 伴侶諮商', bg:'#F4E4D6', face:'#D19A76'},\n        {name:'黃心理師', role:'諮商心理師 · 兒少專長', bg:'#E4DCF0', face:'#A688B0'},\n        {name:'吳心理師', role:'臨床心理師 · 職涯諮詢', bg:'#DDE7EF', face:'#8FA9C4'},\n      ].map((m, i) => ({ ...m, photoLayer: `url('./img/avatar-team-${i + 1}.png') center/cover no-repeat,` })),\n      upcoming: [\n        {label:'AI 情緒分析', icon:'icon-upcoming-ai-analysis'},\n        {label:'線上預約系統', icon:'icon-upcoming-booking'},\n        {label:'即時諮詢聊天', icon:'icon-upcoming-chat'},\n        {label:'健康追蹤', icon:'icon-upcoming-health-tracking'},\n        {label:'心理健康知識庫', icon:'icon-upcoming-knowledge-base'},\n        {label:'線上課程', icon:'icon-upcoming-courses'},\n      ].map(u => ({ ...u, iconStyle: `width:38px;height:38px;border-radius:10px;background:url('./img/${u.icon}.png') center/cover no-repeat,#DCE6DB;flex:none` })),\n      mobileMenuOpen: s.mobileMenuOpen,\n      toggleMobileMenu: () => this.setState(prev => ({ mobileMenuOpen: !prev.mobileMenuOpen })),\n      mobileMenuIconClass: s.mobileMenuOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-bars',\n      mobileMenuStyle: `position:absolute;top:100%;left:0;right:0;background:#FBF9F4;border-bottom:1px solid #E6DECF;box-shadow:0 16px 30px rgba(0,0,0,.08);padding:${s.mobileMenuOpen ? '6px clamp(16px,4vw,48px) 14px' : '0 clamp(16px,4vw,48px)'};max-height:${s.mobileMenuOpen ? '320px' : '0'};overflow:hidden;display:flex;flex-direction:column;opacity:${s.mobileMenuOpen ? 1 : 0};transition:max-height .3s ease,opacity .25s ease,padding .3s ease`,\n\n      // --- onboarding intro modal (full-slide images exported from Gamma) ---\n      introOpen: s.introOpen,\n      introDots: INTRO_SLIDES.map((_, i) => ({\n        onClick: () => this.setState({ introStep: i }),\n        style: `width:8px;height:8px;border-radius:50%;cursor:pointer;background:${i === s.introStep ? '#557A60' : '#DCE6DB'};transition:background .2s;flex:none`,\n      })),\n      introNextLabel: s.introStep === INTRO_SLIDES.length - 1 ? '開始今日修練 ›' : '下一步 ›',\n      introPrevStyle: `border:1px solid #C9C2B4;background:transparent;color:${s.introStep === 0 ? '#C9C2B4' : '#423D37'};padding:10px 20px;border-radius:999px;font:600 13px 'Noto Sans TC';cursor:${s.introStep === 0 ? 'default' : 'pointer'};visibility:${s.introStep === 0 ? 'hidden' : 'visible'}`,\n      introImgStyle: `width:100%;aspect-ratio:16/9;background:url('${INTRO_SLIDES[s.introStep]}') center/cover no-repeat,#EDE4D8`,\n      introBackdropStyle: `position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(46,42,36,.55);padding:20px;opacity:${s.introOpen ? 1 : 0};pointer-events:${s.introOpen ? 'auto' : 'none'};transition:opacity .3s ease`,\n      introCardStyle: `position:relative;background:#FBF9F4;border-radius:20px;overflow:hidden;max-width:min(94vw,900px);width:100%;box-shadow:0 30px 70px rgba(0,0,0,.35);transform:scale(${s.introOpen ? 1 : 0.94});transition:transform .3s cubic-bezier(.22,1,.36,1)`,\n      openIntro: this.openIntro,\n      closeIntro: this.closeIntro,\n      stopPropagation: this.stopPropagation,\n      introPrev: this.introPrev,\n      introNext: this.introNext,\n    };\n  }\n}\n\n<\/script>\n<\/body>\n<\/html>\n"],["./ScreenPairing.dc.html","<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"./support.js\"><\/script>\n<\/head>\n<body>\n<x-dc>\n<helmet>\n  <link href=\"https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap\" rel=\"stylesheet\">\n  <style>\n    @keyframes mh-page-enter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}\n    @keyframes mh-spin{to{transform:rotate(360deg)}}\n    @keyframes mh-pop{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}\n  <\/style>\n<\/helmet>\n<div style=\"position:absolute;inset:0;overflow-y:auto;box-sizing:border-box;background:#F4F0E7;font-family:'Noto Sans TC',sans-serif;padding:clamp(20px,5vw,36px) clamp(12px,4vw,24px);animation:mh-page-enter .5s cubic-bezier(.22,1,.36,1) both\" data-screen-label=\"紓壓配對\">\n\n  <div style=\"max-width:640px;margin:0 auto\">\n    <div onClick=\"{{ handleGoHome }}\" style=\"display:flex;align-items:center;gap:6px;color:#7C756B;font:600 13px 'Noto Sans TC';cursor:pointer;margin-bottom:18px;width:fit-content;white-space:nowrap\">‹ 返回首頁<\/div>\n\n    <!-- matching -->\n    <sc-if value=\"{{ isMatching }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:60px 30px;text-align:center\">\n        <div style=\"width:64px;height:64px;border-radius:50%;border:5px solid #DCE6DB;border-top-color:#557A60;margin:0 auto 24px;animation:mh-spin 1s linear infinite\"><\/div>\n        <div style=\"font:700 18px 'Quicksand';color:#423D37;margin-bottom:8px\">正在為你配對陌生旅伴...<\/div>\n        <div style=\"font:400 13px 'Noto Sans TC';color:#7C756B\">配對成功後，你們將以匿名暱稱互相陪伴、一起完成 5 題紓壓小測驗<\/div>\n      <\/div>\n    <\/sc-if>\n\n    <!-- matched intro -->\n    <sc-if value=\"{{ isMatched }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:40px 30px;text-align:center;animation:mh-pop .3s ease\">\n        <div style=\"display:flex;justify-content:center;gap:24px;margin-bottom:20px\">\n          <div style=\"width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#9CC3A0,#557A60)\"><\/div>\n          <div style=\"display:flex;align-items:center;font:700 20px 'Quicksand';color:#C9C2B4\">×<\/div>\n          <div style=\"width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#D19A76,#9A6B54)\"><\/div>\n        <\/div>\n        <div style=\"font:700 18px 'Quicksand';color:#423D37;margin-bottom:6px\">配對成功！你將與「{{ partnerNick }}」一起完成小測驗<\/div>\n        <div style=\"font:400 13px 'Noto Sans TC';color:#7C756B;margin-bottom:6px\">全程匿名，不會顯示任何真實帳號資訊<\/div>\n        <div style=\"font:400 11px 'Noto Sans TC';color:#A79C8C;margin-bottom:24px\">旅伴目前為系統模擬互動，尚未串接真人配對<\/div>\n        <button onClick=\"{{ startQuiz }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:14px 30px;border-radius:999px;font:700 14px 'Noto Sans TC'\">開始測驗 ›<\/button>\n      <\/div>\n    <\/sc-if>\n\n    <!-- quiz -->\n    <sc-if value=\"{{ isQuiz }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:30px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px\">\n          <div style=\"font:700 16px 'Quicksand'\">紓壓知識王<\/div>\n          <div style=\"font:600 12px 'Noto Sans TC';color:#7C756B\">題目 {{ qNum }} / {{ qTotal }}<\/div>\n        <\/div>\n        <div style=\"height:6px;background:#EDE4D8;border-radius:999px;overflow:hidden;margin-bottom:22px\">\n          <div style=\"height:100%;width:{{ qPct }}%;background:#557A60;border-radius:999px\"><\/div>\n        <\/div>\n        <div style=\"font:600 16px/1.6 'Noto Sans TC';color:#423D37;margin-bottom:20px\">{{ question }}<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:8px\">\n          <sc-for list=\"{{ options }}\" as=\"opt\" hint-placeholder-count=\"4\">\n            <button onClick=\"{{ opt.onSelect }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\/button>\n          <\/sc-for>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <!-- encouragement -->\n    <sc-if value=\"{{ isEncourage }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:30px\">\n        <div style=\"font:700 16px 'Quicksand';margin-bottom:6px\">給「{{ partnerNick }}」一句鼓勵<\/div>\n        <div style=\"font:400 13px 'Noto Sans TC';color:#7C756B;margin-bottom:18px\">{{ partnerNick }} 剛回答了第 {{ qNum }} 題，傳一句話讓對方知道你在這裡<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:16px\">\n          <sc-for list=\"{{ encouragementOptions }}\" as=\"e\" hint-placeholder-count=\"4\">\n            <button onClick=\"{{ e.onSelect }}\" style=\"text-align:left;border:1px solid #E6DECF;background:#FFFFFF;color:#423D37;padding:13px 16px;border-radius:14px;font:500 14px 'Noto Sans TC'\">{{ e.text }}<\/button>\n          <\/sc-for>\n        <\/div>\n        <div style=\"display:flex;gap:8px\">\n          <input value=\"{{ customEncourage }}\" onInput=\"{{ onCustomEncourageChange }}\" maxlength=\"120\" placeholder=\"或自己寫一句...\" style=\"flex:1;border:1px solid #E6DECF;border-radius:999px;padding:11px 16px;font:400 13px 'Noto Sans TC';outline:none\"/>\n          <button onClick=\"{{ sendCustomEncourage }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:0 20px;border-radius:999px;font:600 13px 'Noto Sans TC'\">送出<\/button>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <!-- chat log so far -->\n    <sc-if value=\"{{ showLog }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"mh-scroll\" role=\"log\" aria-live=\"polite\" style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:20px;padding:18px;margin-top:16px;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:8px\">\n        <sc-for list=\"{{ logEntries }}\" as=\"entry\" hint-placeholder-count=\"3\">\n          <div style=\"{{ entry.style }}\">{{ entry.text }}<\/div>\n        <\/sc-for>\n      <\/div>\n    <\/sc-if>\n\n    <!-- suggestion exchange -->\n    <sc-if value=\"{{ isSuggest }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:30px\">\n        <div style=\"font:700 16px 'Quicksand';margin-bottom:6px\">給彼此一個放鬆小建議<\/div>\n        <div style=\"font:400 13px 'Noto Sans TC';color:#7C756B;margin-bottom:18px\">測驗完成了！推薦「{{ partnerNick }}」一件可以放鬆的小事吧<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:16px\">\n          <sc-for list=\"{{ suggestionOptions }}\" as=\"sg\" hint-placeholder-count=\"4\">\n            <button onClick=\"{{ sg.onSelect }}\" style=\"text-align:left;border:1px solid #E6DECF;background:#FFFFFF;color:#423D37;padding:13px 16px;border-radius:14px;font:500 14px 'Noto Sans TC'\">{{ sg.text }}<\/button>\n          <\/sc-for>\n        <\/div>\n        <div style=\"display:flex;gap:8px\">\n          <input value=\"{{ customSuggestion }}\" onInput=\"{{ onCustomSuggestionChange }}\" maxlength=\"120\" placeholder=\"或自己寫一個建議...\" style=\"flex:1;border:1px solid #E6DECF;border-radius:999px;padding:11px 16px;font:400 13px 'Noto Sans TC';outline:none\"/>\n          <button onClick=\"{{ sendCustomSuggestion }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:0 20px;border-radius:999px;font:600 13px 'Noto Sans TC'\">送出<\/button>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <!-- add friend -->\n    <sc-if value=\"{{ isFriendAsk }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:36px 30px;text-align:center\">\n        <div style=\"font:700 18px 'Quicksand';color:#423D37;margin-bottom:10px\">「{{ partnerNick }}」建議你：{{ partnerSuggestion }}<\/div>\n        <div style=\"font:400 13px 'Noto Sans TC';color:#7C756B;margin-bottom:26px\">這趟旅程即將結束，要不要加「{{ partnerNick }}」為好友，之後可以繼續互相鼓勵？<\/div>\n        <div style=\"display:flex;gap:12px;justify-content:center\">\n          <button onClick=\"{{ declineFriend }}\" style=\"border:1px solid #C9C2B4;background:transparent;color:#423D37;padding:13px 26px;border-radius:999px;font:600 14px 'Noto Sans TC'\">先不用了<\/button>\n          <button onClick=\"{{ acceptFriend }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:13px 26px;border-radius:999px;font:700 14px 'Noto Sans TC'\">加為好友<\/button>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <!-- done -->\n    <sc-if value=\"{{ isDone }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:40px 30px;text-align:center\">\n        <div style=\"width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#F4D58D,#E8B44C);margin:0 auto 18px\"><\/div>\n        <div style=\"font:700 18px 'Quicksand';color:#423D37;margin-bottom:8px\">{{ doneTitle }}<\/div>\n        <div style=\"font:400 13px/1.7 'Noto Sans TC';color:#7C756B;margin-bottom:26px\">{{ doneSubtitle }}<\/div>\n        <button onClick=\"{{ goHome }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:14px 30px;border-radius:999px;font:700 14px 'Noto Sans TC'\">回到首頁<\/button>\n      <\/div>\n    <\/sc-if>\n  <\/div>\n<\/div>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:720,&quot;height&quot;:800},&quot;goHome&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;()=&gt;void&quot;},&quot;onComplete&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(summary:object)=&gt;void&quot;}}\">\n// See data/*.json — build-index.js inlines them as window.__MOCK_DATA so\n// this keeps working when index.html is opened via file:// with no server.\nfunction mockData(name, fallback) {\n  if (typeof window !== 'undefined' && window.__MOCK_DATA && window.__MOCK_DATA[name]) return window.__MOCK_DATA[name];\n  return fallback;\n}\n\nconst PARTNER_NICKS = mockData('pairing-partners', ['小海豚','夜貓子']);\nconst QUESTIONS = [\n  { q:'最近一個月，你有多常覺得莫名心煩？', opts:[\n    {label:'幾乎沒有', score:0}, {label:'偶爾會', score:1}, {label:'蠻常的', score:2}, {label:'幾乎每天', score:3} ]},\n  { q:'遇到突發狀況時，你通常會？', opts:[\n    {label:'冷靜評估再行動', score:0}, {label:'先深呼吸再處理', score:1}, {label:'會慌張一陣子', score:2}, {label:'整個人當機', score:3} ]},\n  { q:'最近睡眠品質如何？', opts:[\n    {label:'很好，一覺到天亮', score:0}, {label:'還可以', score:1}, {label:'常常睡不好', score:2}, {label:'幾乎失眠', score:3} ]},\n  { q:'面對堆積如山的待辦事項，你的感覺是？', opts:[\n    {label:'可以一項項處理', score:0}, {label:'有點壓力但還好', score:1}, {label:'覺得快喘不過氣', score:2}, {label:'完全不知從何下手', score:3} ]},\n  { q:'今天想到明天要做的事，心情是？', opts:[\n    {label:'平常心', score:0}, {label:'有點在意', score:1}, {label:'有點焦慮', score:2}, {label:'非常抗拒', score:3} ]},\n];\nconst ENCOURAGEMENTS = mockData('pairing-encouragements', ['你已經做得很好了！','辛苦了，記得對自己好一點']);\nconst SUGGESTIONS = mockData('pairing-suggestions', ['去外面散步 10 分鐘','聽一首喜歡的歌放空一下']);\n\n// The pool is intentionally larger than what's shown at once (variety across\n// sessions) — pick a handful up front, same idea as PARTNER_NICKS below,\n// rather than rendering the whole pool as a giant stack of buttons.\nfunction sample(pool, n) {\n  const copy = pool.slice();\n  const picked = [];\n  while (picked.length < Math.min(n, copy.length)) {\n    picked.push(copy.splice(Math.floor(Math.random() * copy.length), 1)[0]);\n  }\n  return picked;\n}\n\nclass Component extends DCLogic {\n  // Stable id for this pairing session so the parent (MindHarbor) can update\n  // the same record instead of creating a duplicate when we report progress\n  // more than once (see reportProgress()).\n  _sessionId = 'PS-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);\n  _reported = false;\n  _t1 = null;\n  _t2 = null;\n\n  state = {\n    step: 'matching',\n    partnerNick: PARTNER_NICKS[Math.floor(Math.random()*PARTNER_NICKS.length)],\n    encourageChoices: sample(ENCOURAGEMENTS, 4),\n    suggestChoices: sample(SUGGESTIONS, 4),\n    qIndex: 0,\n    userScore: 0,\n    log: [],\n    customEncourage: '',\n    customSuggestion: '',\n    partnerSuggestion: '',\n    friended: false,\n    locked: false,\n  };\n\n  componentDidMount() {\n    this._t1 = setTimeout(() => this.setState({ step: 'matched' }), 1600);\n  }\n  componentWillUnmount() {\n    clearTimeout(this._t1);\n    clearTimeout(this._t2);\n  }\n\n  nowLabel = () => new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });\n\n  // Heuristic cut points on the 0-15 quiz total, not derived from a validated\n  // clinical scale — treat as a placeholder pending clinical review, same\n  // caveat applies to the PSS-10 flow's own thresholds elsewhere in the app.\n  computeRiskLevel = (score) => (score >= 11 ? 'high' : score >= 6 ? 'medium' : 'low');\n\n  // Sends the current risk signal up to the parent as soon as it's known,\n  // instead of only at the very end of the optional \"add friend\" flow — a\n  // high-risk score must not depend on the user finishing the whole social\n  // flow to be reported. Safe to call more than once: the parent upserts by\n  // sessionId so this never creates duplicate flags/records.\n  reportProgress = (final) => {\n    if (!this.props.onComplete) return;\n    this.props.onComplete({\n      sessionId: this._sessionId,\n      partnerNick: this.state.partnerNick,\n      score: this.state.userScore,\n      riskLevel: this.computeRiskLevel(this.state.userScore),\n      log: this.state.log,\n      friended: final ? this.state.friended : false,\n      final: !!final,\n    });\n    this._reported = true;\n  };\n\n  handleGoHome = () => {\n    const { step, log } = this.state;\n    if (step !== 'done' && log.length > 0) {\n      const msg = this._reported\n        ? '確定要返回首頁嗎？本次紓壓配對將視為結束。'\n        : '目前的配對紀錄尚未完成，離開後這次的作答與訊息將會遺失，確定要返回首頁嗎？';\n      if (typeof window !== 'undefined' && window.confirm && !window.confirm(msg)) return;\n      if (!this._reported) this.reportProgress(false);\n    }\n    this.props.goHome && this.props.goHome();\n  };\n\n  startQuiz = () => this.setState({ step: 'quiz' });\n\n  selectOption = (opt) => {\n    const q = QUESTIONS[this.state.qIndex];\n    const partnerOpt = q.opts[Math.floor(Math.random() * q.opts.length)];\n    const time = this.nowLabel();\n    this.setState(s => ({\n      userScore: s.userScore + opt.score,\n      log: [...s.log,\n        { who:'you', text:`你：${opt.label}`, time },\n        { who:'partner', text:`${s.partnerNick}：${partnerOpt.label}`, time },\n      ],\n      step: 'encourage',\n    }));\n  };\n\n  sendEncouragement = (text) => {\n    if (this.state.locked) return;\n    this.setState({ locked: true });\n    this.setState(s => ({\n      log: [...s.log, { who:'you-msg', text:`你 → ${s.partnerNick}：${text}`, time: this.nowLabel() }],\n      customEncourage: '',\n    }), () => {\n      const nextIndex = this.state.qIndex + 1;\n      clearTimeout(this._t2);\n      this._t2 = setTimeout(() => {\n        if (nextIndex >= QUESTIONS.length) {\n          this.setState({ step: 'suggest', locked: false });\n          // Quiz is fully answered and the score is now final — report the\n          // risk signal right away rather than waiting on the friend-request\n          // step, which the user may never reach.\n          this.reportProgress(false);\n        } else {\n          this.setState({ qIndex: nextIndex, step: 'quiz', locked: false });\n        }\n      }, 500);\n    });\n  };\n  setCustomEncourage = (v) => this.setState({ customEncourage: v });\n\n  sendSuggestion = (text) => {\n    const partnerSuggestion = SUGGESTIONS[Math.floor(Math.random()*SUGGESTIONS.length)];\n    this.setState(s => ({\n      log: [...s.log, { who:'you-msg', text:`你 → ${s.partnerNick}：建議「${text}」`, time: this.nowLabel() }],\n      partnerSuggestion,\n      customSuggestion: '',\n      step: 'friendAsk',\n    }));\n  };\n  setCustomSuggestion = (v) => this.setState({ customSuggestion: v });\n\n  acceptFriend = () => {\n    this.setState({ friended: true, step: 'done' }, () => this.reportProgress(true));\n  };\n  declineFriend = () => {\n    this.setState({ friended: false, step: 'done' }, () => this.reportProgress(true));\n  };\n\n  renderVals() {\n    const s = this.state;\n    const q = QUESTIONS[s.qIndex];\n    const options = q ? q.opts.map(o => ({\n      label: o.label,\n      onSelect: () => this.selectOption(o),\n      style: 'text-align:left;border:1px solid #E6DECF;background:#FFFFFF;color:#423D37;padding:13px 16px;border-radius:14px;font:500 14px \\'Noto Sans TC\\';cursor:pointer',\n    })) : [];\n\n    const encouragementOptions = s.encourageChoices.map(t => ({ text: t, onSelect: () => this.sendEncouragement(t) }));\n    const suggestionOptions = s.suggestChoices.map(t => ({ text: t, onSelect: () => this.sendSuggestion(t) }));\n\n    const logEntries = s.log.map(e => ({\n      text: e.time ? `${e.text} · ${e.time}` : e.text,\n      // 'you' (own quiz answers) must render the same as 'you-msg' (own\n      // encouragement/suggestion messages) so your own bubbles are always\n      // right-aligned, distinct from the partner's.\n      style: (e.who === 'you-msg' || e.who === 'you')\n        ? 'background:#DCE6DB;color:#2E4A34;padding:8px 12px;border-radius:12px;font:500 12px \\'Noto Sans TC\\';align-self:flex-end;'\n        : 'background:#F0EBE0;color:#5C564C;padding:8px 12px;border-radius:12px;font:400 12px \\'Noto Sans TC\\';',\n    }));\n\n    const doneTitle = s.friended ? `已加「${s.partnerNick}」為好友！` : '本次紓壓旅程完成！';\n    const doneSubtitle = s.friended\n      ? '你可以在個案首頁的好友列表中看到對方，之後可以繼續互相鼓勵。'\n      : '謝謝你願意花時間互相陪伴，期待下次再遇到新的旅伴。';\n\n    return {\n      partnerNick: s.partnerNick,\n      isMatching: s.step === 'matching', isMatched: s.step === 'matched',\n      isQuiz: s.step === 'quiz', isEncourage: s.step === 'encourage',\n      isSuggest: s.step === 'suggest', isFriendAsk: s.step === 'friendAsk', isDone: s.step === 'done',\n      showLog: s.log.length > 0 && ['quiz','encourage','suggest','friendAsk'].includes(s.step),\n      startQuiz: this.startQuiz,\n      qNum: s.qIndex + 1, qTotal: QUESTIONS.length, qPct: Math.round(((s.qIndex+1)/QUESTIONS.length)*100),\n      question: q ? q.q : '', options,\n      encouragementOptions, customEncourage: s.customEncourage,\n      onCustomEncourageChange: (e) => this.setCustomEncourage(e.target.value),\n      sendCustomEncourage: () => { const v = s.customEncourage.trim().slice(0, 120); if (v) this.sendEncouragement(v); },\n      logEntries,\n      suggestionOptions, customSuggestion: s.customSuggestion,\n      onCustomSuggestionChange: (e) => this.setCustomSuggestion(e.target.value),\n      sendCustomSuggestion: () => { const v = s.customSuggestion.trim().slice(0, 120); if (v) this.sendSuggestion(v); },\n      partnerSuggestion: s.partnerSuggestion,\n      acceptFriend: this.acceptFriend, declineFriend: this.declineFriend,\n      doneTitle, doneSubtitle,\n      goHome: this.props.goHome,\n      handleGoHome: this.handleGoHome,\n    };\n  }\n}\n\n<\/script>\n<\/body>\n<\/html>\n"],["./ScreenPractitioner.dc.html","<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"./support.js\"><\/script>\n<\/head>\n<body>\n<x-dc>\n<helmet>\n  <link href=\"https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap\" rel=\"stylesheet\">\n  <style>\n    @keyframes mh-page-enter{ uot;:1300,&quot;height&quot;:800}}\">\n// See data/*.json — build-index.js inlines them as window.__MOCK_DATA so\n// this keeps working when index.html is opened via file:// with no server.\nfunction mockData(name, fallback) {\n  if (typeof window !== 'undefined' && window.__MOCK_DATA && window.__MOCK_DATA[name]) return window.__MOCK_DATA[name];\n  return fallback;\n}\nconst DEMO_FLAGS = mockData('practitioner-flags', [\n  {patient:'個案 #小明 (patient)', time:'今日 09:42'}, {patient:'個案 #小美 (patient2)', time:'昨日 21:10'},\n]);\nconst APPTS = mockData('practitioner-appointments', [\n  {name:'王小美', time:'14:00'}, {name:'李大同', time:'15:30'}, {name:'張心怡', time:'17:00'},\n]);\n// The logged-in patient's own card is prepended in renderVals() below —\n// these are just the other demo cases.\nconst OTHER_CASES = mockData('practitioner-cases', [\n  {name:'小美', status:'需關注', spiritPower: 85}, {name:'林先生', status:'穩定', spiritPower: 210},\n]);\nconst RESOURCES = mockData('practitioner-resources', ['臨床量表資料庫','個案統計報表']);\n\nclass Component extends DCLogic {\n  state = { onDuty: true, flagsVer: 0, panel: 'overview', alertOn: true, expandedGroup: null };\n  renderVals() {\n    const active = 'padding:11px 12px;border-radius:12px;font:700 13px \\'Noto Sans TC\\';color:#2E4A34;background:#DCE6DB;margin-bottom:2px;cursor:pointer;';\n    const inactive = 'padding:11px 12px;border-radius:12px;font:500 13px \\'Noto Sans TC\\';color:#7C756B;margin-bottom:2px;cursor:pointer;';\n    const items = [\n      {label:'總覽', key:'overview'}, {label:'高危通知', key:'flags'}, {label:'今日預約', key:'appt'},\n      {label:'我的個案', key:'cases'}, {label:'社群互動紀錄', key:'pairing'}, {label:'統計報表', key:'stats'}, {label:'設定', key:'settings'},\n    ];\n    const navItems = items.map(it => ({ label: it.label, onClick: () => this.setState({ panel: it.key }), style: this.state.panel === it.key ? active : inactive }));\n    const titles = { overview:'心理師儀表板', flags:'高危通知', appt:'今日預約', cases:'我的個案', pairing:'社群互動紀錄', stats:'統計報表', settings:'設定' };\n\n    const riskInfo = { high:{label:'高危',bg:'#FBEAE6',fg:'#B5543C'}, medium:{label:'中度',bg:'#FBF0DC',fg:'#B5843A'}, low:{label:'低度',bg:'#DCE6DB',fg:'#2E4A34'} };\n    const pairingGroups = (this.props.pairingGroups || []).map(g => {\n      const ri = riskInfo[g.riskLevel] || riskInfo.low;\n      const expanded = this.state.expandedGroup === g.id;\n      // Mirror the same own-vs-partner distinction used on the patient-side\n      // log so a reviewing practitioner can tell at a glance which lines are\n      // the flagged individual's own answers/messages.\n      const log = (g.log || []).map(entry => ({\n        text: entry.time ? `${entry.text} · ${entry.time}` : entry.text,\n        style: (entry.who === 'you-msg' || entry.who === 'you')\n          ? 'background:#DCE6DB;color:#2E4A34;padding:8px 12px;border-radius:12px;font:500 12px \\'Noto Sans TC\\';align-self:flex-end;'\n          : 'background:#FFFFFF;color:#5C564C;padding:8px 12px;border-radius:12px;font:400 12px \\'Noto Sans TC\\';',\n      }));\n      return {\n        ...g, riskLabel: ri.label, log,\n        badgeStyle: `background:${ri.bg};color:${ri.fg};font:700 11px 'Noto Sans TC';padding:5px 10px;border-radius:999px;flex:none`,\n        expanded, toggleLabel: expanded ? '收合對話紀錄 ▴' : '查看匿名對話紀錄 ▾',\n        onToggle: () => this.setState(s => ({ expandedGroup: s.expandedGroup === g.id ? null : g.id })),\n      };\n    });\n\n    // Read-only for the practitioner (per spec decision) — same expand/collapse\n    // interaction as pairingGroups above, just applied to chatGroups instead.\n    const chatGroups = (this.props.chatGroups || []).map(g => {\n      const expanded = this.state.expandedGroup === g.id;\n      const log = g.messages.map(m => ({\n        text: `${m.isMe ? '個案本人' : m.senderNick}：${m.text} · ${m.time}`,\n        style: m.isMe\n          ? 'background:#DCE6DB;color:#2E4A34;padding:8px 12px;border-radius:12px;font:500 12px \\'Noto Sans TC\\';align-self:flex-end;'\n          : 'background:#FFFFFF;color:#5C564C;padding:8px 12px;border-radius:12px;font:400 12px \\'Noto Sans TC\\';',\n      }));\n      return {\n        id: g.id, name: g.name, memberCount: g.members.length, riskFlag: g.riskFlag, log,\n        visibilityLabel: g.visibility === 'private' ? '私密' : '公開',\n        badgeStyle: `background:${g.riskFlag ? '#FBEAE6' : '#DCE6DB'};color:${g.riskFlag ? '#B5543C' : '#2E4A34'};font:700 11px 'Noto Sans TC';padding:5px 10px;border-radius:999px;flex:none`,\n        riskLabel: g.riskFlag ? '已通報' : '正常',\n        fhirLabel: g.fhirCareTeamStatus === 'synced' ? `✓ CareTeam/${g.fhirCareTeamId}` : g.fhirCareTeamStatus === 'syncing' ? 'CareTeam 同步中…' : '',\n        expanded, toggleLabel: expanded ? '收合聊天紀錄 ▴' : '查看群組聊天紀錄 ▾',\n        onToggle: () => this.setState(s => ({ expandedGroup: s.expandedGroup === g.id ? null : g.id })),\n      };\n    });\n\n    return {\n      goLogout: this.props.goLogout,\n      navItems, headerTitle: titles[this.state.panel],\n      isOverview: this.state.panel==='overview', isFlagsPanel: this.state.panel==='flags',\n      isApptPanel: this.state.panel==='appt', isCasesPanel: this.state.panel==='cases',\n      isPairingPanel: this.state.panel==='pairing', pairingGroups, chatGroups,\n      isStatsPanel: this.state.panel==='stats', isSettingsPanel: this.state.panel==='settings',\n      dutyTrackStyle: `width:36px;height:20px;border-radius:999px;background:${this.state.onDuty?'#557A60':'#C9C2B4'};display:flex;align-items:center;padding:2px;cursor:pointer;justify-content:${this.state.onDuty?'flex-end':'flex-start'}`,\n      dutyDotStyle: 'width:16px;height:16px;border-radius:50%;background:#FBF9F4',\n      toggleDuty: () => this.setState(s => ({ onDuty: !s.onDuty })),\n      miniStats: [\n        {label:'我的個案', val:String(1 + OTHER_CASES.length)}, {label:'高危通知', val:String(DEMO_FLAGS.length + (this.props.extraFlags||[]).length)},\n        {label:'今日預約', val:String(APPTS.length)}, {label:'本月服務', val:'28'},\n      ],\n      flags: [\n        ...(this.props.extraFlags || []),\n        ...DEMO_FLAGS,\n      ].map(f => ({\n        ...f,\n        fhirLabel: f.fhirStatus === 'synced' ? `✓ 已寫入 FHIR Flag/${f.fhirFlagId}`\n          : f.fhirStatus === 'syncing' ? '同步 FHIR 中…'\n          : f.fhirStatus === 'error' ? 'FHIR 同步失敗'\n          : '',\n      })),\n      refreshFlags: () => this.setState(s => ({ flagsVer: s.flagsVer + 1 })),\n      appts: APPTS,\n      cases: [\n        {name: this.props.patientName || '蕭游', status:'穩定', spiritPower: this.props.patientSpiritPower ?? 0},\n        ...OTHER_CASES,\n      ].map(c => ({\n        ...c,\n        badgeStyle: c.status === '需關注'\n          ? 'background:#FBEAE6;color:#B5543C;font:700 11px \\'Noto Sans TC\\';padding:4px 10px;border-radius:999px'\n          : 'background:#DCE6DB;color:#2E4A34;font:700 11px \\'Noto Sans TC\\';padding:4px 10px;border-radius:999px',\n      })),\n      resources: RESOURCES,\n      statBars: [3,5,4,6,5,7,4].map((h,i) => ({ h: h*12, day:['07/05','07/06','07/07','07/08','07/09','07/10','今日'][i] })),\n      toggleAlert: () => this.setState(s => ({ alertOn: !s.alertOn })),\n      alertTrackStyle: `width:40px;height:22px;border-radius:999px;background:${this.state.alertOn?'#557A60':'#C9C2B4'};display:flex;align-items:center;padding:2px;cursor:pointer;justify-content:${this.state.alertOn?'flex-end':'flex-start'}`,\n      alertDotStyle: 'width:18px;height:18px;border-radius:50%;background:#FBF9F4',\n    };\n  }\n}\n\n<\/script>\n<\/body>\n<\/html>\n"],["./ScreenResults.dc.html","<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"./support.js\"><\/script>\n<\/head>\n<body>\n<x-dc>\n<helmet>\n  <link href=\"https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap\" rel=\"stylesheet\">\n  <style>\n    @keyframes mh-page-enter{from{opacity:0;transform:translateY(1 <x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body{margin:0;background:#F4F0E7;font-family:'Noto Sans TC',sans-serif;-webkit-font-smoothing:antialiased}
    *{box-sizing:border-box}
    ::selection{background:#DCE6DB}
    button{font-family:inherit;cursor:pointer}
    input,textarea{font-family:inherit}
    .mh-scroll{scrollbar-width:thin;scrollbar-color:#C9C2B4 transparent}
    .mh-scroll::-webkit-scrollbar{width:6px}
    .mh-scroll::-webkit-scrollbar-track{background:transparent}
    .mh-scroll::-webkit-scrollbar-thumb{background:#DCE6DB;border-radius:4px}
    .mh-scroll::-webkit-scrollbar-thumb:hover{background:#C9C2B4}
    @keyframes mh-pop{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
    @keyframes mh-spin{to{transform:rotate(360deg)}}
    /* Below 640px the floating icon column (friends/pairing/shop/groups/
       companion) turns into a fixed bottom tab bar instead of stacking
       vertically in the corner — position:fixed lifts it out of the
       .mh-fab-wrap flex column, so the companion chat panel (the wrap's
       other child) keeps floating in the corner unaffected. */
    @media (max-width: 640px) {
      .mh-fab-cluster {
        position: fixed !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        flex-direction: row !important;
        align-items: center !important;
        justify-content: space-around !important;
        gap: 6px !important;
        max-width: 100% !important;
        width: 100% !important;
        background: #FBF9F4 !important;
        border-top: 1px solid #E6DECF !important;
        padding: 8px clamp(8px,3vw,16px) !important;
        box-shadow: 0 -4px 16px rgba(0,0,0,.08) !important;
        box-sizing: border-box !important;
      }
      .mh-fab-btn { width: 46px !important; height: 46px !important; box-shadow: none !important; }
      .mh-fab-wrap { bottom: 76px !important; }
    }
  </style>
</helmet>

<div style="position:fixed;inset:0;background:#F4F0E7;display:flex;align-items:center;justify-content:center;overflow:hidden">

const PSS10 = [
  '在過去一個月中，你有多常因為突發事件而感到不安？',

];

// Demo/mock data lives in data/*.json (not hardcoded here) so it's easy to
// grow independently of the component logic. build-index.js inlines those
// files as window.__MOCK_DATA when it bundles index.html, so this still
// works when the app is opened via file:// with no server — mockData()
// only falls back to the literal below if that inlining didn't happen.
function mockData(name, fallback) {
  if (typeof window !== 'undefined' && window.__MOCK_DATA && window.__MOCK_DATA[name]) return window.__MOCK_DATA[name];
  return fallback;
}

const MOCK_CHAT = mockData('companion-chat', [
  '嗨，我是靈光 🌙 今天過得如何呢？有什麼想聊的事，我都在這裡陪你。',

function buildCareTeamResource(patientId, group) {
  return {
    resourceType: 'CareTeam',
    status: 'active',
    name: group.name,
    subject: { reference: `Patient/${patientId}` },
    participant: group.members.map(m => ({ member: { display: m.nick } })),
  };
}

function buildCommunicationResource(patientId, group, text) {
  return {
    resourceType: 'Communication',
    status: 'completed',
    subject: { reference: `Patient/${patientId}` },
    sent: new Date().toISOString(),
    payload: [{ contentString: text }],
    partOf: group.fhirCareTeamId ? [{ reference: `CareTeam/${group.fhirCareTeamId}` }] : undefined,
    note: [{ text: `群組：${group.name}` }],
  };
}

// Public HAPI FHIR R4 sandbox — no backend of our own; the browser talks to it directly (CORS is open).
const FHIR_BASE = 'https://hapi.fhir.org/baseR4';

async function fhirRequest(method, path, body) {
  const res = await fetch(`${FHIR_BASE}/${path}`, {
    method,
    headers: { 'Content-Type': 'application/fhir+json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const text = await res.text().catch(() => '');
    throw new Error(`HTTP ${res.status} ${text.slice(0, 200)}`);
  }
  return res.json();
}

function buildPssQuestionnaireResponse(patientId, answers, questions) {
  return {
    resourceType: 'QuestionnaireResponse',
    questionnaire: 'http://mindharbor.tw/fhir/Questionnaire/pss-10',
    status: 'completed',
    subject: { reference: `Patient/${patientId}` },
    authored: new Date().toISOString(),
    item: answers.map((a, i) => ({
      linkId: `q${i + 1}`,
      text: questions[i],
      answer: [{ valueInteger: a }],
    })),
  };
}

function buildTaskResource(patientId, task) {
  return {
    resourceType: 'Task',
    status: 'completed',
    intent: 'order',
    for: { reference: `Patient/${patientId}` },
    authoredOn: new Date().toISOString(),
    lastModified: new Date().toISOString(),
    code: { text: task.name },
    description: task.desc,
  };
}

function buildSummaryQuestionnaireResponse(patientId, stars, freeText) {
  return {
    resourceType: 'QuestionnaireResponse',
    questionnaire: 'http://mindharbor.tw/fhir/Questionnaire/daily-summary',
    status: 'completed',
    subject: { reference: `Patient/${patientId}` },
    authored: new Date().toISOString(),
    item: [
      { linkId: 'relax', text: '今天有比較放鬆嗎？', answer: [{ valueInteger: stars.relax }] },
      { linkId: 'calmer', text: '做完任務後，心情是否比較平靜？', answer: [{ valueInteger: stars.calmer }] },
      { linkId: 'freeText', text: '今天最讓你有收穫的事情是？', answer: freeText ? [{ valueString: freeText }] : [] },
    ],
  };
}

function buildFlagResource(patientId, reason) {
  return {
    resourceType: 'Flag',
    status: 'active',
    category: [{
      coding: [{ system: 'http://terminology.hl7.org/CodeSystem/flag-category', code: 'behavioral', display: 'Behavioral' }],
    }],
    code: { text: reason },
    subject: { reference: `Patient/${patientId}` },
    period: { start: new Date().toISOString() },
  };
}

function buildPssObservation(patientId, qrId, score, category) {
  const interpretation = {
    low: { code: 'L', display: '低壓力' },
    medium: { code: 'N', display: '中壓力' },
    high: { code: 'H', display: '高壓力' },
  }[category] || { code: 'N', display: '中壓力' };
  return {
    resourceType: 'Observation',
    status: 'final',
    category: [{
      coding: [{ system: 'http://terminology.hl7.org/CodeSystem/observation-category', code: 'survey', display: 'Survey' }],
    }],
    code: {
      coding: [{ system: 'http://mindharbor.tw/fhir/CodeSystem/pss', code: 'pss-10-score', display: 'Perceived Stress Scale (PSS-10) Score' }],
      text: 'PSS-10 壓力量表總分',
    },
    subject: { reference: `Patient/${patientId}` },
    effectiveDateTime: new Date().toISOString(),
    valueInteger: score,
    interpretation: [{
      coding: [{ system: 'http://terminology.hl7.org/CodeSystem/v3-ObservationInterpretation', code: interpretation.code, display: interpretation.display }],
    }],
    derivedFrom: qrId ? [{ reference: `QuestionnaireResponse/${qrId}` }] : undefined,
  };
}

class Component extends DCLogic {
  state = {
    screen: 'marketing',
    gender: 'male',
    name: '蕭游',
    mindDemon: 32,
    spiritPower: 582,
    pssAnswers: Array(10).fill(null),

    summaryFreeText: '',
    summaryDone: false,
    chatOpen: false,

    highRisk: false,

    friends: mockData('friends', [
