<script>
(function () {
  var blobs = {};
  var resources = {};
  var data = [["./ScreenAdmin.dc.html","<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"./support.js\"><\/script>\n<\/head>\n<body>\n<x-dc>\n<helmet>\n  <link href=\"https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap\" rel=\"stylesheet\">\n  <style>\n    @media (max-width: 820px) {\n      .mh-admin-root { flex-direction: column !important; }\n      .mh-admin-sidebar { width: 100% !important; flex-direction: row !important; align-items: center !important; overflow-x: auto !important; padding: 10px 12px !important; gap: 10px !important; }\n      .mh-admin-sidebar .mh-admin-logo { padding: 0 6px !important; flex: none !important; }\n      .mh-admin-main { padding: 18px !important; }\n    }\n  <\/style>\n<\/helmet>\n<div class=\"mh-admin-root\" style=\"position:absolute;inset:0;overflow-y:auto;box-sizing:border-box;display:flex;background:#F4F0E7;font-family:'Noto Sans TC',sans-serif\" data-screen-label=\"管理員端 Dashboard\">\n\n  <div class=\"mh-admin-sidebar\" style=\"width:220px;flex:none;background:#2E2A24;padding:24px 16px;display:flex;flex-direction:column;gap:2px\">\n    <div class=\"mh-admin-logo\" style=\"display:flex;align-items:center;gap:10px;padding:6px 10px 20px\">\n      <div style=\"width:30px;height:30px;border-radius:9px;background:url('./img/logo.png') center/cover no-repeat,linear-gradient(135deg,#88AE8E,#557A60);flex:none\"><\/div>\n      <div style=\"font:700 16px 'Quicksand';color:#FBF9F4;white-space:nowrap\">MindHarbor<\/div>\n    <\/div>\n    <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"7\">\n      <div onClick=\"{{ item.onClick }}\" style=\"{{ item.style }}white-space:nowrap;flex:none\">{{ item.label }}<\/div>\n    <\/sc-for>\n  <\/div>\n\n  <div class=\"mh-admin-main\" style=\"flex:1;min-width:0;padding:clamp(20px,4vw,36px) clamp(16px,4vw,44px);max-width:1600px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:22px\">\n      <div style=\"font:700 clamp(22px,4vw,28px) 'Quicksand';color:#423D37\">{{ headerTitle }}<\/div>\n      <div style=\"display:flex;align-items:center;gap:8px;font:600 13px 'Noto Sans TC';color:#7C756B;flex:none\"><div style=\"width:26px;height:26px;border-radius:50%;background:url('./img/avatar-admin.png') center/cover no-repeat,#DCE6DB;flex:none\"><\/div>Admin<\/div>\n    <\/div>\n\n    <sc-if value=\"{{ isOverview }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px\">\n        <sc-for list=\"{{ miniStats }}\" as=\"stat\" hint-placeholder-count=\"4\">\n          <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:16px;padding:18px\">\n            <div style=\"font:600 12px 'Noto Sans TC';color:#7C756B\">{{ stat.label }}<\/div>\n            <div style=\"font:700 26px 'Quicksand';color:#423D37;margin-top:6px\">{{ stat.val }}<\/div>\n            <div style=\"font:600 11px 'Noto Sans TC';color:#557A60;margin-top:2px\">{{ stat.delta }}<\/div>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px\">\n        <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:18px;padding:22px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px\">\n            <div style=\"font:700 16px 'Quicksand'\">系統使用趨勢<\/div>\n            <div style=\"font:600 12px 'Noto Sans TC';color:#7C756B\">近 7 天<\/div>\n          <\/div>\n          <div style=\"display:flex;align-items:flex-end;gap:10px;height:140px;padding-top:10px\">\n            <sc-for list=\"{{ trendBars }}\" as=\"b\" hint-placeholder-count=\"7\">\n              <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%\">\n                <div style=\"width:100%;background:#9CC3A0;border-radius:6px 6px 0 0;height:{{ b.h }}%\"><\/div>\n                <div style=\"font:500 10px 'Noto Sans TC';color:#9A9385;margin-top:6px\">{{ b.day }}<\/div>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n        <\/div>\n        <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:18px;padding:22px\">\n          <div style=\"font:700 16px 'Quicksand';margin-bottom:14px\">FHIR 資源統計<\/div>\n          <sc-for list=\"{{ fhirCounts }}\" as=\"f\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;gap:14px;padding:8px 0;border-bottom:1px solid #F0EBE0;font:500 13px 'Noto Sans TC'\">\n              <div style=\"color:#5C564C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ f.type }}<\/div>\n              <div style=\"color:#423D37;font-weight:700;flex:none;white-space:nowrap\">{{ f.count }}<\/div>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ isUsers }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:18px;padding:22px;max-width:640px\">\n        <div style=\"font:700 16px 'Quicksand';margin-bottom:14px\">使用者列表<\/div>\n        <sc-for list=\"{{ users }}\" as=\"u\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #F0EBE0\">\n            <div style=\"font:600 13px 'Noto Sans TC';color:#423D37\">{{ u.name }}<\/div>\n            <div style=\"font:500 12px 'Noto Sans TC';color:#7C756B\">心魔 {{ u.demon }} · 靈力 {{ u.spirit }}<\/div>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ isPractitioners }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:18px;padding:22px;max-width:640px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px\">\n          <div style=\"font:700 16px 'Quicksand'\">心理師管理<\/div>\n          <button onClick=\"{{ addPractitioner }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:9px 16px;border-radius:999px;font:600 12px 'Noto Sans TC'\">＋ 新增心理師<\/button>\n        <\/div>\n        <sc-for list=\"{{ practitioners }}\" as=\"pr\" hint-placeholder-count=\"2\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #F0EBE0\">\n            <div style=\"font:600 13px 'Noto Sans TC';color:#423D37\">{{ pr.name }}<\/div>\n            <div style=\"font:500 12px 'Noto Sans TC';color:#7C756B\">{{ pr.account }}<\/div>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ isFlags }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:18px;padding:22px;max-width:640px\">\n        <div style=\"font:700 16px 'Quicksand';margin-bottom:14px\">高危事件<\/div>\n        <sc-for list=\"{{ flags }}\" as=\"f\" hint-placeholder-count=\"2\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #F0EBE0\">\n            <div style=\"font:600 13px 'Noto Sans TC';color:#423D37\">{{ f.patient }}<\/div>\n            <div style=\"{{ f.badgeStyle }}\">{{ f.status }}<\/div>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ isFhirTools }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;max-width:900px\">\n        <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:18px;padding:22px\">\n          <div style=\"font:700 16px 'Quicksand';margin-bottom:14px\">查詢 FHIR 資源<\/div>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px\">\n            <sc-for list=\"{{ fhirTypes }}\" as=\"t\" hint-placeholder-count=\"8\">\n              <div onClick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\/div>\n            <\/sc-for>\n          <\/div>\n          <div style=\"font:600 12px 'Noto Sans TC';color:{{ fhirQueryStatusColor }};margin-bottom:10px\">{{ fhirQueryStatusText }}<\/div>\n          <sc-if value=\"{{ hasFhirEntries }}\" hint-placeholder-val=\"{{ false }}\">\n            <div class=\"mh-scroll\" style=\"max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;background:#F4F0E7;border-radius:10px;padding:10px\">\n              <sc-for list=\"{{ fhirEntries }}\" as=\"e\" hint-placeholder-count=\"3\">\n                <div style=\"font:400 11px/1.5 monospace;color:#5C564C;word-break:break-all;border-bottom:1px dashed #E6DECF;padding-bottom:6px\">\n                  <div style=\"font-weight:700;color:#423D37\">{{ e.title }}<\/div>\n                  <div>{{ e.subtitle }}<\/div>\n                <\/div>\n              <\/sc-for>\n            <\/div>\n          <\/sc-if>\n        <\/div>\n        <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:18px;padding:22px\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n            <div style=\"{{ fhirModeDotStyle }}\"><\/div>\n            <div style=\"font:700 16px 'Quicksand'\">FHIR 資料模式<\/div>\n          <\/div>\n          <div style=\"font:400 13px/1.7 'Noto Sans TC';color:#7C756B\">{{ fhirModeLabel }}<\/div>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ isReports }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:18px;padding:22px;max-width:640px\">\n        <div style=\"font:700 16px 'Quicksand';margin-bottom:16px\">數據報表<\/div>\n        <div style=\"display:flex;align-items:flex-end;gap:12px;height:140px\">\n          <sc-for list=\"{{ trendBars }}\" as=\"b\" hint-placeholder-count=\"7\">\n            <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%\">\n              <div style=\"width:100%;background:#557A60;border-radius:6px 6px 0 0;height:{{ b.h }}%\"><\/div>\n              <div style=\"font:500 10px 'Noto Sans TC';color:#9A9385;margin-top:6px\">{{ b.day }}<\/div>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n        <div style=\"font:400 12px 'Noto Sans TC';color:#7C756B;margin-top:10px\">全站每日活躍使用者數<\/div>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ isSystemSettings }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:480px;display:flex;flex-direction:column;gap:16px\">\n        <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:18px;padding:22px;display:flex;justify-content:space-between;align-items:center\">\n          <div>\n            <div style=\"font:700 14px 'Noto Sans TC';color:#423D37\">維護模式<\/div>\n            <div style=\"font:400 12px 'Noto Sans TC';color:#7C756B;margin-top:2px\">開啟後僅管理員可登入系統<\/div>\n          <\/div>\n          <div onClick=\"{{ toggleMaintenance }}\" style=\"{{ maintTrackStyle }}\"><div style=\"{{ maintDotStyle }}\"><\/div><\/div>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n  <\/div>\n<\/div>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1300,&quot;height&quot;:800}}\">\nconst FHIR_TYPES = ['Patient','Observation','QuestionnaireResponse','CarePlan','RiskAssessment','Task','Flag','Appointment'];\nconst FHIR_COUNTS = {Patient:892, Observation:3456, QuestionnaireResponse:1248, CarePlan:2345, RiskAssessment:745, Task:1876, Flag:64, Appointment:312};\nconst FHIR_BASE = 'https://hapi.fhir.org/baseR4';\nconst LIVE_FHIR_TYPES = ['QuestionnaireResponse', 'Observation'];\n\nclass Component extends DCLogic {\n  state = { panel: 'overview', selectedFhirType: 'Patient', maintenance: false, liveResults: {} };\n\n  loadLiveType = (type) => {\n    const patientId = this.props.fhirPatientId;\n    if (!patientId || !LIVE_FHIR_TYPES.includes(type)) return;\n    this.setState(s => ({ liveResults: { ...s.liveResults, [type]: { loading: true, error: null } } }));\n    fetch(`${FHIR_BASE}/${type}?subject=Patient/${patientId}&_sort=-_lastUpdated&_count=20`, { headers: { Accept: 'application/fhir+json' } })\n      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })\n      .then(bundle => {\n        const entries = (bundle.entry || []).map(e => e.resource);\n        this.setState(s => ({ liveResults: { ...s.liveResults, [type]: { loading: false, error: null, count: bundle.total ?? entries.length, entries } } }));\n      })\n      .catch(err => {\n        this.setState(s => ({ liveResults: { ...s.liveResults, [type]: { loading: false, error: (err && err.message) || String(err) } } }));\n      });\n  };\n\n  renderVals() {\n    const active = 'padding:11px 12px;border-radius:12px;font:700 13px \\'Noto Sans TC\\';color:#FBF9F4;background:#557A60;margin-bottom:2px;cursor:pointer;';\n    const inactive = 'padding:11px 12px;border-radius:12px;font:500 13px \\'Noto Sans TC\\';color:#B8B2A4;margin-bottom:2px;cursor:pointer;';\n    const items = [\n      {label:'總覽', key:'overview'}, {label:'使用者管理', key:'users'}, {label:'心理師管理', key:'practitioners'},\n      {label:'高危事件', key:'flags'}, {label:'FHIR 工具', key:'fhirtools'}, {label:'數據報表', key:'reports'}, {label:'系統設定', key:'settings'},\n    ];\n    const navItems = items.map(it => ({ label: it.label, onClick: () => this.setState({ panel: it.key }), style: this.state.panel === it.key ? active : inactive }));\n    const titles = { overview:'管理員面板', users:'使用者管理', practitioners:'心理師管理', flags:'高危事件', fhirtools:'FHIR 工具', reports:'數據報表', settings:'系統設定' };\n\n    const trendBars = [22,38,30,55,48,62,45].map((h,i) => ({h, day:['07/05','07/06','07/07','07/08','07/09','07/10','07/11'][i]}));\n    const fhirTypes = FHIR_TYPES.map(t => ({\n      label: t, onClick: () => { this.setState({ selectedFhirType: t }); this.loadLiveType(t); },\n      style: `padding:7px 12px;border-radius:999px;font:600 11px 'Noto Sans TC';cursor:pointer;background:${this.state.selectedFhirType===t?'#557A60':'#EDE4D8'};color:${this.state.selectedFhirType===t?'#FBF9F4':'#5C564C'}`,\n    }));\n\n    const selectedType = this.state.selectedFhirType;\n    const isLiveType = LIVE_FHIR_TYPES.includes(selectedType);\n    const patientId = this.props.fhirPatientId;\n    const live = this.state.liveResults[selectedType];\n    let fhirQueryStatusText, fhirQueryStatusColor, fhirEntries = [];\n    if (!isLiveType) {\n      fhirQueryStatusText = `${FHIR_COUNTS[selectedType]} 筆 ${selectedType} 資源（示範資料，尚未串接真實伺服器）`;\n      fhirQueryStatusColor = '#9A9385';\n    } else if (!patientId) {\n      fhirQueryStatusText = '尚無真實資料：請先在個案端完成一次 PSS-10 壓力量表';\n      fhirQueryStatusColor = '#9A9385';\n    } else if (!live || live.loading) {\n      fhirQueryStatusText = '查詢中…';\n      fhirQueryStatusColor = '#7C756B';\n    } else if (live.error) {\n      fhirQueryStatusText = `查詢失敗：${live.error}`;\n      fhirQueryStatusColor = '#B5543C';\n    } else {\n      fhirQueryStatusText = `${live.count} 筆 ${selectedType} 資源（來自 HAPI FHIR R4 公開測試伺服器，即時查詢）`;\n      fhirQueryStatusColor = '#557A60';\n      fhirEntries = live.entries.map(r => r.resourceType === 'QuestionnaireResponse'\n        ? { title: `QuestionnaireResponse/${r.id}`, subtitle: `authored: ${r.authored || '-'}` }\n        : { title: `Observation/${r.id}`, subtitle: `${(r.code && (r.code.text || (r.code.coding && r.code.coding[0] && r.code.coding[0].display))) || ''}: ${r.valueInteger ?? '-'}　effective: ${r.effectiveDateTime || '-'}` });\n    }\n\n    return {\n      navItems, headerTitle: titles[this.state.panel],\n      isOverview: this.state.panel==='overview', isUsers: this.state.panel==='users',\n      isPractitioners: this.state.panel==='practitioners', isFlags: this.state.panel==='flags',\n      isFhirTools: this.state.panel==='fhirtools', isReports: this.state.panel==='reports', isSystemSettings: this.state.panel==='settings',\n      miniStats: [\n        {label:'Users', val:'1,248', delta:'↑12.5%'}, {label:'Patients', val:'892', delta:'↑8.3%'},\n        {label:'Practitioners', val:'156', delta:'↑4.8%'}, {label:'FHIR 資源', val:'12,540', delta:'↑23.1%'},\n      ],\n      trendBars,\n      fhirCounts: [\n        {type:'Patient', count:'892'}, {type:'Observation', count:'3,456'}, {type:'QuestionnaireResponse', count:'1,248'},\n        {type:'CarePlan', count:'2,345'}, {type:'RiskAssessment', count:'745'},\n      ],\n      users: [\n        {name:'小明 (patient)', demon:45, spirit:120}, {name:'小美 (patient2)', demon:38, spirit:85},\n        {name:'王先生', demon:52, spirit:60}, {name:'林小姐', demon:29, spirit:210},\n      ],\n      practitioners: [ {name:'陳心理師', account:'doctor'}, {name:'林心理師', account:'lin.doc'} ],\n      addPractitioner: () => this.setState(s => ({ practitionersVer: (s.practitionersVer||0)+1 })),\n      flags: [\n        {patient:'個案 #小明', status:'待處理', badgeStyle:'background:#FBEAE6;color:#B5543C;font:700 11px \\'Noto Sans TC\\';padding:4px 10px;border-radius:999px'},\n        {patient:'個案 #小美', status:'已解決', badgeStyle:'background:#DCE6DB;color:#2E4A34;font:700 11px \\'Noto Sans TC\\';padding:4px 10px;border-radius:999px'},\n      ],\n      fhirTypes,\n      selectedFhirType: selectedType,\n      fhirQueryStatusText, fhirQueryStatusColor, fhirEntries, hasFhirEntries: fhirEntries.length > 0,\n      fhirModeLabel: patientId\n        ? `已與 HAPI FHIR R4 公開測試伺服器同步 — Patient/${patientId}`\n        : '尚未同步：個案端完成一次 PSS-10 壓力量表後，系統會自動建立真實 FHIR 資源（Patient / QuestionnaireResponse / Observation），並可在左側查詢。',\n      fhirModeDotStyle: `width:12px;height:12px;border-radius:50%;background:${patientId ? '#557A60' : '#C9C2B4'}`,\n      toggleMaintenance: () => this.setState(s => ({ maintenance: !s.maintenance })),\n      maintTrackStyle: `width:40px;height:22px;border-radius:999px;background:${this.state.maintenance?'#B5543C':'#C9C2B4'};display:flex;align-items:center;padding:2px;cursor:pointer;justify-content:${this.state.maintenance?'flex-end':'flex-start'}`,\n      maintDotStyle: 'width:18px;height:18px;border-radius:50%;background:#FBF9F4',\n    };\n  }\n}\n\n<\/script>\n<\/body>\n<\/html>\n"],["./ScreenChat.dc.html","<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"./support.js\"><\/script>\n<\/head>\n<body>\n<x-dc>\n<helmet>\n  <link href=\"https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap\" rel=\"stylesheet\">\n<\/helmet>\n<div style=\"position:absolute;inset:0;overflow-y:auto;box-sizing:border-box;background:#F4F0E7;font-family:'Noto Sans TC',sans-serif;padding:clamp(20px,5vw,40px) clamp(12px,4vw,24px) 90px\" data-screen-label=\"對話與壓力量表\">\n\n  <!-- steps -->\n  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:30px\">\n    <div onClick=\"{{ goHome }}\" style=\"flex:none;display:flex;align-items:center;gap:6px;color:#7C756B;font:600 13px 'Noto Sans TC';cursor:pointer;white-space:nowrap\">‹ 返回首頁<\/div>\n    <div style=\"display:flex;gap:clamp(4px,2vw,10px);overflow-x:auto;flex:none;max-width:60%\">\n      <sc-for list=\"{{ steps }}\" as=\"step\" hint-placeholder-count=\"4\">\n        <div style=\"display:flex;align-items:center;gap:6px;flex:none\">\n          <div style=\"{{ step.style }}flex:none\">{{ step.n }}<\/div>\n          <div style=\"font:600 clamp(10px,2.5vw,12px) 'Noto Sans TC';color:{{ step.color }};white-space:nowrap\">{{ step.label }}<\/div>\n        <\/div>\n      <\/sc-for>\n    <\/div>\n  <\/div>\n\n  <div style=\"max-width:640 bmitPss }}\" style=\"{{ submitStyle }}\">計算壓力值<\/button>\n        <\/sc-if>\n        <sc-if value=\"{{ !isLastQuestion }}\" hint-placeholder-val=\"{{ true }}\">\n          <button onClick=\"{{ nextPss }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:12px 26px;border-radius:999px;font:600 13px 'Noto Sans TC'\">下一題<\/button>\n        <\/sc-if>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ pssScore }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center;padding:20px 0\">\n        <div style=\"width:110px;height:110px;border-radius:50%;background:{{ resultBg }};display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px\">\n          <div style=\"font:700 30px 'Quicksand';color:#fff\">{{ pssScore }}<\/div>\n          <div style=\"font:600 11px 'Noto Sans TC';color:#fff\">/ 40<\/div>\n        <\/div>\n        <div style=\"font:700 20px 'Quicksand';color:{{ resultTextColor }};margin-bottom:8px\">{{ resultLabel }}<\/div>\n        <div style=\"font:600 13px 'Noto Sans TC';color:{{ fhirStatusColor }};margin-bottom:10px\">{{ fhirStatusText }}<\/div>\n        <sc-if value=\"{{ fhirSynced }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#F4F0E7;border:1px solid #E6DECF;border-radius:12px;padding:12px 14px;margin-bottom:20px;text-align:left;font:400 11px/1.6 monospace;color:#5C564C;word-break:break-all\">\n            QuestionnaireResponse/{{ fhirQrId }}<br>Observation/{{ fhirObsId }}\n          <\/div>\n        <\/sc-if>\n        <sc-if value=\"{{ !fhirSynced }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-bottom:20px\"><\/div>\n        <\/sc-if>\n        <button onClick=\"{{ goNext }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:14px 30px;border-radius:999px;font:700 14px 'Noto Sans TC'\">下一步：每日任務 ›<\/button>\n      <\/div>\n    <\/sc-if>\n  <\/div>\n\n  <!-- floating chat FAB -->\n  <div style=\"position:absolute;right: utton onClick=\"{{ sendChat }}\" style=\"border:none;background:#557A60;color:#FBF9F4;width:38px;height:38px;border-radius:50%;font:700 15px 'Noto Sans TC'\">➤<\/button>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n  <\/div>\n<\/div>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:900}}\">\nconst PSS10 = [\n  '你有多常因為突發事件而感到不安？',\n  '你有多常感覺無法掌控生活中重要的事情？',\n  '你有多常感到緊張與壓力大？',\n  '你有多常有信心能處理個人問題？',\n  '你有多常感覺事情正朝你希望的方向發展？',\n  '你有多常發現自己無法應付所有該做的事？',\n  '你有多常能夠控制生活中令人惱怒的事？',\n  '你有多常感覺自己掌握全局？',\n  '你有多常因為超出掌控的事而生氣？',\n  '你有多常感覺困難堆積如山，無法克服？',\n];\nconst OPTS = [\n  {label:'從不', emoji:'🙂', slug:'never'},\n  {label:'很少', emoji:'😌', slug:'rarely'},\n  {label:'有時', emoji:'😐', slug:'sometimes'},\n  {label:'常常', emoji:'😟', slug:'often'},\n  {label:'幾乎總是', emoji:'😣', slug:'always'},\n];\n\nclass Component extends DCLogic {\n  renderVals() {\n    const p = this.props;\n    const idx = p.pssIndex;\n    const current = p.pssAnswers[idx];\n\n    const options = OPTS.map((o, i) => ({\n      label: `${o.label}\\n${i}分`, emoji: o.emoji,\n      imgLayer: `url('./img/pss-${o.slug}.png') center/cover no-repeat`,\n      onSelect: () => p.selectPss(i),\n      style: `border:${current===i?'2px solid #557A60':'1px solid #E6DECF'};background:${current===i?'#DCE6DB':'#FBF9F4'};color:#423D37;border-radius:16px;padding:14px 6px;text-align:center;`\n    }));\n\n    const stepDefs = [\n      {label:'聊天', done:true}, {label:'量表', done: !p.pssScore, current: !p.pssScore},\n      {label:'總結', done:false}, {label:'結算', done:false},\n    ];\n    const steps = stepDefs.map((s,i) => ({\n      n: i+1, label: s.label,\n      color: p.pssScore ? '#7C756B' : (s.current || i<2 ? '#557A60' : '#C9C2B4'),\n      style: `width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:700 12px 'Noto Sans TC';color:#fff;background:${i<2?'#557A60':'#C9C2B4'}`\n    }));\n\n    const category = p.pssCategory;\n    const resultBg = category === 'high' ? '#E07070' : category === 'medium' ? '#F4A261' : '#6ECBAF';\n    const resultLabel = category === 'high' ? '高壓力' : category === 'medium' ? '中等壓力' : '低壓力，狀態穩定';\n\n    const fhirStatusText = p.fhirStatus === 'syncing'\n      ? '同步中… 正在寫入 FHIR 伺服器（QuestionnaireResponse / Observation）'\n      : p.fhirStatus === 'synced'\n      ? `✓ 已同步至 HAPI FHIR R4 公開測試伺服器（${p.fhirSyncedAt}）`\n      : p.fhirStatus === 'error'\n      ? `⚠ FHIR 同步失敗，僅保存於本機（${p.fhirError || '網路異常'}）`\n      : '量表已完成';\n    const fhirStatusColor = p.fhirStatus === 'synced' ? '#557A60' : p.fhirStatus === 'error' ? '#B5543C' : '#7C756B';\n    const fhirSynced = p.fhirStatus === 'synced';\n\n    const chatMessages = p.chatMessages.map(m => ({\n      text: m.text,\n      style: m.from === 'ai'\n        ? 'background:#EDE8DE;color:#423D37;padding:10px 14px;border-radius:14px 14px 14px 4px;font:400 13px/1.5 \\'Noto Sans TC\\';align-self:flex-start;max-width:85%;'\n        : 'background:#557A60;color:#FBF9F4;padding:10px 14px;border-radius:14px 14px 4px 14px;font:400 13px/1.5 \\'Noto Sans TC\\';align-self:flex-end;max-width:85%;'\n    }));\n\n    return {\n      qNum: idx+1, progressPct: Math.round(((idx+1)/10)*100),\n      question: PSS10[idx], options,\n      isLastQuestion: idx === 9,\n      submitStyle: `border:none;background:${p.pssAnswers.every(a=>a!==null)?'#557A60':'#C9C2B4'};color:#FBF9F4;padding:12px 26px;border-radius:999px;font:600 13px 'Noto Sans TC'`,\n      prevPss: p.prevPss, nextPss: p.nextPss, submitPss: p.submitPss,\n      pssScore: p.pssScore, resultBg, resultLabel, resultTextColor: resultBg,\n      fhirStatusText, fhirStatusColor, fhirSynced, fhirQrId: p.fhirQrId, fhirObsId: p.fhirObsId,\n      goNext: p.goNext,\n      steps,\n      chatOpen: p.chatOpen, toggleChat: p.toggleChat, chatMessages,\n      chatDraft: p.chatDraft, onDraftChange: (e) => p.setDraft(e.target.value),\n      onKeyDown: (e) => { if (e.key === 'Enter') p.sendChat() ) {\n    return {\n      hotlines: [\n        {name:'1925 安心專線', desc:'24小時免費，情緒支持與危機諮詢', number:'1925', tel:'tel:1925'},\n        {name:'1995 生命線', desc:'24小時危機支援', number:'1995', tel:'tel:1995'},\n        {name:'1980 張老師專線', desc:'傾聽陪伴、專業輔導', number:'1980', tel:'tel:1980'},\n      ],\n      goTasks: this.props.goTasks, goHome: this.props.goHome,\n    };\n  }\n}\n\n<\/script>\n<\/body>\n<\/html>\n"],["./ScreenDashboard.dc.html","<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"./support.js\"><\/script>\n<\/head>\n<body>\n<x-dc>\n<helmet>\n  <link href=\"https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap\" rel=\"stylesheet\">\n  <style>\n    @media (max-width: 820px) {\n      .mh-dash-root { flex-direction: column !important; }\n      .mh-dash-sidebar { width: 100% !important; flex-direction: row !important; align-items: center !important; overflow-x: auto !important; border-right: none !important; border-bottom: 1px solid rgba(0,0,0,.08) !important; padding: 10px 12px !important; gap: 10px !important; }\n      .mh-dash-sidebar .mh-dash-logo { padding: 0 6px !important; flex: none !important; }\n      .mh-dash-sidebar .mh-dash-profile { margin-top: 0 !important; margin-left: auto !important; border-top: none !important; flex: none !important; padding: 0 0 0 10px !important; }\n      .mh-dash-main { padding: 18px !important; }\n    }\n  <\/style>\n<\/helmet>\n<div class=\"mh-dash-root\" style=\"position:absolute;inset:0;overflow-y:auto;box-sizing:border-box;display:flex;background:url('./img/bg-dashboard.jpg') center/cover no-repeat,{{ theme.canvas }};font-family:'Noto Sans TC',sans-serif;transition:background .2s\" data-screen-label=\"個案 Dashboard\">\n\n  <!-- sidebar -->\n  <div class=\"mh-dash-sidebar\" style=\"width:220px;flex:none;background:{{ theme.surface }};border-right:1px solid {{ theme.bor    <div style=\"position:absolute;inset:2px 0 0;width:14px;height:10px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#E28A76,#B5453A)\"><\/div>\n              <\/div>\n            <\/div>\n          <\/div>\n          <div>\n            <div style=\"font:600 9px 'Noto Sans TC';color:{{ theme.textSoft }};line-height:1.2\">心魔指數<\/div>\n            <div style=\"font:700 13px 'Quicksand';color:#9A6B54;line-height:1.2\">{{ mindDemon }}%<\/div>\n          <\/div>\n        <\/div>\n        <div style=\"display:flex;align-items:center;gap:8px;background:{{ theme.surface }};border:1px solid {{ theme.border }};border-radius:999px;padding:6px 14px 6px 6px\">\n          <div style=\"width:34px;height:34px;border-radius:50%;background:conic-gradient(#6FA37C {{ spiritDeg }}deg, {{ theme.track }} 0deg);display:flex;align-items:center;justify-content:center\">\n            <div style=\"width:24px;height:24px;border-radius:50%;background:{{ theme.surface }};display:flex;align-items:center;justify-content:center\">\n              <div style=\"position:relative;width:13px;height:13px\">\n                <div style=\"position:absolute;left:50%;top:0;transform:translateX(-50%);width:7px;height:2.5px;border-radius:50%;border:1.2px solid #E8C766;box-sizing:border-box\"><\/div>\n                <div style=\"position:absolute;left:0;top:3px;width:13px;height:10px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#BFE0C4,#6FA37C)\"><\/div>\n              <\/div>\n            <\/div>\n          <\/div>\n          <div>\n            <div style=\"font:600 9px 'Noto Sans TC';color:{{ theme.textSoft }};line-height:1.2\">靈力點數<\/div>\n            <div style=\"font:700 13px 'Quicksand';color:#557A60;line-height:1.2\">{{ spiritPower }}<\/div>\n          <\/div>\n        <\/div>\n        <button onClick=\"{{ onCheckin }}\" style=\"{{ checkinBtnStyle }}\">{{ checkinBtnLabel }}<\/button>\n      <\/div>\n    <\/div>\n\n    <sc-if value=\"{{ isOverview }}\" hint-placeholder-val=\"{{ true }}\">\n      <sc-if value=\"{{ highRisk }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onClick=\"{{ goCrisis }}\" style=\"background:#FBEAE6;border:1px solid #E8B7A9;border-radius:16px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer\">\n          <div style=\"font:600 14px 'Noto Sans TC';color:#B5543C\">偵測到高壓力，已通知心理師 — 點此查看求助資源<\/div>\n          <div style=\"font:600 13px 'Noto Sans TC';color:#B5543C\">前往 ›<\/div>\n        <\/div>\n      <\/sc-if>\n\n      <div style=\"background:{{ theme.surface }};border:1px solid {{ theme.border }};border-radius:18px;padding:20px 24px;margin-bottom:24px;font:500 15px 'Noto Sans TC';color:{{ theme.textSoft }};font-style:italic\">\n        「每一次面對自己，都是一次內在修練。」\n      <\/div>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px\">\n        <div onClick=\"{{ goChat }}\" style=\"background:{{ theme.surface }};border:1px solid {{ theme.border }};border-radius:18px;padding:20px;cursor:pointer\">\n          <div style=\"font:700 15px 'Quicksand';margin-bottom:6px;color:{{ theme.text }}\">今日聊天<\/div>\n          <div style=\"font:400 12px 'Noto Sans TC';color:{{ theme.textSoft }};margin-bottom:16px\">與 AI 靈光對話，傾訴心情、獲得陪伴<\/div>\n          <div style=\"font:600 13px 'Noto Sans TC';color:#557A60\">開始聊天 ›<\/div>\n        <\/div>\n        <div onClick=\"{{ goChat }}\" style=\"background:{{ theme.surface }};border:1px solid {{ theme.border }};border-radius:18px;padding:20px;cursor:pointer\">\n          <div style=\"font:700 15px 'Quicksand';margin-bottom:6px;color:{{ theme.text }}\">壓力量表<\/div>\n          <div style=\"font:400 12px 'Noto Sans TC';color:{{ theme.textSoft }};margin-bottom:16px\">完成 PSS-10 評估，了解今日壓力狀態<\/div>\n          <div style=\"font:600 13px 'Noto Sans TC';color:#557A60\">{{ scaleCta }}<\/div>\n        <\/div>\n        <div onClick=\"{{ goTasks }}\" style=\"background:{{ theme.surface }};border:1px solid {{ theme.border }};border-radius:18px;padding:20px;cursor:pointer\">\n          <div style=\"font:700 15px 'Quicksand';margin-bottom:6px;color:{{ theme.text }}\">每日任務<\/div>\n          <div style=\"font:400 12px 'Noto Sans TC';color:{{ theme.textSoft }};margin-bottom:16px\">修練身心習慣，累積靈力、平緩心魔<\/div>\n          <div style=\"font:600 13px 'Noto Sans TC';color:#557A60\">{{ tasksLabel }}<\/div>\n        <\/div>\n        <div onClick=\"{{ goResultsOrTasks }}\" style=\"background:{{ theme.surface }};border:1px solid {{ theme.border }};border-radius:18px;padding:20px;cursor:pointer\">\n          <div style=\"font:700 15px 'Quicksand';margin-bottom:6px;color:{{ theme.text }}\">今日總結<\/div>\n          <div style=\"font:400 12px 'Noto Sans TC';color:{{ theme.textSoft }};margin-bottom:16px\">反思與總結今日心得，讓成長被看見<\/div>\n          <div style=\"font:600 13px 'Noto Sans TC';color:#557A60\">{{ summaryLabel }}<\/div>\n        <\/div>\n      <\/div>\n\n      <div style=\"background:{{ theme.surface }};border:1px solid {{ theme.border }};border-radius:20px;padding:24px;margin-top:20px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px\">\n          <div style=\"font:700 16px 'Quicksand';color:{{ theme.text }}\">好友動態<\/div>\n          <div onClick=\"{{ openFriends }}\" style=\"font:600 12px 'Noto Sans TC';color:#557A60;cursor:pointer\">查看全部好友 ›<\/div>\n        <\/div>\n        <sc-if value=\"{{ friends.length }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px\">\n            <sc-for list=\"{{ friendActivity }}\" as=\"f\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex;align-items:center;gap:12px;background:{{ theme.canvas }};border-radius:14px;padding:12px 14px\">\n                <div style=\"position:relative;flex:none\">\n                  <div style=\"width:40px;height:40px;border-radius:50%;background:{{ f.avatarLayer }}radial-gradient(circle at 35% 30%,#D19A76,#9A6B54)\"><\/div>\n                  <div style=\"{{ f.dotStyle }}\"><\/div>\n                <\/div>\n                <div>\n                  <div style=\"font:700 13px 'Noto Sans TC';color:{{ theme.text }}\">{{ f.nick }}<\/div>\n                  <div style=\"font:400 11px 'Noto Sans TC';color:{{ theme.textSoft }}\">{{ f.statusText }}<\/div>\n                <\/div>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n        <\/sc-if>\n        <sc-if value=\"{{ !friends.length }}\" hint-placeholder-val=\"{{ false }}\">\n          <div onClick=\"{{ goPairing }}\" style=\"border:1px dashed {{ theme.border }};border-radius:14px;padding:22px;text-align:center;font:400 13px 'Noto Sans TC';color:{{ theme.textSoft }};cursor:pointer\">\n            還沒有好友，去「紓壓配對」認識新旅伴吧 ›\n          <\/div>\n        <\/sc-if>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ isGrowth }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:{{ theme.surface }};border:1px solid {{ theme.border }};border-radius:20px;padding:26px\">\n        <div style=\"font:700 16px 'Quicksand';margin-bottom:18px;color:{{ theme.text }}\">近 7 天心魔 / 靈力趨勢<\/div>\n        <div style=\"display:flex;align-items:flex-end;gap:14px;height:160px\">\n          <sc-for list=\"{{ growthBars }}\" as=\"b\" hint-placeholder-count=\"7\">\n            <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:4px\">\n              <div style=\"width:100%;background:{{ theme.track }};border-radius:6px 6px 0 0;height:{{ b.demonH }}%\"><\/div>\n              <div style=\"width:100%;background:#9CC3A0;border-radius:6px 6px 0 0;height:{{ b.spiritH }}%\"><\/div>\n              <div style=\"font:500 10px 'Noto Sans TC';color:{{ theme.textSoft }};margin-top:4px\">{{ b.day }}<\/div>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n        <div style=\"display:flex;gap:18px;ma tyle=\"line-height:2\">Facebook · Instagram · Line<\/div>\n    <\/div>\n  <\/div>\n<\/div>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1400,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  heroRef = React.createRef();\n  rootRef = React.createRef();\n  heroSectionRef = React.createRef();\n  servicesRef = React.createRef();\n  aboutRef = React.createRef();\n  comingSoonRef = React.createRef();\n  footerRef = React.createRef();\n\n  scrollToSection(ref) {\n    const root = this.rootRef.current;\n    const target = ref.current;\n    if (!root || !target) return;\n    const top = target.offsetTop - 78;\n    root.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });\n  }\n  state = {\n    headRotation: { devil: 0, angel: 0 },\n  };\n\n  componentDidMount() {\n    this._onMove = (e) => {\n      const host = this.heroRef.current;\n      if (!host) return;\n      const heads = host.querySelectorAll('[data-head]');\n      const nextRot = {};\n      heads.forEach(el => {\n        const key = el.getAttribute('data-head');\n        const rect = el.getBoundingClientRect();\n        const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;\n        const dx = e.clientX - cx, dy = e.clientY - cy;\n        const maxDeg = 12;\n        const deg = Math.max(-maxDeg, Math.min(maxDeg, (dx / 300) * maxDeg));\n        nextRot[key] = deg;\n      });\n\n      this.setState({\n        headRotation: { ...this.state.headRotation, ...nextRot },\n      });\n    };\n    window.addEventListener('mousemove', this._onMove);\n  }\n  componentWillUnmount() {\n    window.removeEventListener('mousemove', this._onMove);\n  }\n\n  renderVals() {\n    return {\n      goToLogin: this.props.goToLogin,\n      goToRegister: this.props.goToRegister,\n      heroRef: this.heroRef,\n      rootRef: this.rootRef,\n      heroSectionRef: this.heroSectionRef,\n      servicesRef: this.servicesRef,\n      aboutRef: this.aboutRef,\n      comingSoonRef: this.comingSoonRef,\n      footerRef: this.footerRef,\n      scrollToHero: () => this.scrollToSection(this.heroSectionRef),\n      scrollToAbout: () => this.scrollToSection(this.aboutRef),\n      scrollToServices: () => this.scrollToSection(this.servicesRef),\n      scrollToComingSoon: () => this.scrollToSection(this.comingSoonRef),\n      scrollToFooter: () => this.scrollToSection(this.footerRef),\n      headStyleDevil: `position:absolute;inset:0;transform:rotate(${this.state.headRotation.devil}deg);transform-origin:50% 100%;transition:transform .15s ease-out`,\n      headStyleAngel: `position:absolute;inset:0;transform:rotate(${this.state.headRotation.angel}deg);transform-origin:50% 100%;transition:transform .15s ease-out`,\n      iconBadge: 'width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#F0CA7A,#C99A3E);display:inline-block',\n      iconLock: 'width:13px;height:13px;border-radius:4px;background:#7C9473;display:inline-block',\n      iconPeople: 'width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#D19A76,#9A6B54);display:inline-block',\n      iconRating: 'width:14px;height:14px;transform:rotate(45deg);background:radial-gradient(circle at 35% 30%,#F0CA7A,#C99A3E);display:inline-block',\n      iconChat: 'width:15px;height:12px;border-radius:6px 6px 6px 2px;background:#557A60;display:inline-block',\n      services: [\n        {title:'個人諮商', desc:'一對一深度晤談，處理焦慮、憂鬱與生活壓力議題。'},\n        {title:'伴侶諮商', desc:'改善溝通模式，重建關係中的信任與親密感。'},\n        {title:'家庭諮商', desc:'陪伴家庭成員一起面對衝突，找回和諧互動。'},\n        {title:'生涯諮詢', desc:'釐清職涯方向，做出更符合自己的選擇。'},\n        {title:'正念紓壓', desc:'透過正念練習，提升覺察力並降低壓力反應。'},\n        {title:'焦慮處理', desc:'學習具體技巧，緩解焦慮對日常生活的影響。'},\n      ],\n      team: [\n        {name:'陳心理師', role:'臨床心理師 · 15年經驗', bg:'#DCE6DB', face:'#88AE8E'},\n        {name:'林心理師', role:'諮商心理師 · 伴侶諮商', bg:'#F4E4D6', face:'#D19A76'},\n        {name:'黃心理師', role:'諮商心理師 · 兒少專長', bg:'#E4DCF0', face:'#A688B0'},\n        {name:'吳心理師', role:'臨床心理師 · 職涯諮詢', bg:'#DDE7EF', face:'#8FA9C4'},\n      ].map((m, i) => ({ ...m, photoLayer: `url('./img/avatar-team-${i + 1}.png') center/cover no-repeat,` })),\n      upcoming: ['AI 情緒分析','線上預約系統','即時諮詢聊天','健康追蹤','心理健康知識庫','線上課程'],\n    };\n  }\n}\n\n<\/script>\n<\/body>\n<\/html>\n"],["./ScreenPairing.dc.html","<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"./support.js\"><\/script>\n<\/head>\n<body>\n<x-dc>\n<helmet>\n  <link href=\"https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap\" rel=\"stylesheet\">\n  <style>\n    @keyframes mh-spin{to{transform:rotate(360deg)}}\n    @keyframes mh-pop{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}\n  <\/style>\n<\/helmet>\n<div style=\"position:absolute;inset:0;overflow-y:auto;box-sizing:border-box;background:#F4F0E7;font-family:'Noto Sans TC',sans-serif;padding:clamp(20px,5vw,36px) clamp(12px,4vw,24px)\" data-screen-label=\"紓壓配對\">\n\n  <div style=\"max-width:640px;margin:0 auto\">\n    <div onClick=\"{{ goHome }}\" style=\"display:flex;align-items:center;gap:6px;color:#7C756B;font:600 13px 'Noto Sans TC';cursor:pointer;margin-bottom:18px;width:fit-content;white-space:nowrap\">‹ 返回首頁<\/div>\n\n    <!-- matching -->\n    <sc-if value=\"{{ isMatching }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:60px 30px;text-align:center\">\n        <div style=\"width:64px;height:64px;border-radius:50%;border:5px solid #DCE6DB;border-top-color:#557A60;margin:0 auto 24px;animation:mh-spin 1s linear infinite\"><\/div>\n        <div style=\"font:700 18px 'Quicksand';color:#423D37;margin-bottom:8px\">正在為你配對陌生旅伴...<\/div>\n        <div style=\"font:400 13px 'Noto Sans TC';color:#7C756B\">配對成功後，你們將以匿名暱稱互相陪伴、一起完成 5 題紓壓小測驗<\/div>\n      <\/div>\n    <\/sc-if>\n\n    <!-- matched intro -->\n    <sc-if value=\"{{ isMatched }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:40px 30px;text-align:center;animation:mh-pop .3s ease\">\n        <div style=\"display:flex;justify-content:center;gap:24px;margin-bottom:20px\">\n          <div style=\"width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#9CC3A0,#557A60)\"><\/div>\n          <div style=\"display:flex;align-items:center;font:700 20px 'Quicksand';color:#C9C2B4\">×<\/div>\n          <div style=\"width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#D19A76,#9A6B54)\"><\/div>\n        <\/div>\n        <div style=\"font:700 18px 'Quicksand';color:#423D37;margin-bottom:6px\">配對成功！你將與「{{ partnerNick }}」一起完成小測驗<\/div>\n        <div style=\"font:400 13px 'Noto Sans TC';color:#7C756B;margin-bottom:24px\">全程匿名，不會顯示任何真實帳號資訊<\/div>\n        <button onClick=\"{{ startQuiz }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:14px 30px;border-radius:999px;font:700 14px 'Noto Sans TC'\">開始測驗 ›<\/button>\n      <\/div>\n    <\/sc-if>\n\n    <!-- quiz -->\n    <sc-if value=\"{{ isQuiz }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:30px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px\">\n          <div style=\"font:700 16px 'Quicksand'\">紓壓知識王<\/div>\n          <div style=\"font:600 12px 'Noto Sans TC';color:#7C756B\">題目 {{ qNum }} / {{ qTotal }}<\/div>\n        <\/div>\n        <div style=\"height:6px;background:#EDE4D8;border-radius:999px;overflow:hidden;margin-bottom:22px\">\n          <div style=\"height:100%;width:{{ qPct }}%;background:#557A60;border-radius:999px\"><\/div>\n        <\/div>\n        <div style=\"font:600 16px/1.6 'Noto Sans TC';color:#423D37;margin-bottom:20px\">{{ question }}<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:8px\">\n          <sc-for list=\"{{ options }}\" as=\"opt\" hint-placeholder-count=\"4\">\n            <button onClick=\"{{ opt.onSelect }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\/button>\n          <\/sc-for>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <!-- encouragement -->\n    <sc-if value=\"{{ isEncourage }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:30px\">\n        <div style=\"font:700 16px 'Quicksand';margin-bottom:6px\">給「{{ partnerNick }}」一句鼓勵<\/div>\n        <div style=\"font:400 13px 'Noto Sans TC';color:#7C756B;margin-bottom:18px\">{{ partnerNick }} 剛回答了第 {{ qNum }} 題，傳一句話讓對方知道你在這裡<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:16px\">\n          <sc-for list=\"{{ encouragementOptions }}\" as=\"e\" hint-placeholder-count=\"4\">\n            <button onClick=\"{{ e.onSelect }}\" style=\"text-align:left;border:1px solid #E6DECF;background:#FFFFFF;color:#423D37;padding:13px 16px;border-radius:14px;font:500 14px 'Noto Sans TC'\">{{ e.text }}<\/button>\n          <\/sc-for>\n        <\/div>\n        <div style=\"display:flex;gap:8px\">\n          <input value=\"{{ customEncourage }}\" onInput=\"{{ onCustomEncourageChange }}\" placeholder=\"或自己寫一句...\" style=\"flex:1;border:1px solid #E6DECF;border-radius:999px;padding:11px 16px;font:400 13px 'Noto Sans TC';outline:none\"/>\n          <button onClick=\"{{ sendCustomEncourage }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:0 20px;border-radius:999px;font:600 13px 'Noto Sans TC'\">送出<\/button>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <!-- chat log so far -->\n    <sc-if value=\"{{ showLog }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"mh-scroll\" style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:20px;padding:18px;margin-top:16px;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:8px\">\n        <sc-for list=\"{{ logEntries }}\" as=\"entry\" hint-placeholder-count=\"3\">\n          <div style=\"{{ entry.style }}\">{{ entry.text }}<\/div>\n        <\/sc-for>\n      <\/div>\n    <\/sc-if>\n\n    <!-- suggestion exchange -->\n    <sc-if value=\"{{ isSuggest }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:30px\">\n        <div style=\"font:700 16px 'Quicksand';margin-bottom:6px\">給彼此一個放鬆小建議<\/div>\n        <div style=\"font:400 13px 'Noto Sans TC';color:#7C756B;margin-bottom:18px\">測驗完成了！推薦「{{ partnerNick }}」一件可以放鬆的小事吧<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:16px\">\n          <sc-for list=\"{{ suggestionOptions }}\" as=\"sg\" hint-placeholder-count=\"4\">\n            <button onClick=\"{{ sg.onSelect }}\" style=\"text-align:left;border:1px solid #E6DECF;background:#FFFFFF;color:#423D37;padding:13px 16px;border-radius:14px;font:500 14px 'Noto Sans TC'\">{{ sg.text }}<\/button>\n          <\/sc-for>\n        <\/div>\n        <div style=\"display:flex;gap:8px\">\n          <input value=\"{{ customSuggestion }}\" onInput=\"{{ onCustomSuggestionChange }}\" placeholder=\"或自己寫一個建議...\" style=\"flex:1;border:1px solid #E6DECF;border-radius:999px;padding:11px 16px;font:400 13px 'Noto Sans TC';outline:none\"/>\n          <button onClick=\"{{ sendCustomSuggestion }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:0 20px;border-radius:999px;font:600 13px 'Noto Sans TC'\">送出<\/button>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <!-- add friend -->\n    <sc-if value=\"{{ isFriendAsk }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:36px 30px;text-align:center\">\n        <div style=\"font:700 18px 'Quicksand';color:#423D37;margin-bottom:10px\">「{{ partnerNick }}」建議你：{{ partnerSuggestion }}<\/div>\n        <div style=\"font:400 13px 'Noto Sans TC';color:#7C756B;margin-bottom:26px\">這趟旅程即將結束，要不要加「{{ partnerNick }}」為好友，之後可以繼續互相鼓勵？<\/div>\n        <div style=\"display:flex;gap:12px;justify-content:center\">\n          <button onClick=\"{{ declineFriend }}\" style=\"border:1px solid #C9C2B4;background:transparent;color:#423D37;padding:13px 26px;border-radius:999px;font:600 14px 'Noto Sans TC'\">先不用了<\/button>\n          <button onClick=\"{{ acceptFriend }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:13px 26px;border-radius:999px;font:700 14px 'Noto Sans TC'\">加為好友<\/button>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <!-- done -->\n    <sc-if value=\"{{ isDone }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:40px 30px;text-align:center\">\n        <div style=\"width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#F4D58D,#E8B44C);margin:0 auto 18px\"><\/div>\n        <div style=\"font:700 18px 'Quicksand';color:#423D37;margin-bottom:8px\">{{ doneTitle }}<\/div>\n        <div style=\"font:400 13px/1.7 'Noto Sans TC';color:#7C756B;margin-bottom:26px\">{{ doneSubtitle }}<\/div>\n        <button onClick=\"{{ goHome }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:14px 30px;border-radius:999px;font:700 14px 'Noto Sans TC'\">回到首頁<\/button>\n      <\/div>\n    <\/sc-if>\n  <\/div>\n<\/div>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:720,&quot;height&quot;:800},&quot;goHome&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;()=&gt;void&quot;},&quot;onComplete&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(summary:object)=&gt;void&quot;}}\">\nconst PARTNER_NICKS = ['小海豚','夜貓子','向日葵','旅行者42','拿鐵不加糖'];\nconst QUESTIONS = [\n  { q:'最近一個月，你有多常覺得莫名心煩？', opts:[\n    {label:'幾乎沒有', score:0}, {label:'偶爾會', score:1}, {label:'蠻常的', score:2}, {label:'幾乎每天', score:3} ]},\n  { q:'遇到突發狀況時，你通常會？', opts:[\n    {label:'冷靜評估再行動', score:0}, {label:'先深呼吸再處理', score:1}, {label:'會慌張一陣子', score:2}, {label:'整個人當機', score:3} ]},\n  { q:'最近睡眠品質如何？', opts:[\n    {label:'很好，一覺到天亮', score:0}, {label:'還可以', score:1}, {label:'常常睡不好', score:2}, {label:'幾乎失眠', score:3} ]},\n  { q:'面對堆積如山的待辦事項，你的感覺是？', opts:[\n    {label:'可以一項項處理', score:0}, {label:'有點壓力但還好', score:1}, {label:'覺得快喘不過氣', score:2}, {label:'完全不知從何下手', score:3} ]},\n  { q:'今天想到明天要做的事，心情是？', opts:[\n    {label:'平常心', score:0}, {label:'有點在意', score:1}, {label:'有點焦慮', score:2}, {label:'非常抗拒', score:3} ]},\n];\nconst ENCOURAGEMENTS = ['你已經做得很好了！','辛苦了，記得對自己好一點','我懂那種感覺，你不孤單','加油，我們一起面對！'];\nconst SUGGESTIONS = ['去外面散步 10 分鐘','聽一首喜歡的歌放空一下','寫下三件今天值得感恩的事','早點放下手機好好休息'];\n\nclass Component extends DCLogic {\n  state = {\n    step: 'matching',\n    partnerNick: PARTNER_NICKS[Math.floor(Math.random()*PARTNER_NICKS.length)],\n    qIndex: 0,\n    userScore: 0,\n    log: [],\n    customEncourage: '',\n    customSuggestion: '',\n    partnerSuggestion: '',\n    friended: false,\n  };\n\n  componentDidMount() {\n    this._t1 = setTimeout(() => this.setState({ step: 'matched' }), 1600);\n  }\n  componentWillUnmount() {\n    clearTimeout(this._t1);\n    clearTimeout(this._t2);\n  }\n\n  startQuiz = () => this.setState({ step: 'quiz' });\n\n  selectOption = (opt) => {\n    const q = QUESTIONS[this.state.qIndex];\n    const partnerOpt = q.opts[Math.floor(Math.random() * q.opts.length)];\n    this.setState(s => ({\n      userScore: s.userScore + opt.score,\n      log: [...s.log,\n        { who:'you', text:`你：${opt.label}` },\n        { who:'partner', text:`${s.partnerNick}：${partnerOpt.label}` },\n      ],\n      step: 'encourage',\n    }));\n  };\n\n  sendEncouragement = (text) => {\n    this.setState(s => ({\n      log: [...s.log, { who:'you-msg', text:`你 → ${s.partnerNick}：${text}` }],\n      customEncourage: '',\n    }), () => {\n      const nextIndex = this.state.qIndex + 1;\n      this._t2 = setTimeout(() => {\n        if (nextIndex >= QUESTIONS.length) {\n          this.setState({ step: 'suggest' });\n        } else {\n          this.setState({ qIndex: nextIndex, step: 'quiz' });\n        }\n      }, 500);\n    });\n  };\n  setCustomEncourage = (v) => this.setState({ customEncourage: v });\n\n  sendSuggestion = (text) => {\n    const partnerSuggestion = SUGGESTIONS[Math.floor(Math.random()*SUGGESTIONS.length)];\n    this.setState(s => ({\n      log: [...s.log, { who:'you-msg', text:`你 → ${s.partnerNick}：建議「${text}」` }],\n      partnerSuggestion,\n      customSuggestion: '',\n      step: 'friendAsk',\n    }));\n  };\n  setCustomSuggestion = (v) => this.setState({ customSuggestion: v });\n\n  acceptFriend = () => {\n    this.setState({ friended: true, step: 'done' });\n    const riskLevel = this.state.userScore >= 11 ? 'high' : this.state.userScore >= 6 ? 'medium' : 'low';\n    this.props.onComplete && this.props.onComplete({\n      partnerNick: this.state.partnerNick,\n      score: this.state.userScore,\n      riskLevel,\n      log: this.state.log,\n      friended: true,\n    });\n  };\n  declineFriend = () => {\n    this.setState({ friended: false, step: 'done' });\n    const riskLevel = this.state.userScore >= 11 ? 'high' : this.state.userScore >= 6 ? 'medium' : 'low';\n    this.props.onComplete && this.props.onComplete({\n      partnerNick: this.state.partnerNick,\n      score: this.state.userScore,\n      riskLevel,\n      log: this.state.log,\n      friended: false,\n    });\n  };\n\n  renderVals() {\n    const s = this.state;\n    const q = QUESTIONS[s.qIndex];\n    const options = q ? q.opts.map(o => ({\n      label: o.label,\n      onSelect: () => this.selectOption(o),\n      style: 'text-align:left;border:1px solid #E6DECF;background:#FFFFFF;color:#423D37;padding:13px 16px;border-radius:14px;font:500 14px \\'Noto Sans TC\\';cursor:pointer',\n    })) : [];\n\n    const encouragementOptions = ENCOURAGEMENTS.map(t => ({ text: t, onSelect: () => this.sendEncouragement(t) }));\n    const suggestionOptions = SUGGESTIONS.map(t => ({ text: t, onSelect: () => this.sendSuggestion(t) }));\n\n    const logEntries = s.log.map(e => ({\n      text: e.text,\n      style: e.who === 'you-msg'\n        ? 'background:#DCE6DB;color:#2E4A34;padding:8px 12px;border-radius:12px;font:500 12px \\'Noto Sans TC\\';align-self:flex-end;'\n        : 'background:#F0EBE0;color:#5C564C;padding:8px 12px;border-radius:12px;font:400 12px \\'Noto Sans TC\\';',\n    }));\n\n    const doneTitle = s.friended ? `已加「${s.partnerNick}」為好友！` : '本次紓壓旅程完成！';\n    const doneSubtitle = s.friended\n      ? '你可以在個案首頁的好友列表中看到對方，之後可以繼續互相鼓勵。'\n      : '謝謝你願意花時間互相陪伴，期待下次再遇到新的旅伴。';\n\n    return {\n      partnerNick: s.partnerNick,\n      isMatching: s.step === 'matching', isMatched: s.step === 'matched',\n      isQuiz: s.step === 'quiz', isEncourage: s.step === 'encourage',\n      isSuggest: s.step === 'suggest', isFriendAsk: s.step === 'friendAsk', isDone: s.step === 'done',\n      showLog: s.log.length > 0 && ['quiz','encourage','suggest','friendAsk'].includes(s.step),\n      startQuiz: this.startQuiz,\n      qNum: s.qIndex + 1, qTotal: QUESTIONS.length, qPct: Math.round(((s.qIndex+1)/QUESTIONS.length)*100),\n      question: q ? q.q : '', options,\n      encouragementOptions, customEncourage: s.customEncourage,\n      onCustomEncourageChange: (e) => this.setCustomEncourage(e.target.value),\n      sendCustomEncourage: () => { if (s.customEncourage.trim()) this.sendEncouragement(s.customEncourage.trim()); },\n      logEntries,\n      suggestionOptions, customSuggestion: s.customSuggestion,\n      onCustomSuggestionChange: (e) => this.setCustomSuggestion(e.target.value),\n      sendCustomSuggestion: () => { if (s.customSuggestion.trim()) this.sendSuggestion(s.customSuggestion.trim()); },\n      partnerSuggestion: s.partnerSuggestion,\n      acceptFrie ><\/span>{{ t.tips }}<\/div>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:16px\">\n            <div style=\"font:700 15px 'Quicksand';color:#557A60\">{{ t.timerLabel }}<\/div>\n            <button onClick=\"{{ t.onTimer }}\" style=\"{{ t.timerBtnStyle }}\">{{ t.timerBtnLabel }}<\/button>\n          <\/div>\n        <\/div>\n      <\/sc-for>\n    <\/div>\n\n    <div style=\"text-align:center\">\n      <button onClick=\"{{ goNext }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:15px 34px;border-radius:999px;font:700 15px 'Noto Sans TC'\">完成任務，前往總結 ›<\/button>\n    <\/div>\n  <\/div>\n<\/div>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1000,&quot;height&quot;:800}}\">\nfunction fmtTime(sec) {\n  const m = Math.floor(sec/60).toString().padStart(2,'0');\n  const s = (sec%60).toString().padStart(2,'0');\n  return `${m}:${s}`;\n}\nconst COLORS = ['#DCE6DB','#F4E4D6','#FBE1DC','#E4DCF0'];\n\nclass Component extends DCLogic {\n  renderVals() {\n    const p = this.props;\n    const taskCards = p.tasks.map((t, i) => ({\n      name: t.name, duration: t.duration, unit: t.unit, tag: t.tag, desc: t.desc, tips: t.tips,\n      iconBg: COLORS[i % COLORS.length],\n      cardStyle: `background:#FBF9F4;border:1px solid ${t.completed ? '#9CC3A0' : '#E6DECF'};border-radius:20px;padding:22px;`,\n      checkMark: t.completed ? '✓' : '',\n      checkStyle: `width:26px;height:26px;border-radius:8px;border:2px solid ${t.completed?'#557A60':'#C9C2B4'};background:${t.completed?'#557A60':'transparent'};color:#fff;display:flex;align-items:center;justify-content:center;font:700 14px sans-serif;cursor:pointer;`,\n      onToggle: () => p.toggleTask(t.id),\n      timerLabel: fmtTime(t.timerSeconds),\n      timerBtnLabel: t.completed ? '已完成' : (t.running ? '暫停' : '開始'),\n      timerBtnStyle: `border:none;padding:8px 18px;border-radius:999px;font:600 12px 'Noto Sans TC';c // Public HAPI FHIR R4 sandbox — no backend of our own; the browser talks to it directly (CORS is open).
const FHIR_BASE = 'https://hapi.fhir.org/baseR4';

async function fhirRequest(method, path, body) {
  const res = await fetch(`${FHIR_BASE}/${path}`, {
    method,
    headers: { 'Content-Type': 'application/fhir+json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const text = await res.text().catch(() => '');
    throw new Error(`HTTP ${res.status} ${text.slice(0, 200)}`);
  }
  return res.json();
}

function buildPssQuestionnaireResponse(patientId, answers, questions) {

    resourceType: 'QuestionnaireResponse',

    authored: new Date().toISOString(),
    item: answers.map((a, i) => ({
      linkId: `q${i + 1}`,
      text: questions[i],
      answer: [{ valueInteger: a }],
    })),
  };
}

function buildPssObservation(patientId, qrId, score, category) {
  const interpretation = {
    low: { code: 'L', display: '低壓力' },
    medium: { code: 'N', display: '中壓力' },
    high: { code: 'H', display: '高壓力' },
  }[category] || { code: 'N', display: '中壓力' };
  return {
    resourceType: 'Observation',
    status: 'final',
    category: [{
      coding: [{ system: 'http://terminology.hl7.org/CodeSystem/observation-category', code: 'survey', display: 'Survey' }],
    }],
    code: {
      coding: [{ system: 'http://mindharbor.tw/fhir/CodeSystem/pss', code: 'pss-10-score', display: 'Perceived Stress Scale (PSS-10) Score' }],
      text: 'PSS-10 壓力量表總分',
    },
    subject: { reference: `Patient/${patientId}` },
    effectiveDateTime: new Date().toISOString(),
    valueInteger: score,
    interpretation: [{
      coding: [{ system: 'http://terminology.hl7.org/CodeSystem/v3-ObservationInterpretation', code: interpretation.code, display: interpretation.display }],
    }],
    derivedFrom: qrId ? [{ reference: `QuestionnaireResponse/${qrId}` }] : undefined,
  };
}

class Component extends DCLogic {
  state = {
    screen: 'marketing',
    gender: 'male',
    name: '承言',
    mindDemon: 32,
    spiritPower: 582,
    pssAnswers: Array(10).fill(null),
    pssIndex: 0,
    pssScore: null,
    pssCategory: null,
    tasks: MALE_TASKS.map(t => ({...t, completed:false, timerSeconds:0, running:false})),
    summaryStars: {relax:0, calmer:0},
    summaryFreeText: '',
    summaryDone: false,
    chatOpen: false,
    chatMessages: [{from:'ai', text: MOCK_CHAT[0]}],
    chatDraft: '',
    highRisk: false,
    dayCompleted: false,
    companionOpen: false,
    companionMessages: [{from:'ai', text:'嗨，我是靈光 🌙 想跟我聊聊你現在的感受嗎？我會幫忙留意你的狀態。'}],
    companionDraft: '',
    companionStatus: 'good',
    companionAlert: false,
    notifiedFlags: [],
    notifiedThisSession: false,
    friends: [
      { nick:'小海豚', since:'3 天前', online:true, lastActive:'剛剛在線' },
      { nick:'向日葵', since:'1 週前', online:false, lastActive:'3 小時前活躍' },
    ],
    pairingGroups: [],
    lastCheckinDate: (typeof localStorage !== 'undefined' && localStorage.getItem('mh_last_checkin')) || null,
    authMode: 'login',
    shopHistory: [],
    fhirPatientId: null,
    fhirStatus: 'idle', // idle | syncing | synced | error
    fhirError: null,
    fhirQrId: null,
    fhirObsId: null,
    fhirSyncedAt: null,
    dashboardOpenFriendsSignal: 0,
  };
  openDashboardFriends = () => this.setState(s => ({ dashboardOpenFriendsSignal: s.dashboardOpenFriendsSignal + 1 }));
  onRedeem = (item) => {
    this.setState(s => s.spiritPower < item.cost ? null : ({
      spiritPower: s.spiritPower - item.cost,
      shopHistory: [{ name: item.name, cost: item.cost, time: '剛剛' }, ...s.shopHistory],
    }));
  };

  todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  }
  doCheckin = () => {
    const today = this.todayStr();
    if (this.state.lastCheckinDate === today) return;
    if (typeof localStorage !== 'undefined') localStorage.setItem('mh_last_checkin', today);
    this.setState(s => ({ lastCheckinDate: today, spiritPower: s.spiritPower + 5 }));
  };

  componentDidMount() {
    this._tick = setInterval(() => {
      this.setState(s => {
        if (!s.tasks.some(t => t.running)) return null;
        return { tasks: s.tasks.map(t => t.running ? {...t, timerSeconds: t.timerSeconds + 1} : t) };
      });
    }, 1000);
  }
  componentWillUnmount() { clearInterval(this._tick); }

  goTo = (screen) => this.setState({ screen });
  setGender = (g) => this.setState({ gender: g });
  doRegister = (data) => {
    const isFemale = data.gender === 'female';
    this.setState({
      screen: 'dashboard',
      name: data.nickname,
      gender: data.gender,
      mindDemon: 50,
      spiritPower: 0,
      tasks: (isFemale ? FEMALE_TASKS : MALE_TASKS).map(t => ({...t, completed:false, timerSeconds:0, running:false})),
    });
  };
  doLogin = () => {
    const isFemale = this.state.gender === 'female';
    this.setState({
      screen: 'dashboard',
      name: isFemale ? '小美' : '承言',
      mindDemon: isFemale ? 38 : 32,
      spiritPower: isFemale ? 85 : 582,
      tasks: (isFemale ? FEMALE_TASKS : MALE_TASKS).map(t => ({...t, completed:false, timerSeconds:0, running:false})),
    });
  };

  selectPss = (val) => {
    this.setState(s => {
      const arr = s.pssAnswers.slice();
      arr[s.pssIndex] = val;
      return { pssAnswers: arr };
    });
  };
  nextPss = () => this.setState(s => ({ pssIndex: Math.min(9, s.pssIndex + 1) }));
  prevPss = () => this.setState(s => ({ pssIndex: Math.max(0, s.pssIndex - 1) }));

  syncPssToFhir = async (answers, total, category) => {
    this.setState({ fhirStatus: 'syncing', fhirError: null });
    try {
      let patientId = this.state.fhirPatientId;
      if (!patientId) {
        const demoId = 'mh-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
        const patient = await fhirRequest('POST', 'Patient', {
          resourceType: 'Patient',
          identifier: [{ system: 'http://mindharbor.tw/fhir/patient-id', value: demoId }],
          name: [{ text: this.state.name || 'MindHarbor Demo User' }],
          gender: this.state.gender === 'female' ? 'female' : 'male',
        });
        patientId = patient.id;
        this.setState({ fhirPatientId: patientId });
      }
      const qr = await fhirRequest('POST', 'QuestionnaireResponse', buildPssQuestionnaireResponse(patientId, answers, PSS10));
      const obs = await fhirRequest('POST', 'Observation', buildPssObservation(patientId, qr.id, total, category));
      this.setState({
        fhirStatus: 'synced', fhirQrId: qr.id, fhirObsId: obs.id,
        fhirSyncedAt: new Date().toLocaleTimeString('zh-TW'),
      });
    } catch (e) {
      this.setState({ fhirStatus: 'error', fhirError: (e && e.message) || String(e) });
    }
  };

  submitPss = () => {
    const { pssAnswers } = this.state;
    if (pssAnswers.some(a => a === null)) return;
    let total = 0;
    pssAnswers.forEach((a, i) => { total += REVERSE_IDX.includes(i) ? (4 - a) : a; });
    const category = total <= 13 ? 'low' : total <= 26 ? 'medium' : 'high';
    const isHigh = total >= 27;
    // Stay on the PSS result view so the user actually sees their score and the FHIR
    // sync status; they advance via the "下一步" button (goNext -> goTo_tasks).
    // High risk still routes to Crisis immediately — that safety path is unchanged.
    this.setState({ pssScore: total, pssCategory: category, highRisk: isHigh, screen: isHigh ? 'crisis' : 'chat' });
    this.syncPssToFhir(pssAnswers, total, category);
  };

  onPairingComplete = (summary) => {
    this.setState(s => {
      const groupId = `G-${s.pairingGroups.length + 1}`;
      const newGroup = {
        id: groupId,
        userNick: `你（${s.name}）`,
        partnerNick: summary.partnerNick,
        score: summary.score,
        riskLevel: summary.riskLevel,
        log: summary.log,
        friended: summary.friended,
        time: '剛剛',
      };
      const newFriends = summary.friended ? [...s.friends, { nick: summary.partnerNick, since: '剛剛', online: true, lastActive: '剛剛在線' }] : s.friends;
      const isHigh = summary.riskLevel === 'high';
      const newFlags = isHigh
        ? [...s.notifiedFlags, { patient: `匿名配對 ${groupId}（紓壓配對偵測）`, time: '剛剛' }]
        : s.notifiedFlags;
      return {
        pairingGroups: [...s.pairingGroups, newGroup],
        friends: newFriends,
        notifiedFlags: newFlags,
      };
    });
  };

  toggleCompanion = () => this.setState(s => ({ companionOpen: !s.companionOpen, companionAlert: false }));
  setCompanionDraft = (v) => this.setState({ companionDraft: v });
  classifyRisk = (text) => {
    const highWords = ['想死','不想活','活不下去','撐不下去','傷害自己','結束一切','沒有意義','消失就好'];
    const normalWords = ['壓力','累','難過','焦慮','睡不著','煩','emo','崩潰'];
    const goodWords = ['開心','很好','不錯','放鬆','平靜','順利','充實'];
    if (highWords.some(w => text.includes(w))) return 'high';
    if (normalWords.some(w => text.includes(w))) return 'normal';
    if (goodWords.some(w => text.includes(w))) return 'good';
    return null;
  };
  sendCompanion = () => {
    const draft = this.state.companionDraft.trim();
    if (!draft) return;
    const detected = this.classifyRisk(draft);
    this.setState(s => {
      const status = detected || s.companionStatus;
      let reply;
      if (status === 'high') {
        reply = '聽起來你現在真的很不好受，辛苦你了。如果情況緊急，請撥打 1925 安心專線，會有人陪著你，你不孤單。';
      } else if (status === 'normal') {
        reply = '辛苦了，這種感覺不好受吧。要不要先做個深呼吸？我會一直在這裡陪你聊。';
      } else {
        reply = '很高興聽到這個！保持這個節奏，記得也要留意休息喔。';
      }
      const notifyNow = status === 'high' && !s.notifiedThisSession;
      const newFlags = notifyNow
        ? [...s.notifiedFlags, { patient: `個案 #${s.name}（AI 陪伴偵測）`, time: '剛剛' }]
        : s.notifiedFlags;
      return {
        companionMessages: [...s.companionMessages, {from:'user', text: draft}, {from:'ai', text: reply}],
        companionDraft: '',
        companionStatus: status,
        notifiedFlags: newFlags,
        notifiedThisSession: s.notifiedThisSession || notifyNow,
        companionAlert: notifyNow ? true : s.companionAlert,
      };
    });
  };

  toggleChat = () => this.setState(s => ({ chatOpen: !s.chatOpen }));
  setDraft = (v) => this.setState({ chatDraft: v });
  sendChat = () => {
    const draft = this.state.chatDraft.trim();
    if (!draft) return;
    this.setState(s => {
      const turn = s.chatMessages.filter(m => m.from === 'user').length;
      const reply = MOCK_CHAT[Math.min(turn + 1, MOCK_CHAT.length - 1)];
      return {
        chatMessages: [...s.chatMessages, {from:'user', text: draft}, {from:'ai', text: reply}],
        chatDraft: '',
      };
    });
  };

  toggleTask = (id) => this.setState(s => ({
    tasks: s.tasks.map(t => t.id === id ? {...t, completed: !t.completed, running: false} : t)
  }));
  toggleTimer = (id) => this.setState(s => ({
    tasks: s.tasks.map(t => t.id === id ? {...t, running: !t.running} : t)
  }));

  setStar = (key, val) => this.setState(s => ({ summaryStars: {...s.summaryStars, [key]: val} }));
  setFreeText = (v) => this.setState({ summaryFreeText: v });
  submitSummary = () => {
    if (this.state.summaryStars.relax === 0 || this.state.summaryStars.calmer === 0) return;
    this.setState({ summaryDone: true, screen: 'results', dayCompleted: true });
  };

  renderVals() {
    const s = this.state;
    const screens = ['marketing','login','dashboard','chat','tasks','summary','results','crisis','practitioner','admin'];
    const navBg = {}, navFg = {};
    screens.forEach(sc => {
      navBg[sc] = s.screen === sc ? '#7C9473' : 'transparent';
      navFg[sc] = s.screen === sc ? '#FBF9F4' : '#C9C2B4';
    });

    const tasksDoneCount = s.tasks.filter(t => t.completed).length;
    const allTasksDone = tasksDoneCount === s.tasks.length;

    // results calc (recompute live so screen always reflects current state)
    const taskReduction = tasksDoneCount * 5;
    const starsBonus = ((s.summaryStars.relax > 2 ? 3 : 0) + (s.summaryStars.calmer > 2 ? 3 : 0));
    const lowStressBonus = s.pssCategory === 'low' ? 5 : 0;
    const reduction = taskReduction + starsBonus + lowStressBonus;
    const spiritEarned = reduction * 2 + (allTasksDone ? 20 : 0) + (s.pssScore !== null ? 10 : 0) + (s.summaryDone ? 10 : 0);
    const details = [
      {label: `完成 ${tasksDoneCount} 個任務`, val: `-${taskReduction} 心魔`},
      {label: '總結反思加成', val: `-${starsBonus} 心魔`},
      {label: s.pssCategory === 'low' ? '低壓力加成' : 'PSS-10 完成', val: s.pssCategory === 'low' ? '-5 心魔' : '+10 靈力'},
      {label: allTasksDone ? '全任務完成加成' : '任務未全數完成', val: allTasksDone ? '+20 靈力' : '—'},
    ];

    const showCompanion = ['dashboard','tasks','summary','results','crisis'].includes(s.screen);
    const statusMap = { good: {label:'優良', color:'#557A60'}, normal: {label:'普通', color:'#C99A3E'}, high: {label:'高危', color:'#B5543C'} };
    const statusInfo = statusMap[s.companionStatus];
    const companionMessages = s.companionMessages.map(m => ({
      text: m.text,
      style: m.from === 'ai'
        ? 'background:#EDE8DE;color:#423D37;padding:9px 13px;border-radius:14px 14px 14px 4px;font:400 13px/1.5 \'Noto Sans TC\';align-self:flex-start;max-width:85%;'
        : 'background:#557A60;color:#FBF9F4;padding:9px 13px;border-radius:14px 14px 4px 14px;font:400 13px/1.5 \'Noto Sans TC\';align-self:flex-end;max-width:85%;'
    }));

    return {
      showCompanion,
      companionOpen: s.companionOpen, toggleCompanion: this.toggleCompanion,
      companionAlert: s.companionAlert,
      companionStatusLabel: statusInfo.label,
      showStatusBadge: s.companionStatus !== 'high',
      statusBadgeStyle: `font:700 10px 'Noto Sans TC';color:#FBF9F4;background:${statusInfo.color};padding:3px 8px;border-radius:999px`,
      companionMessages,
      companionDraft: s.companionDraft, onCompanionDraftChange: (e) => this.setCompanionDraft(e.target.value),
      onCompanionKeyDown: (e) => { if (e.key === 'Enter') this.sendCompanion(); },
      sendCompanion: this.sendCompanion,
      notifiedFlags: s.notifiedFlags,
      isMarketing: s.screen === 'marketing', isLogin: s.screen === 'login', isDashboard: s.screen === 'dashboard',
      isChat: s.screen === 'chat', isTasks: s.screen === 'tasks', isSummary: s.screen === 'summary',
      isResults: s.screen === 'results', isCrisis: s.screen === 'crisis', isPairing: s.screen === 'pairing', isShop: s.screen === 'shop', isPractitioner: s.screen === 'practitioner', isAdmin: s.screen === 'admin',
      shopHistory: s.shopHistory, onRedeem: this.onRedeem,
      navBg, navFg,
      goTo_marketing: () => this.goTo('marketing'), goTo_login: () => this.goTo('login'),
      goToRegister: () => this.setState({ screen: 'login', authMode: 'register' }),
      authMode: s.authMode, doRegister: this.doRegister,
      goTo_dashboard: () => this.goTo('dashboard'), goTo_chat: () => this.goTo('chat'),
      goTo_tasks: () => this.goTo('tasks'), goTo_summary: () => this.goTo('summary'),
      goTo_results: () => this.goTo('results'), goTo_crisis: () => this.goTo('crisis'),
      goTo_pairing: () => this.goTo('pairing'), goTo_shop: () => this.goTo('shop'),
      goTo_practitioner: () => this.goTo('practitioner'), goTo_admin: () => this.goTo('admin'),
      onPairingComplete: this.onPairingComplete,
      friends: s.friends, pairingGroups: s.pairingGroups,
      checkedInToday: s.lastCheckinDate === this.todayStr(),
      onCheckin: this.doCheckin,
      gender: s.gender, setGender: this.setGender, doLogin: this.doLogin,
      name: s.name, mindDemon: s.mindDemon, spiritPower: s.spiritPower,
      pssCategory: s.pssCategory, tasksDoneCount, dayCompleted: s.dayCompleted,
      summaryDone: s.summaryDone, highRisk: s.highRisk,
      tasks: s.tasks, toggleTask: this.toggleTask, toggleTimer: this.toggleTimer,
      pssAnswers: s.pssAnswers, pssIndex: s.pssIndex, pssScore: s.pssScore,
      selectPss: this.selectPss, nextPss: this.nextPss, prevPss: this.prevPss, submitPss: this.submitPss,
      fhirPatientId: s.fhirPatientId, fhirStatus: s.fhirStatus, fhirError: s.fhirError,
      fhirQrId: s.fhirQrId, fhirObsId: s.fhirObsId, fhirSyncedAt: s.fhirSyncedAt,
      dashboardOpenFriendsSignal: s.dashboardOpenFriendsSignal, openDashboardFriends: this.openDashboardFriends,
      chatOpen: s.chatOpen, toggleChat: this.toggleChat, chatMessages: s.chatMessages,
      chatDraft: s.chatDraft, setDraft: this.setDraft, sendChat: this.sendChat,
      summaryStars: s.summaryStars, setStar: this.setStar,
      summaryFreeText: s.summaryFreeText, setFreeText: this.setFreeText, submitSummary: this.submitSummary,
      resultReduction: reduction, resultSpiritEarned: spiritEarned, resultDetails: details, allTasksDone,
    };
  }
}

</script>
