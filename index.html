eryStatusText }}<\/div>\n          <sc-if value=\"{{ hasFhirEntries }}\" hint-placeholder-val=\"{{ false }}\">\n            <div class=\"mh-scroll\" style=\"max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;background:#F4F0E7;border-radius:10px;padding:10px\">\n              <sc-for list=\"{{ fhirEntries }}\" as=\"e\" hint-placeholder-count=\"3\">\n                <div style=\"font:400 11px/1.5 monospace;color:#5C564C;word-break:break-all;border-bottom:1px dashed #E6DECF;padding-bottom:6px\">\n                  <div style=\"font-weight:700;color:#423D37\">{{ e.title }}<\/div>\n                  <div>{{ e.subtitle }}<\/div>\n                <\/div>\n              <\/sc-for>\n            <\/div>\n          <\/sc-if>\n        <\/div>\n        <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:18px;padding:22px\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n            <div style=\"{{ fhirModeDotStyle }}\"><\/div>\n            <div style=\"font:700 16px 'Quicksand'\">FHIR 資料模式<\/div>\n          <\/div>\n          <div style=\"font:400 13px/1.7 'Noto Sans TC';color:#7C756B\">{{ fhirModeLabel }}<\/div>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ isReports }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:18px;padding:22px;max-width:640px\">\n        <div style=\"font:700 16px 'Quicksand';margin-bottom:16px\">數據報表<\/div>\n        <div style=\"display:flex;align-items:flex-end;gap:12px;height:140px\">\n          <sc-for list=\"{{ trendBars }}\" as=\"b\" hint-placeholder-count=\"7\">\n            <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%\">\n              <div style=\"width:100%;background:#557A60;border-radius:6px 6px 0 0;height:{{ b.h }}%\"><\/div>\n              <div style=\"font:500 10px 'Noto Sans TC';color:#9A9385;margin-top:6px\">{{ b.day }}<\/div>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n        <div style=\"font:400 12px 'Noto Sans TC';color:#7C756B;margin-top:10px\">全站每日活躍使用者數<\/div>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ isSystemSettings }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:480px;display:flex;flex-direction:column;gap:16px\">\n        <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:18px;padding:22px;display:flex;justify-content:space-between;align-items:center\">\n          <div>\n            <div style=\"font:700 14px 'Noto Sans TC';color:#423D37\">維護模式<\/div>\n            <div style=\"font:400 12px 'Noto Sans TC';color:#7C756B;margin-top:2px\">開啟後僅管理員可登入系統<\/div>\n          <\/div>\n          <div onClick=\"{{ toggleMaintenance }}\" style=\"{{ maintTrackStyle }}\"><div style=\"{{ maintDotStyle }}\"><\/div><\/div>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n  <\/div>\n<\/div>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1300,&quot;height&quot;:800}}\">\nconst FHIR_TYPES = ['Patient','Observation','QuestionnaireResponse','CarePlan','RiskAssessment','Task','Flag','CareTeam','Communication','Appointment'];\nconst FHIR_COUNTS = {Patient:892, Observation:3456, QuestionnaireResponse:1248, CarePlan:2345, RiskAssessment:745, Task:1876, Flag:64, CareTeam:58, Communication:2140, Appointment:312};\nconst FHIR_BASE = 'https://hapi.fhir.org/baseR4';\nconst LIVE_FHIR_TYPES = ['QuestionnaireResponse', 'Observation', 'Task', 'Flag', 'CareTeam', 'Communication'];\n// Task's beneficiary reference (`for`) is only reachable in R4 via the\n// `patient` search parameter — it has no generic `subject` parameter like\n// the other resource types here, so the search param name has to vary.\nconst SEARCH_PARAM_BY_TYPE = { Task: 'patient' };\n\n// See data/*.json — build-index.js inlines them as window.__MOCK_DATA so\n// this keeps working when index.html is opened via file:// with no server.\nfunction mockData(name, fallback) {\n  if (typeof window !== 'undefined' && window.__MOCK_DATA && window.__MOCK_DATA[name]) return window.__MOCK_DATA[name];\n  return fallback;\n}\nconst USERS = mockData('admin-users', [\n  {name:'小明 (patient)', demon:45, spirit:120}, {name:'小美 (patient2)', demon:38, spirit:85},\n]);\nconst PRACTITIONERS = mockData('admin-practitioners', [\n  {name:'陳心理師', account:'doctor'}, {name:'林心理師', account:'lin.doc'},\n]);\nconst ADMIN_FLAGS = mockData('admin-flags', [\n  {patient:'個案 #小明', status:'待處理'}, {patient:'個案 #小美', status:'已解決'},\n]);\n\nclass Component extends DCLogic {\n  state = { panel: 'overview', selectedFhirType: 'Patient', maintenance: false, liveResults: {} };\n\n  loadLiveType = (type) => {\n    const patientId = this.props.fhirPatientId;\n    if (!patientId || !LIVE_FHIR_TYPES.includes(type)) return;\n    this.setState(s => ({ liveResults: { ...s.liveResults, [type]: { loading: true, error: null } } }));\n    const searchParam = SEARCH_PARAM_BY_TYPE[type] || 'subject';\n    fetch(`${FHIR_BASE}/${type}?${searchParam}=Patient/${patientId}&_sort=-_lastUpdated&_count=20`, { headers: { Accept: 'application/fhir+json' } })\n      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })\n      .then(bundle => {\n        const entries = (bundle.entry || []).map(e => e.resource);\n        this.setState(s => ({ liveResults: { ...s.liveResults, [type]: { loading: false, error: null, count: bundle.total ?? entries.length, entries } } }));\n      })\n      .catch(err => {\n        this.setState(s => ({ liveResults: { ...s.liveResults, [type]: { loading: false, error: (err && err.message) || String(err) } } }));\n      });\n  };\n\n  renderVals() {\n    const active = 'padding:11px 12px;border-radius:12px;font:700 13px \\'Noto Sans TC\\';color:#FBF9F4;background:#557A60;margin-bottom:2px;cursor:pointer;';\n    const inactive = 'padding:11px 12px;border-radius:12px;font:500 13px \\'Noto Sans TC\\';color:#B8B2A4;margin-bottom:2px;cursor:pointer;';\n    const items = [\n      {label:'總覽', key:'overview'}, {label:'使用者管理', key:'users'}, {label:'心理師管理', key:'practitioners'},\n      {label:'高危事件', key:'flags'}, {label:'FHIR 工具', key:'fhirtools'}, {label:'數據報表', key:'reports'}, {label:'系統設定', key:'settings'},\n    ];\n    const navItems = items.map(it => ({ label: it.label, onClick: () => this.setState({ panel: it.key }), style: this.state.panel === it.key ? active : inactive }));\n    const titles = { overview:'管理員面板', users:'使用者管理', practitioners:'心理師管理', flags:'高危事件', fhirtools:'FHIR 工具', reports:'數據報表', settings:'系統設定' };\n\n    const trendBars = [22,38,30,55,48,62,45].map((h,i) => ({h, day:['07/05','07/06','07/07','07/08','07/09','07/10','07/11'][i]}));\n    const fhirTypes = FHIR_TYPES.map(t => ({\n      label: t, onClick: () => { this.setState({ selectedFhirType: t }); this.loadLiveType(t); },\n      style: `padding:7px 12px;border-radius:999px;font:600 11px 'Noto Sans TC';cursor:pointer;background:${this.state.selectedFhirType===t?'#557A60':'#EDE4D8'};color:${this.state.selectedFhirType===t?'#FBF9F4':'#5C564C'}`,\n    }));\n\n    const selectedType = this.state.selectedFhirType;\n    const isLiveType = LIVE_FHIR_TYPES.includes(selectedType);\n    const patientId = this.props.fhirPatientId;\n    const live = this.state.liveResults[selectedType];\n    let fhirQueryStatusText, fhirQueryStatusColor, fhirEntries = [];\n    if (!isLiveType) {\n      fhirQueryStatusText = `${FHIR_COUNTS[selectedType]} 筆 ${selectedType} 資源（示範資料，尚未串接真實伺服器）`;\n      fhirQueryStatusColor = '#9A9385';\n    } else if (!patientId) {\n      fhirQueryStatusText = '尚無真實資料：請先在個案端完成一次 PSS-10 壓力量表';\n      fhirQueryStatusColor = '#9A9385';\n    } else if (!live || live.loading) {\n      fhirQueryStatusText = '查詢中…';\n      fhirQueryStatusColor = '#7C756B';\n    } else if (live.error) {\n      fhirQueryStatusText = `查詢失敗：${live.error}`;\n      fhirQueryStatusColor = '#B5543C';\n    } else {\n      fhirQueryStatusText = `${live.count} 筆 ${selectedType} 資源（來自 HAPI FHIR R4 公開測試伺服器，即時查詢）`;\n      fhirQueryStatusColor = '#557A60';\n      fhirEntries = live.entries.map(r => {\n        if (r.resourceType === 'QuestionnaireResponse') return { title: `QuestionnaireResponse/${r.id}`, subtitle: `authored: ${r.authored || '-'}` };\n        if (r.resourceType === 'Observation') return { title: `Observation/${r.id}`, subtitle: `${(r.code && (r.code.text || (r.code.coding && r.code.coding[0] && r.code.coding[0].display))) || ''}: ${r.valueInteger ?? '-'}　effective: ${r.effectiveDateTime || '-'}` };\n        if (r.resourceType === 'Task') return { title: `Task/${r.id}`, subtitle: `${(r.code && r.code.text) || ''}　status: ${r.status || '-'}` };\n        if (r.resourceType === 'Flag') return { title: `Flag/${r.id}`, subtitle: `${(r.code && r.code.text) || ''}　status: ${r.status || '-'}` };\n        if (r.resourceType === 'CareTeam') return { title: `CareTeam/${r.id}`, subtitle: `${r.name || ''}　participants: ${(r.participant || []).length}` };\n        if (r.resourceType === 'Communication') return { title: `Communication/${r.id}`, subtitle: `${(r.payload && r.payload[0] && r.payload[0].contentString) || ''}　sent: ${r.sent || '-'}` };\n        return { title: `${r.resourceType}/${r.id}`, subtitle: '' };\n      });\n    }\n\n    return {\n      navItems, headerTitle: titles[this.state.panel],\n      goLogout: this.props.goLogout,\n      isOverview: this.state.panel==='overview', isUsers: this.state.panel==='users',\n      isPractitioners: this.state.panel==='practitioners', isFlags: this.state.panel==='flags',\n      isFhirTools: this.state.panel==='fhirtools', isReports: this.state.panel==='reports', isSystemSettings: this.state.panel==='settings',\n      miniStats: [\n        {label:'Users', val:'1,248', delta:'↑12.5%'}, {label:'Patients', val:'892', delta:'↑8.3%'},\n        {label:'Practitioners', val:'156', delta:'↑4.8%'}, {label:'FHIR 資源', val:'12,540', delta:'↑23.1%'},\n      ],\n      trendBars,\n      fhirCounts: [\n        {type:'Patient', count:'892'}, {type:'Observation', count:'3,456'}, {type:'QuestionnaireResponse', count:'1,248'},\n        {type:'CarePlan', count:'2,345'}, {type:'RiskAssessment', count:'745'},\n      ],\n      users: USERS,\n      practitioners: PRACTITIONERS,\n      addPractitioner: () => this.setState(s => ({ practitionersVer: (s.practitionersVer||0)+1 })),\n      flags: ADMIN_FLAGS.map(f => ({\n        ...f,\n        badgeStyle: f.status === '待處理'\n          ? 'background:#FBEAE6;color:#B5543C;font:700 11px \\'Noto Sans TC\\';padding:4px 10px;border-radius:999px'\n          : 'background:#DCE6DB;color:#2E4A34;font:700 11px \\'Noto Sans TC\\';padding:4px 10px;border-radius:999px',\n      })),\n      fhirTypes,\n      selectedFhirType: selectedType,\n      fhirQueryStatusText, fhirQueryStatusColor, fhirEntries, hasFhirEntries: fhirEntries.length > 0,\n      fhirModeLabel: patientId\n        ? `已與 HAPI FHIR R4 公開測試伺服器同步 — Patient/${patientId}`\n        : '尚未同步：個案端完成一次 PSS-10 壓力量表後，系統會自動建立真實 FHIR 資源（Patient / QuestionnaireResponse / Observation），並可在左側查詢。',\n      fhirModeDotStyle: `width:12px;height:12px;border-radius:50%;background:${patientId ? '#557A60' : '#C9C2B4'}`,\n      toggleMaintenance: () => this.setState(s => ({ maintenance: !s.maintenance })),\n      maintTrackStyle: `width:40px;height:22px;border-radius:999px;background:${this.state.maintenance?'#B5543C':'#C9C2B4'};display:flex;align-items:center;padding:2px;cursor:pointer;justify-content:${this.state.maintenance?'flex-end':'flex-start'}`,\n      maintDotStyle: 'width:18px;height:18px;border-radius:50%;background:#FBF9F4',\n    };\n  }\n}\n\n<\/script>\n<\/body>\n<\/html>\n"],["./ScreenChat.dc.html","<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"./support.js\"><\/script>\n<\/head>\n<body>\n<x-dc>\n<helmet>\n  <link href=\"https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap\" rel=\"stylesheet\">\n  <style>\n    @keyframes mh-page-enter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}\n  <\/style>\n<\/helmet>\n<div style=\"position:absolute;inset:0;overflow-y:auto;box-sizing:border-box;background:#F4F0E7;font-family:'Noto Sans TC',sans-serif;padding:clamp(20px,5vw,40px) clamp(12px,4vw,24px) 90px;animation:mh-page-enter .5s cubic-bezier(.22,1,.36,1) both\" data-screen-label=\"對話與壓力量表\">\n\n  <!-- steps -->\n  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:30px\">\n    <div onClick=\"{{ goHome }}\" style=\"flex:none;display:flex;align-items:center;gap:6px;color:#7C756B;font:600 13px 'Noto Sans TC';cursor:pointer;white-space:nowrap\">‹ 返回首頁<\/div>\n    <div style=\"display:flex;gap:clamp(4px,2vw,10px);overflow-x:auto;flex:none;max-width:60%\">\n      <sc-for list=\"{{ steps }}\" as=\"step\" hint-placeholder-count=\"4\">\n        <div style=\"display:flex;align-items:center;gap:6px;flex:none\">\n          <div style=\"{{ step.style }}flex:none\">{{ step.n }}<\/div>\n          <div style=\"font:600 clamp(10px,2.5vw,12px) 'Noto Sans TC';color:{{ step.color }};white-space:nowrap\">{{ step.label }}<\/div>\n        <\/div>\n      <\/sc-for>\n    <\/div>\n  <\/div>\n\n  <div style=\"max-width:640px;margin:0 auto;background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:clamp(20px,5vw,36px)\">\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px\">\n      <div style=\"font:700 20px 'Quicksand';color:#423D37\">PSS-10 壓力量表<\/div>\n      <div style=\"font:600 13px 'Noto Sans TC';color:#7C756B\">題目 {{ qNum }} / 10<\/div>\n    <\/div>\n    <div style=\"height:6px;background:#EDE4D8;border-radius:999px;overflow:hidden;margin-bottom:28px\">\n      <div style=\"height:100%;width:{{ progressPct }}%;background:#557A60;border-radius:999px\"><\/div>\n    <\/div>\n\n    <sc-if value=\"{{ !pssScore }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"text-align:center;font:600 18px/1.6 'Noto Sans TC';color:#423D37;margin-bottom:30px;min-height:70px\">\n        在過去一個月中，<br>{{ question }}\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(56px,1fr));gap:10px;margin-bottom:26px\">\n        <sc-for list=\"{{ options }}\" as=\"opt\" hint-placeholder-count=\"5\">\n          <button onClick=\"{{ opt.onSelect }}\" style=\"{{ opt.style }}\">\n            <div style=\"width:28px;height:28px;margin:0 auto;position:relative\">\n              <div style=\"font:700 22px 'Quicksand';line-height:28px\">{{ opt.emoji }}<\/div>\n              <div style=\"position:absolute;inset:0;border-radius:50%;background:{{ opt.imgLayer }}\"><\/div>\n            <\/div>\n            <div style=\"font:600 12px 'Noto Sans TC';margin-top:6px\">{{ opt.label }}<\/div>\n          <\/button>\n        <\/sc-for>\n      <\/div>\n      <div style=\"display:flex;justify-content:space-between\">\n        <button onClick=\"{{ prevPss }}\" style=\"border:1px solid #C9C2B4;background:transparent;color:#423D37;padding:12px 22px;border-radius:999px;font:600 13px 'Noto Sans TC'\">上一題<\/button>\n        <sc-if value=\"{{ isLastQuestion }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onClick=\"{{ submitPss }}\" style=\"{{ submitStyle }}\">計算壓力值<\/button>\n        <\/sc-if>\n        <sc-if value=\"{{ !isLastQuestion }}\" hint-placeholder-val=\"{{ true }}\">\n          <button onClick=\"{{ nextPss }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:12px 26px;border-radius:999px;font:600 13px 'Noto Sans TC'\">下一題<\/button>\n        <\/sc-if>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ pssScore }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center;padding:20px 0\">\n        <div style=\"width:110px;height:110px;border-radius:50%;background:{{ resultBg }};display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px\">\n          <div style=\"font:700 30px 'Quicksand';color:#fff\">{{ pssScore }}<\/div>\n          <div style=\"font:600 11px 'Noto Sans TC';color:#fff\">/ 40<\/div>\n        <\/div>\n        <div style=\"font:700 20px 'Quicksand';color:{{ resultTextColor }};margin-bottom:8px\">{{ resultLabel }}<\/div>\n        <div style=\"font:600 13px 'Noto Sans TC';color:{{ fhirStatusColor }};margin-bottom:10px\">{{ fhirStatusText }}<\/div>\n        <sc-if value=\"{{ fhirSynced }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#F4F0E7;border:1px solid #E6DECF;border-radius:12px;padding:12px 14px;margin-bottom:20px;text-align:left;font:400 11px/1.6 monospace;color:#5C564C;word-break:break-all\">\n            QuestionnaireResponse/{{ fhirQrId }}<br>Observation/{{ fhirObsId }}\n          <\/div>\n        <\/sc-if>\n        <sc-if value=\"{{ !fhirSynced }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-bottom:20px\"><\/div>\n        <\/sc-if>\n        <button onClick=\"{{ goNext }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:14px 30px;border-radius:999px;font:700 14px 'Noto Sans TC'\">下一步：每日任務 ›<\/button>\n      <\/div>\n    <\/sc-if>\n  <\/div>\n\n  <!-- floating chat FAB -->\n  <div style=\"position:absolute;right:clamp(14px,4vw,28px);bottom:clamp(14px,4vw,28px);z-index:50;max-width:calc(100vw - 28px)\">\n    <sc-if value=\"{{ !chatOpen }}\" hint-placeholder-val=\"{{ true }}\">\n      <button onClick=\"{{ toggleChat }}\" style=\"width:60px;height:60px;border-radius:50%;border:none;background:linear-gradient(135deg,#88AE8E,#557A60);color:#FBF9F4;font:700 22px 'Quicksand';box-shadow:0 10px 26px rgba(85,122,96,.4);display:flex;align-items:center;justify-content:center\">\n        <span style=\"width:20px;height:16px;border-radius:8px 8px 8px 2px;background:#FBF9F4\"><\/span>\n      <\/button>\n    <\/sc-if>\n    <sc-if value=\"{{ chatOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:min(330px,calc(100vw - 28px));max-height:min(460px,70vh);background:#FBF9F4;border:1px solid #E6DECF;border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,.18);display:flex;flex-direction:column;overflow:hidden\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#557A60;color:#FBF9F4\">\n          <div style=\"font:700 14px 'Quicksand'\">AI 陪伴對話 · 靈光<\/div>\n          <button onClick=\"{{ toggleChat }}\" style=\"border:none;background:transparent;color:#FBF9F4;font:700 16px 'Noto Sans TC'\">✕<\/button>\n        <\/div>\n        <div class=\"mh-scroll\" style=\"flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;max-height:min(280px,45vh)\">\n          <sc-for list=\"{{ chatMessages }}\" as=\"msg\" hint-placeholder-count=\"2\">\n            <div style=\"{{ msg.style }}\">{{ msg.text }}<\/div>\n          <\/sc-for>\n        <\/div>\n        <div style=\"display:flex;gap:8px;padding:12px;border-top:1px solid #E6DECF\">\n          <input value=\"{{ chatDraft }}\" onInput=\"{{ onDraftChange }}\" onKeyDown=\"{{ onKeyDown }}\" placeholder=\"想對靈光說些什麼...\" style=\"flex:1;border:1px solid #E6DECF;border-radius:999px;padding:10px 14px;font:400 13px 'Noto Sans TC';outline:none\"/>\n          <button onClick=\"{{ sendChat }}\" style=\"border:none;background:#557A60;color:#FBF9F4;width:38px;height:38px;border-radius:50%;font:700 15px 'Noto Sans TC'\">➤<\/button>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n  <\/div>\n<\/div>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:900}}\">\nconst PSS10 = [\n  '你有多常因為突發事件而感到不安？',\n  '你有多常感覺無法掌控生活中重要的事情？',\n  '你有多常感到緊張與壓力大？',\n  '你有多常有信心能處理個人問題？',\n  '你有多常感覺事情正朝你希望的方向發展？',\n  '你有多常發現自己無法應付所有該做的事？',\n  '你有多常能夠控制生活中令人惱怒的事？',\n  '你有多常感覺自己掌握全局？',\n  '你有多常因為超出掌控的事而生氣？',\n  '你有多常感覺困難堆積如山，無法克服？',\n];\nconst OPTS = [\n  {label:'從不', emoji:'🙂', slug:'never'},\n  {label:'很少', emoji:'😌', slug:'rarely'},\n  {label:'有時', emoji:'😐', slug:'sometimes'},\n  {label:'常常', emoji:'😟', slug:'often'},\n  {label:'幾乎總是', emoji:'😣', slug:'always'},\n];\n\nclass Component extends DCLogic {\n  renderVals() {\n    const p = this.props;\n    const idx = p.pssIndex;\n    const current = p.pssAnswers[idx];\n\n    const options = OPTS.map((o, i) => ({\n      label: `${o.label}\\n${i}分`, emoji: o.emoji,\n      imgLayer: `url('./img/pss-${o.slug}.png') center/cover no-repeat`,\n      onSelect: () => p.selectPss(i),\n      style: `border:${current===i?'2px solid #557A60':'1px solid #E6DECF'};background:${current===i?'#DCE6DB':'#FBF9F4'};color:#423D37;border-radius:16px;padding:14px 6px;text-align:center;`\n    }));\n\n    const stepDefs = [\n      {label:'聊天', done:true}, {label:'量表', done: !p.pssScore, current: !p.pssScore},\n      {label:'總結', done:false}, {label:'結算', done:false},\n    ];\n    const steps = stepDefs.map((s,i) => ({\n      n: i+1, label: s.label,\n      color: p.pssScore ? '#7C756B' : (s.current || i<2 ? '#557A60' : '#C9C2B4'),\n      style: `width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:700 12px 'Noto Sans TC';color:#fff;background:${i<2?'#557A60':'#C9C2B4'}`\n    }));\n\n    const category = p.pssCategory;\n    const resultBg = category === 'high' ? '#E07070' : category === 'medium' ? '#F4A261' : '#6ECBAF';\n    const resultLabel = category === 'high' ? '高壓力' : category === 'medium' ? '中等壓力' : '低壓力，狀態穩定';\n\n    const fhirStatusText = p.fhirStatus === 'syncing'\n      ? '同步中… 正在寫入 FHIR 伺服器（QuestionnaireResponse / Observation）'\n      : p.fhirStatus === 'synced'\n      ? `✓ 已同步至 HAPI FHIR R4 公開測試伺服器（${p.fhirSyncedAt}）`\n      : p.fhirStatus === 'error'\n      ? `⚠ FHIR 同步失敗，僅保存於本機（${p.fhirError || '網路異常'}）`\n      : '量表已完成';\n    const fhirStatusColor = p.fhirStatus === 'synced' ? '#557A60' : p.fhirStatus === 'error' ? '#B5543C' : '#7C756B';\n    const fhirSynced = p.fhirStatus === 'synced';\n\n    const chatMessages = p.chatMessages.map(m => ({\n      text: m.text,\n      style: m.from === 'ai'\n        ? 'background:#EDE8DE;color:#423D37;padding:10px 14px;border-radius:14px 14px 14px 4px;font:400 13px/1.5 \\'Noto Sans TC\\';align-self:flex-start;max-width:85%;'\n        : 'background:#557A60;color:#FBF9F4;padding:10px 14px;border-radius:14px 14px 4px 14px;font:400 13px/1.5 \\'Noto Sans TC\\';align-self:flex-end;max-width:85%;'\n    }));\n\n    return {\n      qNum: idx+1, progressPct: Math.round(((idx+1)/10)*100),\n      question: PSS10[idx], options,\n      isLastQuestion: idx === 9,\n      submitStyle: `border:none;background:${p.pssAnswers.every(a=>a!==null)?'#557A60':'#C9C2B4'};color:#FBF9F4;padding:12px 26px;border-radius:999px;font:600 13px 'Noto Sans TC'`,\n      prevPss: p.prevPss, nextPss: p.nextPss, submitPss: p.submitPss,\n      pssScore: p.pssScore, resultBg, resultLabel, resultTextColor: resultBg,\n      fhirStatusText, fhirStatusColor, fhirSynced, fhirQrId: p.fhirQrId, fhirObsId: p.fhirObsId,\n      goNext: p.goNext,\n      steps,\n      chatOpen: p.chatOpen, toggleChat: p.toggleChat, chatMessages,\n      chatDraft: p.chatDraft, onDraftChange: (e) => p.setDraft(e.target.value),\n      onKeyDown: (e) => { if (e.key === 'Enter') p.sendChat(); },\n      sendChat: p.sendChat,\n      goHome: p.goHome,\n    };\n  }\n}\n\n<\/script>\n<\/body>\n<\/html>\n"],["./ScreenCrisis.dc.html","<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"./support.js\"><\/script>\n<\/head>\n<body>\n<x-dc>\n<helmet>\n  <link href=\"https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap\" rel=\"stylesheet\">\n  <style>\n    @keyframes mh-page-enter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}\n  <\/style>\n<\/helmet>\n<div style=\"position:absolute;inset:0;overflow-y:auto;box-sizing:border-box;background:url('./img/bg-crisis.jpg') center/cover no-repeat,#FBF4F1;font-family:'Noto Sans TC',sans-serif;padding:clamp(20px,5vw,40px) clamp(12px,4vw,24px);display:flex;justify-content:center;animation:mh-page-enter .5s cubic-bezier(.22,1,.36,1) both\" data-screen-label=\"危機介入頁\">\n  <div style=\"max-width:600px;width:100%\">\n    <div style=\"text-align:center;margin-bottom:30px\">\n      <div style=\"width:56px;height:56px;margin:0 auto 14px;position:relative;border-radius:50%;overflow:hidden;background:url('./img/icon-crisis.png') center/cover no-repeat,transparent\">\n        <div style=\"position:absolute;left:6px;top:8px;width:22px;height:32px;border-radius:50% 50% 50% 0;background:#E8B7A9;transform:rotate(-45deg)\"><\/div>\n        <div style=\"position:absolute;right:6px;top:8px;width:22px;height:32px;border-radius:50% 50% 0 50%;background:#E8B7A9;transform:rotate(45deg)\"><\/div>\n      <\/div>\n      <div style=\"font:700 26px 'Quicksand';color:#423D37;margin-bottom:8px\">你不孤單，有人在這裡<\/div>\n      <div style=\"font:400 14px/1.7 'Noto Sans TC';color:#7C756B\">我們偵測到你目前的壓力狀態較高，系統已通知你的心理師關注你的狀況。<\/div>\n    <\/div>\n\n    <div style=\"background:#FBF9F4;border:1px solid #E8B7A9;border-radius:18px;padding:16px 20px;margin-bottom:26px;font:600 13px 'Noto Sans TC';color:#B5543C;text-align:center\">\n      ✓ 已通知心理師團隊，將盡快與你聯繫\n    <\/div>\n\n    <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:26px\">\n      <sc-for list=\"{{ hotlines }}\" as=\"h\" hint-placeholder-count=\"3\">\n        <a href=\"{{ h.tel }}\" style=\"text-decoration:none;display:flex;justify-content:space-between;align-items:center;background:#FBF9F4;border:1px solid #E6DECF;border-radius:16px;padding:18px 20px\">\n          <div>\n            <div style=\"font:700 16px 'Quicksand';color:#423D37\">{{ h.name }}<\/div>\n            <div style=\"font:400 12px 'Noto Sans TC';color:#7C756B\">{{ h.desc }}<\/div>\n          <\/div>\n          <div style=\"font:700 20px 'Quicksand';color:#B5543C\">{{ h.number }}<\/div>\n        <\/a>\n      <\/sc-for>\n    <\/div>\n\n    <button onClick=\"{{ requestAppointment }}\" disabled=\"{{ appointmentRequested }}\" style=\"{{ appointmentButtonStyle }}\">{{ appointmentButtonLabel }}<\/button>\n    <sc-if value=\"{{ appointmentRequested }}\">\n      <div style=\"text-align:center;font:600 12px 'Noto Sans TC';color:#557A60;margin:-6px 0 14px\">已收到你的申請，心理師會盡快與你聯繫安排諮詢時間<\/div>\n    <\/sc-if>\n\n    <div style=\"background:#F4EFEA;border-radius:16px;padding:18px 20px;margin-bottom:26px\">\n      <div style=\"font:700 13px 'Noto Sans TC';color:#423D37;margin-bottom:8px\">自我照護提示<\/div>\n      <div style=\"font:400 13px/1.8 'Noto Sans TC';color:#5C564C\">• 深呼吸（4 秒吸、4 秒停、4 秒吐）<br>• 走到窗邊或戶外透透氣<br>• 聯繫一位你信任的人<\/div>\n    <\/div>\n\n    <div style=\"display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:20px\">\n      <button onClick=\"{{ goTasks }}\" style=\"border:1px solid #C9C2B4;background:transparent;color:#423D37;padding:12px 22px;border-radius:999px;font:600 13px 'Noto Sans TC'\">我好一點了，繼續今日任務<\/button>\n      <button onClick=\"{{ goHome }}\" style=\"border:none;background:#7C756B;color:#FBF9F4;padding:12px 22px;border-radius:999px;font:600 13px 'Noto Sans TC'\">回到首頁<\/button>\n    <\/div>\n\n    <div style=\"text-align:center;font:400 11px 'Noto Sans TC';color:#9A9385\">本系統 AI 僅供輔助參考，非醫療診斷；緊急狀況請撥打 119 或就近至急診室。<\/div>\n  <\/div>\n<\/div>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:640,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = {\n    appointmentRequested: false,\n  };\n\n  requestAppointment = () => {\n    if (this.state.appointmentRequested) return;\n    this.setState({ appointmentRequested: true });\n  };\n\n  renderVals() {\n    const requested = this.state.appointmentRequested;\n    return {\n      hotlines: [\n        {name:'1925 安心專線', desc:'24小時免費，情緒支持與危機諮詢', number:'1925', tel:'tel:1925'},\n        {name:'1995 生命線', desc:'24小時危機支援', number:'1995', tel:'tel:1995'},\n        {name:'1980 張老師專線', desc:'傾聽陪伴、專業輔導', number:'1980', tel:'tel:1980'},\n      ],\n      appointmentRequested: requested,\n      requestAppointment: this.requestAppointment,\n      appointmentButtonLabel: requested ? '已送出申請' : '申請預約心理師諮詢',\n      appointmentButtonStyle: `width:100%;border:none;background:${requested ? '#9A9385' : '#557A60'};color:#FBF9F4;padding:15px;border-radius:999px;font:700 14px 'Noto Sans TC';margin-bottom:14px;box-sizing:border-box;cursor:${requested ? 'default' : 'pointer'}`,\n      goTasks: this.props.goTasks, goHome: this.props.goHome,\n    };\n  }\n}\n\n<\/script>\n<\/body>\n<\/html>\n"],["./ScreenDashboard.dc.html","<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"./support.js\"><\/script>\n<\/head>\n<body>\n<x-dc>\n<helmet>\n  <link href=\"https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap\" rel=\"stylesheet\">\n  <style>\n    @keyframes mh-page-enter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}\n    @media (max-width: 820px) {\n      .mh-dash-root { flex-direction: column !important; }\n      .mh-dash-sidebar { width: 100% !important; position: relative !important; z-index: 50 !important; flex-direction: row !important; align-items: center !important; overflow: visible !important; border-right: none !important; border-bottom: 1px solid rgba(0,0,0,.08) !important; padding: 10px 12px !important; gap: 10px !important; }\n      .mh-dash-sidebar .mh-dash-logo { padding: 0 6px !important; flex: none !important; }\n      .mh-dash-sidebar .mh-dash-profile { margin-top: 0 ushing content down; hidden entirely ≥821px via CSS. -->\n    <div class=\"mh-dash-nav-dropdown\" style=\"{{ mobileDropdownStyle }}\">\n      <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"8\">\n        <div onClick=\"{{ item.onClick }}\" style=\"{{ item.style }}white-space:nowrap\">{{ item.label }}<\/div>\n      <\/sc-for>\n    <\/div>\n  <\/div>\n\n  <!-- main -->\n  <div class=\"mh-dash-main\" style=\"flex:1;min-width:0;overflow-y:auto;padding:clamp(20px,4vw,36px) clamp(16px,4vw,44px);max-width:1600px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;flex-wrap:wrap;gap:16px\">\n      <div style=\"flex:none;min-width:fit-content\">\n        <div style=\"font:700 clamp(22px,4vw,30px) 'Quicksand';color:{{ theme.text }};display:flex;align-items:center;gap:10px;white-space:nowrap\">{{ headerTitle }}\n          <span style=\"display:inline-block;width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#F4D58D,#E8B44C)\"><\/span>\n        <\/div>\n        <div style=\"font:400 14px 'Noto Sans TC';color:{{ theme.textSoft }};margin-top:6px\">{{ headerSubtitle }}<\/div>\n      <\/div>\n      <div style=\"display:flex;align-items:center;gap:14px;flex:none\">\n        <div style=\"display:flex;align-items:center;gap:8px;background:{{ theme.surface }};border:1px solid {{ theme.border }};border-radius:999px;padding:6px 14px 6px 6px\">\n          <div style=\"width:34px;height:34px;border-radius:50%;background:conic-gradient(#C3946F {{ mindDemonDeg }}deg, {{ theme.track }} 0deg);display:flex;align-items:center;justify-content:center\">\n            <div style=\"width:24px;height:24px;border-radius:50%;background:{{ theme.surface }};display:flex;align-items:center;justify-content:center\">\n              <div style=\"position:relative;width:14px;height:12px\">\n                <div style=\"position:absolute;left:0;top:0;width:0;height:0;border-left:2.5px solid transparent;b y }}\" as=\"f\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex;align-items:center;gap:12px;background:{{ theme.canvas }};border-radius:14px;padding:12px 14px\">\n                <div style=\"position:relative;flex:none\">\n                  <div style=\"width:40px;height:40px;border-radius:50%;background:{{ f.avatarLayer }}radial-gradient(circle at 35% 30%,#D19A76,#9A6B54)\"><\/div>\n                  <div style=\"{{ f.dotStyle }}\"><\/div>\n                <\/div>\n                <div>\n                  <div style=\"font:700 13px 'Noto Sans TC';color:{{ theme.text }}\">{{ f.nick }}<\/div>\n                  <div style=\"font:400 11px 'Noto Sans TC';color:{{ theme.textSoft }}\">{{ f.statusText }}<\/div>\n                <\/div>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n        <\/sc-if>\n        <sc-if value=\"{{ !friends.length }}\" hint-placeholder-val=\"{{ false }}\">\n          <div onClick=\"{{ goPairing }}\" style=\"border:1px dashed {{ theme.border }};border-radius:14px;padding:22px;text-align:center;font:400 13px 'Noto Sans TC';color:{{ theme.textSoft }};cursor:pointer\">\n            還沒有好友，去「紓壓配對」認識新旅伴吧 ›\n          <\/div>\n        <\/sc-if>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ isGrowth }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:{{ theme.surface }};border:1px solid {{ theme.border }};border-radius:20px;padding:26px\">\n        <div style=\"font:700 16px 'Quicksand';margin-bottom:18px;color:{{ theme.text }}\">近 7 天心魔 / 靈力趨勢<\/div>\n        <div style=\"display:flex;align-items:flex-end;gap:14px;height:160px\">\n          <sc-for list=\"{{ growthBars }}\" as=\"b\" hint-placeholder-count=\"7\">\n            <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:4px\">\n              <div style=\"width:100%;background:{{ theme.track }};border-radius:6px 6px 0 0;height:{{ b.demonH }}%\"><\/div>\n              <div style=\"width:100%;background:#9CC3A0;border-radius:6px 6px 0 0;height:{{ b.spiritH }}%\"><\/div>\n              <div style=\"font:500 10px 'Noto Sans TC';color:{{ theme.textSoft }};margin-top:4px\">{{ b.day }}<\/div>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n        <div style=\"display:flex;gap:18px;margin-top:16px;font:500 12px 'Noto Sans TC';color:{{ theme.textSoft }}\">\n          <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:10px;height:10px;border-radius:3px;background:{{ theme.track }}\"><\/span>心魔<\/div>\n          <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:10px;height:10px;border-radius:3px;background:#9CC3A0\"><\/span>靈力<\/div>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ isBadges }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font:700 13px 'Noto Sans TC';color:{{ theme.textSoft }};margin-bottom:16px\">已解鎖 {{ badgesUnlockedCount }} / {{ badgesTotalCount }} 枚勳章<\/div>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px\">\n        <sc-for list=\"{{ badges }}\" as=\"badge\" hint-placeholder-count=\"16\">\n          <div style=\"position:relative;background:{{ theme.surface }};border:1px solid {{ theme.border }};border-radius:18px;padding:22px;text-align:center;opacity:{{ badge.opacity }}\">\n            <div style=\"width:44px;height:44px;border-radius:50%;margin:0 auto 12px;background:{{ badge.photoLayer }}{{ badge.color }}\"><\/div>\n            <div style=\"font:700 14px 'Quicksand';color:{{ theme.text }}\">{{ badge.name }}<\/div>\n            <div style=\"font:400 11px 'Noto Sans TC';color:{{ theme.textSoft }};margin-top:4px\">{{ badge.desc }}<\/div>\n            <sc-if value=\"{{ !badge.unlocked }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position:absolute;top:10px;right:12px;font:700 10px 'Noto Sans TC';color:{{ theme.textSoft }}\">🔒<\/div>\n            <\/sc-if>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ isSettings }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:480px;display:flex;flex-direction:column;gap:16px\">\n        <div style=\"background:{{ theme.surface }};border:1px solid {{ theme.border }};border-radius:18px;padding:22px;display:flex;justify-content:space-between;align-items:center\">\n          <div>\n            <div style=\"font:700 14px 'Noto Sans TC';color:{{ theme.text }}\">深色模式<\/div>\n            <div style=\"font:400 12px 'Noto Sans TC';color:{{ theme.textSoft }};margin-top:2px\">切換淺色／深色主題外觀<\/div>\n          <\/div>\n          <div onClick=\"{{ toggleDark }}\" style=\"{{ darkTrackStyle }}\"><div style=\"{{ darkDotStyle }}\"><\/div><\/div>\n        <\/div>\n        <div style=\"background:{{ theme.surface }};border:1px solid {{ theme.border }};border-radius:18px;padding:22px\">\n          <div style=\"font:700 14px 'Noto Sans TC';color:{{ theme.text }};margin-bottom:12px\">帳號資訊<\/div>\n          <div style=\"display:flex;flex-direction:column;gap:8px;font:400 13px 'Noto Sans TC';color:{{ theme.textSoft }}\">\n            <div>名稱：{{ name }}<\/div>\n            <div>角色：個案（Patient）<\/div>\n          <\/div>\n        <\/div>\n        <button onClick=\"{{ clearToday }}\" style=\"border:1px solid #E8B7A9;background:transparent;color:#B5543C;padding:13px;border-radius:14px;font:600 13px 'Noto Sans TC'\">清除今日資料（重新開始）<\/button>\n      <\/div>\n    <\/sc-if>\n    <sc-if value=\"{{ isFriends }}\" hint-placeholder-val=\"{{ false }}\">\n      <sc-if value=\"{{ friends.length }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:480px\">\n          <input value=\"{{ friendSearch }}\" onInput=\"{{ onFriendSearchChange }}\" placeholder=\"搜尋好友暱稱...\" style=\"width:100%;border:1px solid {{ theme.border }};background:{{ theme.surface }};color:{{ theme.text }};border-radius:999px;padding:11px 18px;font:400 13px 'Noto Sans TC';outline:none;box-sizing:border-box;margin-bottom:14px\"/>\n\n          <sc-if value=\"{{ filteredFriends.length }}\" hint-placeholder-val=\"{{ true }}\">\n            <div class=\"mh-scroll\" style=\"max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding-right:4px\">\n              <sc-for list=\"{{ filteredFriends }}\" as=\"f\" hint-placeholder-count=\"2\">\n                <div style=\"background:{{ theme.surface }};border:1px solid {{ theme.border }};border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px;flex:none\">\n                  <div style=\"width:40px;height:40px;border-radius:50%;background:{{ f.avatarLayer }}radial-gradient(circle at 35% 30%,#D19A76,#9A6B54);flex:none\"><\/div>\n                  <div>\n                    <div style=\"font:700 14px 'Noto Sans TC';color:{{ theme.text }}\">{{ f.nick }}<\/div>\n                    <div style=\"font:400 12px 'Noto Sans TC';color:{{ theme.textSoft }}\">透過紓壓配對認識 · {{ f.since }}<\/div>\n                  <\/div>\n                <\/div>\n              <\/sc-for>\n            <\/div>\n          <\/sc-if>\n          <sc-if value=\"{{ !filteredFriends.length }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:{{ theme.surface }};border:1px dashed {{ theme.border }};border-radius:16px;padding:26px;text-align:center;font:400 13px 'Noto Sans TC';color:{{ theme.textSoft }}\">\n              找不到符合「{{ friendSearch }}」的好友\n            <\/div>\n          <\/sc-if>\n        <\/div>\n      <\/sc-if>\n      <sc-if value=\"{{ !friends.length }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"max-width:480px;background:{{ theme.surface }};border:1px dashed {{ theme.border }};border-radius:16px;padding:26px;text-align:center;font:400 13px 'Noto Sans TC';color:{{ theme.textSoft }}\">\n          還沒有好友，去「紓壓配對」認識新旅伴吧！\n        <\/div>\n      <\/sc-if>\n    <\/sc-if>\n  <\/div>\n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1300,&quot;height&quot;:800}}\">\n// Each badge's `test` reads the live props passed into ScreenDashboard so the\n// lock state reflects real progress instead of a fixed demo index.\nconst BADGES = [\n  {name:'Calm', desc:'完成今日簽到', color:'#9CC3A0', slug:'calm', test: p => !!p.checkedInToday},\n  {name:'Focus', desc:'完成第一項任務', color:'#8FA9C4', slug:'focus', test: p => p.tasksDone >= 1},\n  {name:'Courage', desc:'完成壓力量表評估', color:'#A688B0', slug:'courage', test: p => !!p.pssCategory},\n  {name:'Reflection', desc:'完成每日總結', color:'#D19A76', slug:'reflection', test: p => !!p.summaryDone},\n  // No persistent streak counter exists yet in app state; approximated by a\n  // fully-completed check-in day until real streak tracking is added.\n  {name:'Consistency', desc:'連續 7 天修練', color:'#E8B44C', slug:'consistency', test: p => !!p.completed && !!p.checkedInToday},\n  {name:'Growth', desc:'心魔降至 40 以下', color:'#557A60', slug:'growth', test: p => p.mindDemon <= 40},\n  {name:'Day Complete', desc:'完成一整天旅程', color:'#6ECBAF', slug:'day-complete', test: p => !!p.completed},\n  {name:'Task Master', desc:'一日內完成所有任務', color:'#C97B4A', slug:'task-master', test: p => p.tasksTotal > 0 && p.tasksDone === p.tasksTotal},\n  {name:'Inner Peace', desc:'心魔降至 20 以下', color:'#3F5C48', slug:'inner-peace', test: p => p.mindDemon <= 20},\n  {name:'Spirit Spark', desc:'靈力達 100', color:'#F0C868', slug:'spirit-spark', test: p => p.spiritPower >= 100},\n  {name:'Spirit Adept', desc:'靈力達 300', color:'#D9A441', slug:'spirit-adept', test: p => p.spiritPower >= 300},\n  {name:'Spirit Master', desc:'靈力達 500', color:'#A67C27', slug:'spirit-master', test: p => p.spiritPower >= 500},\n  {name:'Low Stress', desc:'壓力量表達成低壓力', color:'#B7D9A8', slug:'low-stress', test: p => p.pssCategory === 'low'},\n  {name:'Steady Mind', desc:'曾勇敢尋求危機支援', color:'#E29C8B', slug:'steady-mind', test: p => !!p.highRisk},\n  {name:'Companion', desc:'認識第一位旅伴', color:'#7FB3D5', slug:'companion', test: p => (p.friends || []).length >= 1},\n  {name:'Social Butterfly', desc:'好友數達 3 人', color:'#6C8FB0', slug:'social-butterfly', test: p => (p.friends || []).length >= 3},\n];\n\nclass Component extends DCLogic {\n  state = { panel: 'overview', darkMode: false, friendSearch: '', mobileNavOpen: false };\n\n  componentDidUpdate(prevProps) {\n    if (prevProps.openFriendsSignal !== this.props.openFriendsSignal && this.props.openFriendsSignal) {\n      this.setState({ panel: 'friends' });\n    }\n  }\n\n  renderVals() {\n    const p = this.props;\n    const active = 'padding:11px 12px;border-radius:12px;font:700 13px \\'Noto Sans TC\\';color:#2E4A34;background:#DCE6DB;margin-bottom:2px;cursor:pointer;';\n    const inactive = 'padding:11px 12px;border-radius:12px;font:500 13px \\'Noto Sans TC\\';color:#7C756B;margin-bottom:2px;cursor:pointer;';\n\n    const goByProgress = () => {\n      if (!p.pssCategory) return p.goChat();\n      if (p.tasksDone < p.tasksTotal) return p.goTasks();\n      if (!p.summaryDone) return p.goSummary();\n      return p.completed ? p.goResults() : p.goSummary();\n    };\n    const items = [\n      {label:'總覽', onClick: () => this.setState({ panel: 'overview' }), key:'overview'},\n      {label:'每日任務', onClick: goByProgress, key:'ext'},\n      {label:'成長記錄', onClick: () => this.setState({ panel: 'growth' }), key:'growth'},\n      {label:'成就徽章', onClick: () => this.setState({ panel: 'badges' }), key:'badges'},\n      {label:'設定中心', onClick: () => this.setState({ panel: 'settings' }), key:'settings'},\n    ];\n    // Shared by the desktop list and the mobile dropdown, so picking any\n    // item also closes the dropdown if it happened to be open.\n    const navItems = items.map(it => ({\n      label: it.label,\n      onClick: () => { it.onClick(); this.setState({ mobileNavOpen: false }); },\n      style: this.state.panel === it.key ? active : inactive,\n    }));\n\n    const pssLabel = p.pssCategory === 'high' ? '高壓力' : p.pssCategory === 'medium' ? '中壓力' : p.pssCategory === 'low' ? '低壓力' : '尚未評估';\n    const scaleCta = p.pssCategory ? '查看結果 ›' : '開始評估 ›';\n    const tasksLabel = `${p.tasksDone}/${p.tasksTotal} 已完成 ›`;\n    const summaryLabel = p.summaryDone ? '查看今日成果 ›' : '開始總結 ›';\n\n    const titles = { overview: [`Good Morning, ${p.nameVal}`, '今天也是安頓自己的一天'], growth: ['成長記錄', '看見自己每一天的變化'], badges: ['成就徽章', '累積屬於你的修練里程碑'], settings: ['設定中心', '管理你的帳號與外觀偏好'], friends: ['好友列表', '透過紓壓配對認識的旅伴們'] };\n    const [headerTitle, headerSubtitle] = titles[this.state.panel];\n\n    const growthBars = [62,58,55,50,45,40,p.mindDemon].map((d,i) => ({\n      demonH: d, spiritH: Math.min(100, 30 + i*10),\n      day: ['07/05','07/06','07/07','07/08','07/09','07/10','今日'][i],\n    }));\n\n    const badges = BADGES.map(b => {\n      const unlocked = b.test(p);\n      return { ...b, unlocked, opacity: unlocked ? 1 : 0.35, photoLayer: `url('./img/badge-${b.slug}.png') center/cover no-repeat,` };\n    });\n    const badgesUnlockedCount = badges.filter(b => b.unlocked).length;\n\n    const theme = this.state.darkMode\n      ? { canvas:'#211F1B', surface:'#2A2822', border:'#3A362E', text:'#EDE8DE', textSoft:'#B0A99A', track:'#3A362E' }\n      : { canvas:'#F4F0E7', surface:'#FBF9F4', border:'#E6DECF', text:'#423D37', textSoft:'#7C756B', track:'#EDE4D8' };\n\n    const mobileNavOpen = this.state.mobileNavOpen;\n    const hbBar = (top, deg, fade) => `position:absolute;left:0;top:${top}px;width:16px;height:2px;border-radius:1px;background:${theme.text};opacity:${fade ? 0 : 1};transform:rotate(${deg}deg);transition:top .2s ease,transform .2s ease,opacity .15s ease`;\n    const hamburgerBar1Style = hbBar(mobileNavOpen ? 5 : 0, mobileNavOpen ? 45 : 0, false);\n    const hamburgerBar2Style = hbBar(5, 0, mobileNavOpen);\n    const hamburgerBar3Style = hbBar(mobileNavOpen ? 5 : 10, mobileNavOpen ? -45 : 0, false);\n    // position:absolute (not fixed) anchored to .mh-dash-sidebar, which the\n    // ≤820px media query makes position:relative — so this overlays the\n    // page below the top bar instead of pushing content down.\n    const mobileDropdownStyle = `position:absolute;top:100%;left:0;right:0;z-index:10;display:flex;flex-direction:column;gap:2px;background:${theme.surface};border-bottom:1px solid ${theme.border};padding:10px 16px 14px;box-shadow:0 16px 28px rgba(0,0,0,.14);opacity:${mobileNavOpen ? 1 : 0};transform:translateY(${mobileNavOpen ? 0 : -10}px) scaleY(${mobileNavOpen ? 1 : 0.96});pointer-events:${mobileNavOpen ? 'auto' : 'none'};transition:opacity .22s ease,transform .22s cubic-bezier(.22,1,.36,1)`;\n\n    return {\n      theme,\n      name: p.nameVal,\n      mindDemon: p.mindDemon,\n      spiritPower: p.spiritPower,\n      mindDemonDeg: Math.round((p.mindDemon/100)*360),\n      spiritDeg: Math.round((Math.min(p.spiritPower,500)/500)*360),\n      pssLabel, scaleCta, tasksLabel, summaryLabel,\n      highRisk: p.highRisk,\n      navItems,\n      toggleMobileNav: () => this.setState(s => ({ mobileNavOpen: !s.mobileNavOpen })),\n      hamburgerBar1Style, hamburgerBar2Style, hamburgerBar3Style,\n      mobileDropdownStyle,\n      headerTitle, headerSubtitle,\n      isOverview: this.state.panel === 'overview',\n      isGrowth: this.state.panel === 'growth',\n      isBadges: this.state.panel === 'badges',\n      isSettings: this.state.panel === 'settings',\n      isFriends: this.state.panel === 'friends',\n      // One avatar slot per friend (avatar-friend-1.png, -2.png, ...). Missing\n      // files simply fall back to the shared tan gradient below — see\n      // rank.md for the prompts still needed to fill out the set.\n      friends: (p.friends || []).map((f, i) => ({ ...f, avatarLayer: `url('./img/avatar-friend-${i + 1}.png') center/cover no-repeat,` })),\n      filteredFriends: (p.friends || [])\n        .map((f, i) => ({ ...f, avatarLayer: `url('./img/avatar-friend-${i + 1}.png') center/cover no-repeat,` }))\n        .filter(f => !this.state.friendSearch.trim() || f.nick.toLowerCase().includes(this.state.friendSearch.trim().toLowerCase())),\n      friendSearch: this.state.friendSearch,\n      onFriendSearchChange: (e) => this.setState({ friendSearch: e.target.value }),\n      friendActivity: (p.friends || []).map((f, i) => ({\n        nick: f.nick,\n        statusText: f.online ? '線上' : (f.lastActive || '離線'),\n        avatarLayer: `url('./img/avatar-friend-${i + 1}.png') center/cover no-repeat,`,\n        dotStyle: `position:absolute;right:-1px;bottom:-1px;width:11px;height:11px;border-radius:50%;background:${f.online ? '#6ECBAF' : '#C9C2B4'};border:2px solid ${theme.surface}`,\n      })),\n      openFriends: () => this.setState({ panel: 'friends' }),\n      goPairing: p.goPairing,\n      goShop: p.goShop,\n      onCheckin: p.onCheckin,\n      checkinBtnLabel: p.checkedInToday ? '✓ 已簽到' : '簽到 +5',\n      checkinBtnStyle: `border:none;padding:9px 16px;border-radius:999px;font:700 12px 'Noto Sans TC';color:${p.checkedInToday ? theme.textSoft : '#FBF9F4'};background:${p.checkedInToday ? theme.track : '#E8B44C'};cursor:${p.checkedInToday ? 'default' : 'pointer'};white-space:nowrap`,\n      growthBars, badges, badgesUnlockedCount, badgesTotalCount: badges.length,\n      goChat: p.goChat, goTasks: p.goTasks,\n      goResultsOrTasks: p.completed ? p.goResults : (() => {}),\n      goCrisis: p.goCrisis, goLogout: p.goLogout,\n      toggleDark: () => this.setState(s => ({ darkMode: !s.darkMode })),\n      darkTrackStyle: `width:40px;height:22px;border-radius:999px;background:${this.state.darkMode?'#557A60':'#C9C2B4'};display:flex;align-items:center;padding:2px;cursor:pointer;justify-content:${this.state.darkMode?'flex-end':'flex-start'}`,\n      darkDotStyle: 'width:18px;height:18px;border-radius:50%;background:#FBF9F4',\n      clearToday: () => this.setState({ panel: 'overview' }),\n    };\n  }\n}\n\n<\/script>\n<\/body>\n<\/html>\n"],["./ScreenGroups.dc.html","<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"./support.js\"><\/script>\n<\/head>\n<body>\n<x-dc>\n<helmet>\n  <link href=\"https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap\" rel=\"stylesheet\">\n  <style>\n    @keyframes mh-page-enter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}\n  <\/style>\n<\/helmet>\n<div style=\"position:absolute;inset:0;overflow-y:auto;box-sizing:border-box;background:#F4F0E7;font-family:'Noto Sans TC',sans-serif;padding:clamp(20px,5vw,36px) clamp(12px,4vw,24px) 60px;animation:mh-page-enter .5s cubic-bezier(.22,1,.36,1) both\" data-screen-label=\"紓壓群組\">\n  <div style=\"max-width:720px;margin:0 auto\">\n    <div onClick=\"{{ onBack }}\" style=\"display:flex;align-items:center;gap:6px;color:#7C756B;font:600 13px 'Noto Sans TC';cursor:pointer;margin-bottom:16px;width:fit-content;white-space:nowrap\">{{ backLabel }}<\/div>\n\n    <!-- list view -->\n    <sc-if value=\"{{ isList }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;flex-wrap:wrap;gap:12px\">\n        <div style=\"font:700 26px 'Quicksand';color:#423D37\">紓壓群組<\/div>\n        <button onClick=\"{{ goCreate }}\" style=\"border:none;background:#557A60;color:#FBF9F4;padding:11px 22px;border-radius:999px;font:700 13px 'Noto Sans TC'\">＋ 建立群組<\/button>\n      <\/div>\n      <input value=\"{{ search }}\" onInput=\"{{ onSearchChange }}\" placeholder=\"搜尋群組名稱...\" style=\"width:100%;border:1px solid #E6DECF;border-radius:999px;padding:12px 18px;font:400 13px 'Noto Sans TC';outline:none;box-sizing:border-box;margin-bottom:24px;background:#FBF9F4\"/>\n\n      <sc-if value=\"{{ myGroups.length }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font:700 14px 'Quicksand';color:#423D37;margin-bottom:10px\">我的群組<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:26px\">\n          <sc-for list=\"{{ myGroups }}\" as=\"g\" hint-placeholder-count=\"2\">\n            <div onClick=\"{{ g.onEnter }}\" style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:16px;padding:16px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px\">\n              <div>\n                <div style=\"display:flex;align-items:center;gap:8px\">\n                  <div style=\"font:700 14px 'Noto Sans TC';color:#423D37\">{{ g.name }}<\/div>\n                  <sc-if value=\"{{ g.riskFlag }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"background:#FBEAE6;color:#B5543C;font:700 10px 'Noto Sans TC';padding:3px 8px;border-radius:999px\">已通報<\/div>\n                  <\/sc-if>\n                <\/div>\n                <div style=\"font:400 12px 'Noto Sans TC';color:#7C756B;margin-top:4px\">{{ g.memberCount }} 位成員 · {{ g.visibilityLabel }} · {{ g.lastMessagePreview }}<\/div>\n              <\/div>\n              <div style=\"font:600 12px 'Noto Sans TC';color:#557A60;white-space:nowrap\">進入 ›<\/div>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n      <\/sc-if>\n\n      <div style=\"font:700 14px 'Quicksand';color:#423D37;margin-bottom:10px\">探索公開群組<\/div>\n      <sc-if value=\"{{ discoverGroups.length }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{ discoverGroups }}\" as=\"g\" hint-placeholder-count=\"2\">\n            <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:16px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;gap:10px\">\n              <div>\n                <div style=\"font:700 14px 'Noto Sans TC';color:#423D37\">{{ g.name }}<\/div>\n                <div style=\"font:400 12px 'Noto Sans TC';color:#7C756B;margin-top:4px\">{{ g.memberCount }} 位成員 · {{ g.lastMessagePreview }}<\/div>\n              <\/div>\n              <button onClick=\"{{ g.onJoin }}\" style=\"border:1px solid #557A60;background:transparent;color:#557A60;padding:9px 18px;border-radius:999px;font:600 12px 'Noto Sans TC';white-space:nowrap\">加入<\/button>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n      <\/sc-if>\n      <sc-if value=\"{{ !discoverGroups.length }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border:1px dashed #E6DECF;border-radius:14px;padding:22px;text-align:center;font:400 13px 'Noto Sans TC';color:#9A9385\">沒有符合搜尋的公開群組<\/div>\n      <\/sc-if>\n    <\/sc-if>\n\n    <!-- create view -->\n    <sc-if value=\"{{ isCreate }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font:700 22px 'Quicksand';color:#423D37;margin-bottom:20px\">建立群組<\/div>\n      <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:20px;padding:24px\">\n        <div style=\"font:600 13px 'Noto Sans TC';color:#423D37;margin-bottom:8px\">群組名稱<\/div>\n        <input value=\"{{ newName }}\" onInput=\"{{ onNameChange }}\" maxlength=\"30\" placeholder=\"例如：深夜emo互助會\" style=\"width:100%;border:1px solid #E6DECF;border-radius:12px;padding:12px 14px;font:400 13px 'Noto Sans TC';outline:none;box-sizing:border-box;margin-bottom:20px\"/>\n\n        <div style=\"font:600 13px 'Noto Sans TC';color:#423D37;margin-bottom:8px\">公開設定<\/div>\n        <div style=\"display:flex;gap:10px;margin-bottom:22px\">\n          <button onClick=\"{{ setPublic }}\" style=\"{{ publicBtnStyle }}\">公開群組<\/button>\n          <button onClick=\"{{ setPrivate }}\" style=\"{{ privateBtnStyle }}\">私密群組<\/button>\n        <\/div>\n\n        <sc-if value=\"{{ friendOptions.length }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font:600 13px 'Noto Sans TC';color:#423D37;margin-bottom:8px\">邀請好友加入（選填）<\/div>\n          <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:24px\">\n            <sc-for list=\"{{ friendOptions }}\" as=\"f\" hint-placeholder-count=\"2\">\n              <div onClick=\"{{ f.onToggle }}\" style=\"display:flex;align-items:center;gap:10px;background:#F4F0E7;border-radius:12px;padding:10px 14px;cursor:pointer\">\n                <div style=\"{{ f.checkStyle }}\">{{ f.checkMark }}<\/div>\n                <div style=\"font:500 13px 'Noto Sans TC';color:#423D37\">{{ f.nick }}<\/div>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n        <\/sc-if>\n\n        <div style=\"display:flex;gap:12px\">\n          <button onClick=\"{{ goList }}\" style=\"flex:1;border:1px solid #C9C2B4;background:transparent;color:#423D37;padding:13px;border-radius:999px;font:600 13px 'Noto Sans TC'\">取消<\/button>\n          <button onClick=\"{{ onCreateSubmit }}\" style=\"{{ submitStyle }}\">建立並進入<\/button>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <!-- room view -->\n    <sc-if value=\"{{ isRoom }}\" hint-placeholder-val=\"{{ false }}\">\n      <sc-if value=\"{{ activeGroup }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;height:min(600px,72vh)\">\n          <div style=\"padding:16px 20px;border-bottom:1px solid #E6DECF\">\n            <div style=\"font:700 17px 'Quicksand';color:#423D37\">{{ activeGroup.name }}<\/div>\n            <div style=\"font:400 12px 'Noto Sans TC';color:#7C756B;margin-top:4px\">{{ activeGroup.memberLine }}<\/div>\n          <\/div>\n          <sc-if value=\"{{ activeGroup.riskFlag }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#FBEAE6;color:#B5543C;font:600 12px 'Noto Sans TC';padding:10px 20px\">已偵測到高風險訊息，心理師端已收到通報<\/div>\n          <\/sc-if>\n          <div class=\"mh-scroll\" style=\"flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px\">\n            <sc-for list=\"{{ activeGroup.messageRows }}\" as=\"m\" hint-placeholder-count=\"3\">\n              <div style=\"{{ m.wrapStyle }}\">\n                <div style=\"{{ m.nickStyle }}\">{{ m.nickLabel }}<\/div>\n                <div style=\"{{ m.bubbleStyle }}\">{{ m.text }}<\/div>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n          <div style=\"display:flex;gap:8px;padding:14px 16px;border-top:1px solid #E6DECF\">\n            <input value=\"{{ draft }}\" onInput=\"{{ onDraftChange }}\" onKeyDown=\"{{ onKeyDown }}\" placeholder=\"想對群組說些什麼...\" style=\"flex:1;border:1px solid #E6DECF;border-radius:999px;padding:11px 16px;font:400 13px 'Noto Sans TC';outline:none\"/>\n            <button onClick=\"{{ onSend }}\" style=\"border:none;background:#557A60;color:#FBF9F4;width:40px;height:40px;border-radius:50%;font:700 15px 'Noto Sans TC'\">➤<\/button>\n          <\/div>\n        <\/div>\n      <\/sc-if>\n    <\/sc-if>\n  <\/div>\n<\/div>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:820,&quot;height&quot;:820}}\">\nclass Component extends DCLogic {\n  state = {\n    view: 'list',\n    activeGroupId: null,\n    search: '',\n    newName: '',\n    newVisibility: 'public',\n    inviteSelected: [],\n    draft: '',\n  };\n\n  // Tracks how many groups existed right before submitting a create, so we\n  // can tell (via componentDidUpdate) once the parent has actually appended\n  // the new group and jump straight into its room — the new id isn't known\n  // to this component until the parent generates it.\n  _pendingCreateCount = undefined;\n\n  componentDidUpdate() {\n    if (this._pendingCreateCount !== undefined && this.props.groups.length > this._pendingCreateCount) {\n      this.setState({ view: 'room', activeGroupId: this.props.groups[0].id });\n      this._pendingCreateCount = undefined;\n    }\n  }\n\n  goList = () => this.setState({ view: 'list' });\n  goCreate = () => this.setState({ view: 'create', newName: '', newVisibility: 'public', inviteSelected: [] });\n  enterGr font:700 13px \\'Noto Sans TC\\';cursor:pointer;';\n    return {\n      selectMale: () => this.props.setGender('male'),\n      selectFemale: () => this.props.setGender('female'),\n      doLogin: this.props.doLogin,\n      goPractitioner: this.props.goPractitioner,\n      goAdmin: this.props.goAdmin,\n      goHome: this.props.goHome,\n      maleStyle: base + (g === 'male' ? 'border:2px solid #557A60;background:#DCE6DB;color:#2E4A34;' : 'border:1px solid #E6DECF;background:#FBF9F4;color:#7C756B;'),\n      femaleStyle: base + (g === 'female' ? 'border:2px solid #557A60;background:#DCE6DB;color:#2E4A34;' : 'border:1px solid #E6DECF;background:#FBF9F4;color:#7C756B;'),\n      isLoginMode,\n      showLogin: () => this.setState({ mode: 'login' }),\n      showRegister: () => this.setState({ mode: 'register' }),\n      loginTabStyle: tabBase + (isLoginMode ? 'background:#FBF9F4;color:#2E4A34;' : 'background:transparent;color:#7C756B;'),\n      registerTabStyle: tabBase + (!isLoginMode ? 'background:#FBF9F4;color:#2E4A34;' : 'background:transparent;color:#7C756B;'),\n      regNickname: this.state.regNickname, onNicknameChange: (e) => this.setState({ regNickname: e.target.value }),\n      regBirthday: this.state.regBirthday, onBirthdayChange: (e) => this.setState({ regBirthday: e.target.value }),\n      regAccount: this.state.regAccount, onAccountChange: (e) => this.setState({ regAccount: e.target.value }),\n      regPassword: this.state.regPassword, onPasswordChange: (e) => this.setState({ regPassword: e.target.value }),\n      regError: this.state.regError,\n      submitRegister: this.submitRegister,\n    };\n  }\n}\n\n<\/script>\n<\/body>\n<\/html>\n"],["./ScreenMarketing.dc.html","<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"./support.js\"><\/script>\n<\/head>\n<body>\n<x-dc>\n<helmet>\n  <link href=\"https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&fami
