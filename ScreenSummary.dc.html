<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
</helmet>
<div style="position:absolute;inset:0;overflow-y:auto;box-sizing:border-box;background:#F4F0E7;font-family:'Noto Sans TC',sans-serif;padding:clamp(20px,5vw,40px) clamp(12px,4vw,24px) 90px;display:flex;justify-content:center" data-screen-label="今日總結">
  <div style="max-width:640px;width:100%;background:#FBF9F4;border:1px solid #E6DECF;border-radius:24px;padding:clamp(20px,5vw,40px)">
    <div style="font:700 24px 'Quicksand';color:#423D37;margin-bottom:6px">今日反思總結</div>
    <div style="font:400 14px 'Noto Sans TC';color:#7C756B;margin-bottom:30px">花一點時間，回顧今天的自己</div>

    <div style="margin-bottom:28px">
      <div style="font:600 15px 'Noto Sans TC';color:#423D37;margin-bottom:12px">今天有比較放鬆嗎？</div>
      <div style="display:flex;gap:6px">
        <sc-for list="{{ relaxStars }}" as="star" hint-placeholder-count="5">
          <div onClick="{{ star.onClick }}" style="font:32px sans-serif;cursor:pointer;color:{{ star.color }}">★</div>
        </sc-for>
      </div>
    </div>

    <div style="margin-bottom:32px">
      <div style="font:600 15px 'Noto Sans TC';color:#423D37;margin-bottom:12px">做完任務後，心情是否比較平靜？</div>
      <div style="display:flex;gap:6px">
        <sc-for list="{{ calmerStars }}" as="star" hint-placeholder-count="5">
          <div onClick="{{ star.onClick }}" style="font:32px sans-serif;cursor:pointer;color:{{ star.color }}">★</div>
        </sc-for>
      </div>
    </div>

    <div style="margin-bottom:32px">
      <div style="font:600 15px 'Noto Sans TC';color:#423D37;margin-bottom:12px">今天最讓你有收穫的事情是？<span style="color:#9A9385;font-weight:400">（選填）</span></div>
      <textarea value="{{ freeText }}" onInput="{{ onFreeTextChange }}" placeholder="寫下你的想法..." style="width:100%;min-height:80px;border:1px solid #E6DECF;border-radius:14px;padding:14px;font:400 14px 'Noto Sans TC';outline:none;resize:vertical;box-sizing:border-box"></textarea>
    </div>

    <button onClick="{{ goNext }}" style="{{ submitStyle }}">送出總結，查看今日成果 ›</button>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:720,&quot;height&quot;:760}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const makeStars = (key) => {
      const val = p.stars[key];
      return [1,2,3,4,5].map(n => ({
        color: n <= val ? '#E8B44C' : '#DCD6C8',
        onClick: () => p.setStar(key, n),
      }));
    };
    const ready = p.stars.relax > 0 && p.stars.calmer > 0;
    return {
      relaxStars: makeStars('relax'),
      calmerStars: makeStars('calmer'),
      freeText: p.freeText,
      onFreeTextChange: (e) => p.setFreeText(e.target.value),
      goNext: p.goNext,
      submitStyle: `width:100%;border:none;padding:15px;border-radius:999px;font:700 15px 'Noto Sans TC';color:#FBF9F4;background:${ready?'#557A60':'#C9C2B4'};cursor:${ready?'pointer':'default'};box-sizing:border-box`,
    };
  }
}

</script>
</body>
</html>
